      const family = TRADITION_FAMILY[displayName] || "alt";
      const familyAngles = { ancient: 0, abrahamic: 1.2, modern: 2.4, american: 3.6, alt: 4.8, friction: 5.6 };
      const baseAngle = familyAngles[family] || (i / traditions.length) * Math.PI * 2;
      const angle = baseAngle + (Math.random() - 0.5) * 0.8;
      const dist = (0.2 + (data.count / totalAgents) * 0.6) * (W * 0.35);
      const color = TRADITION_COLORS[displayName] || "#c8a46e";
      // Radius proportional to agent count
      const radius = 6 + (data.count / totalAgents) * 30;

      return {
        name: displayName,
        backendName: name,
        count: data.count,
        positions: data.positions || [],
        color,
        family,
        x: cx + Math.cos(angle) * dist,
        y: cy + Math.sin(angle) * dist,
        radius,
        pulsePhase: Math.random() * Math.PI * 2,
      };
    });

    // Edges between traditions that share positions
    const edges = [];
    for (let i = 0; i < nodes.length; i++) {
      for (let j = i + 1; j < nodes.length; j++) {
        const shared = nodes[i].positions.filter(p => nodes[j].positions.includes(p));
        if (shared.length > 0) {
          edges.push({ a: i, b: j, strength: shared.length / Math.max(nodes[i].positions.length, nodes[j].positions.length) });
        }
      }
    }

    stateRef.current = { nodes, edges };

    // Ambient signals
    const signals = [];
    const spawnSignal = () => {
      if (signals.length > 15 || edges.length === 0) return;
      const edge = edges[Math.floor(Math.random() * edges.length)];
      signals.push({
        edge, t: 0, forward: Math.random() > 0.5,
        speed: 0.004 + Math.random() * 0.004,
        opacity: 0,
        color: nodes[edge.a].color,
      });
    };
    for (let i = 0; i < 5; i++) spawnSignal();

    let frame = 0;
    const draw = () => {
      ctx.clearRect(0, 0, W, H);
      frame++;
      if (frame % 30 === 0) spawnSignal();

      const hIdx = stateRef.current?.hoveredNodeIdx ?? -1;

      // Draw edges
      edges.forEach(edge => {
        const na = nodes[edge.a], nb = nodes[edge.b];
        ctx.beginPath();
        ctx.moveTo(na.x, na.y);
        ctx.lineTo(nb.x, nb.y);
        ctx.strokeStyle = `rgba(200,164,110,${edge.strength * 0.3})`;
        ctx.lineWidth = edge.strength * 2;
        ctx.stroke();
      });

      // Draw signals
      for (let i = signals.length - 1; i >= 0; i--) {
        const sig = signals[i];
        sig.t += sig.speed;
        sig.opacity = sig.t < 0.15 ? sig.t / 0.15 : sig.t > 0.85 ? (1 - sig.t) / 0.15 : 1;
        if (sig.t >= 1) { signals.splice(i, 1); continue; }
        const na = nodes[sig.edge.a], nb = nodes[sig.edge.b];
        const [src, dst] = sig.forward ? [na, nb] : [nb, na];
        const px = src.x + (dst.x - src.x) * sig.t;
        const py = src.y + (dst.y - src.y) * sig.t;
        ctx.beginPath();
        ctx.arc(px, py, 2.5, 0, Math.PI * 2);
        ctx.fillStyle = sig.color;
        ctx.globalAlpha = sig.opacity * 0.7;
        ctx.fill();
        ctx.globalAlpha = 1;
      }

      // Draw nodes
      nodes.forEach((node, ni) => {
        node.pulsePhase += 0.015;
        const pulse = Math.sin(node.pulsePhase) * 0.3 + 0.7;
        const isHovered = ni === hIdx;

        const hex = node.color;
        const r = parseInt(hex.slice(1,3), 16);
        const g = parseInt(hex.slice(3,5), 16);
        const b = parseInt(hex.slice(5,7), 16);

        // Glow
        const outerR = node.radius + (isHovered ? 12 : 6);
        const grd = ctx.createRadialGradient(node.x, node.y, node.radius * 0.3, node.x, node.y, outerR);
        grd.addColorStop(0, `rgba(${r},${g},${b},${isHovered ? 0.5 : 0.25 * pulse})`);
        grd.addColorStop(1, "transparent");
        ctx.beginPath();
        ctx.arc(node.x, node.y, outerR, 0, Math.PI * 2);
        ctx.fillStyle = grd;
        ctx.fill();

        // Core circle
        ctx.beginPath();
        ctx.arc(node.x, node.y, node.radius, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${r},${g},${b},${isHovered ? 0.95 : 0.7 * pulse})`;
        ctx.fill();

        // Count label inside
        if (node.radius > 10) {
          ctx.font = `bold ${Math.min(node.radius * 0.7, 14)}px -apple-system, sans-serif`;
          ctx.fillStyle = `rgba(255,255,255,${isHovered ? 0.95 : 0.8})`;
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText(node.count, node.x, node.y);
        }

        // Name label outside
        ctx.font = `${isHovered ? 11 : 9}px -apple-system, sans-serif`;
        ctx.fillStyle = `rgba(${r},${g},${b},${isHovered ? 1 : 0.6})`;
        ctx.textAlign = "center";
        ctx.textBaseline = "top";
        ctx.fillText(node.name, node.x, node.y + node.radius + 4);
      });

      animRef.current = requestAnimationFrame(draw);
    };
    draw();
    return () => { if (animRef.current) cancelAnimationFrame(animRef.current); };
  }, [resultData, size]);

  // Mouse interaction
  const handleMouseMove = (e) => {
    if (!stateRef.current) return;
    const canvas = canvasRef.current;
    const rect = canvas.getBoundingClientRect();
    const mx = (e.clientX - rect.left) * (size / rect.width);
    const my = (e.clientY - rect.top) * (size / rect.height);
    const nodes = stateRef.current.nodes;
    let closest = -1, closestDist = 30;
    nodes.forEach((n, i) => {
      const d = Math.sqrt((n.x - mx) ** 2 + (n.y - my) ** 2);
      if (d < Math.max(n.radius + 5, closestDist)) { closestDist = d; closest = i; }
    });
    stateRef.current.hoveredNodeIdx = closest;
    setHoveredNode(closest);
  };

  const hNode = hoveredNode !== null && hoveredNode !== -1 ? stateRef.current?.nodes[hoveredNode] : null;

  return (
    <div className="council-graph-wrap" style={{ display: "block", margin: "0 auto", width: size, position: "relative" }}>
      <canvas ref={canvasRef}
        onMouseMove={handleMouseMove}
        onMouseLeave={() => { if (stateRef.current) stateRef.current.hoveredNodeIdx = -1; setHoveredNode(null); }}
        style={{ display: "block", width: size, height: size, cursor: hoveredNode !== null ? "pointer" : "default" }} />
      {hNode && (
        <div className="council-node-tooltip" style={{
          left: hNode.x * (canvasRef.current?.getBoundingClientRect().width / size || 1) + 14,
          top: hNode.y * (canvasRef.current?.getBoundingClientRect().height / size || 1) - 50,
        }}>
          <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 4 }}>
            <div style={{ width: 8, height: 8, borderRadius: "50%", background: hNode.color }} />
            <div className="council-node-tooltip-name">{hNode.name}</div>
          </div>
          <div className="council-node-tooltip-meta">
            {hNode.count} agents · {hNode.family?.toUpperCase()}
          </div>
          {hNode.positions.length > 0 && (
            <div className="council-node-tooltip-quote">
              Position{hNode.positions.length > 1 ? "s" : ""}: {hNode.positions.slice(0, 3).join(", ")}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function CouncilDeliberating({ thinkers, swarm = false }) {
  const [activeThinker, setActiveThinker] = React.useState(0);
  const [verb, setVerb] = React.useState(COUNCIL_VERBS[0]);
  const [fade, setFade] = React.useState(true);
  const [round, setRound] = React.useState(1);

  const displayNames = swarm ? SWARM_TRADITIONS : thinkers;

  React.useEffect(() => {
    const cycle = setInterval(() => {
      setFade(false);
      setTimeout(() => {
        setActiveThinker(i => (i + 1) % displayNames.length);
        setVerb(COUNCIL_VERBS[Math.floor(Math.random() * COUNCIL_VERBS.length)]);
        setFade(true);
      }, 300);
    }, swarm ? 1200 : 1800);
    return () => clearInterval(cycle);
  }, [displayNames.length, swarm]);

  // Swarm: cycle round indicator between 1 and 2
  React.useEffect(() => {
    if (!swarm) return;
    const t = setTimeout(() => setRound(2), 18000); // ~18s into deliberation
    return () => clearTimeout(t);
  }, [swarm]);

  return (
    <div style={{
      flex: 1, display: "flex", flexDirection: "column",
      alignItems: "center", justifyContent: "center",
      minHeight: 420, gap: 0,
    }}>
      {swarm
        ? <SwarmNetworkCanvas size={440} active={true} />
        : <NeuralCanvas thinkers={thinkers} size={380} active={true} />
      }

      {/* Thinker status line */}
      <div style={{
        marginTop: 4, height: 36, display: "flex",
        alignItems: "center", justifyContent: "center", gap: 10,
      }}>
        <span style={{
          fontFamily: "var(--font)", fontSize: "1.05rem",
          color: swarm ? (TRADITION_COLORS[displayNames[activeThinker]] || "var(--accent)") : "var(--accent)",
          opacity: fade ? 1 : 0,
          transition: "opacity 0.3s ease, color 0.3s ease",
        }}>
          {displayNames[activeThinker]}
        </span>
        <span style={{
          fontFamily: "var(--font-sans)", fontSize: "0.8rem",
          color: "var(--text-faint)", letterSpacing: "0.12em",
          opacity: fade ? 1 : 0,
          transition: "opacity 0.3s ease",
        }}>
          {verb}
        </span>
      </div>

      {/* Round indicator — tradition-colored dots for swarm, plain for council */}
      {swarm ? (
        <div style={{ display: "flex", gap: 4, marginTop: 16, flexWrap: "wrap", justifyContent: "center", maxWidth: 320 }}>
          {displayNames.map((name, i) => (
            <div key={i} style={{
              width: 6, height: 6, borderRadius: "50%",
              background: i === activeThinker
                ? (TRADITION_COLORS[name] || "var(--accent)")
                : `${TRADITION_COLORS[name] || "#555"}33`,
              transition: "background 0.3s, transform 0.3s",
              transform: i === activeThinker ? "scale(1.6)" : "scale(1)",
            }} />
          ))}
        </div>
      ) : (
        <div style={{ display: "flex", gap: 6, marginTop: 16 }}>
          {displayNames.map((_, i) => (
            <div key={i} style={{
              width: 5, height: 5, borderRadius: "50%",
              background: i === activeThinker ? "var(--accent)" : "var(--border)",
              transition: "background 0.3s",
            }} />
          ))}
        </div>
      )}

      <div style={{
        marginTop: 20,
        fontFamily: "var(--font-sans)", fontSize: 11,
        color: "var(--text-faint)", letterSpacing: "0.2em",
        textTransform: "uppercase",
      }}>
        {swarm
          ? `Swarm intelligence · Round ${round} of 2 · 40 agents · 19 traditions`
          : "The council convenes"}
      </div>
    </div>
  );
}

function CouncilView({ isGuest, onNeedAuth }) {

  const [prose, setProse] = useState("");
  const [writingInputMode, setWritingInputMode] = useState("question"); // "question" | "prose"
  const [thinkers, setThinkers] = useState(new Set(ALL_THINKERS));
  const [swarmMode, setSwarmMode] = useState(false);
  const [councilTier, setCouncilTier] = useState("full"); // "lite" | "full" | "swarm"
  const [credits, setCredits] = useState(null); // {remaining, per_week, costs}
  const [deliberating, setDeliberating] = useState(false);
  const [result, setResult] = useState(null);
  const [error, setError] = useState("");
  const [limitData, setLimitData] = useState(null);
  // Clarifying intake flow
  const [intakeQuestions, setIntakeQuestions] = useState(null); // [{q: string, answer: string}]
  const [intakeLoading, setIntakeLoading] = useState(false);
  const [enrichedContext, setEnrichedContext] = useState("");

  // Load credit balance on mount
  React.useEffect(() => {
    api("/council/credits").then(d => setCredits({
      remaining: d.credits_remaining,
      perWeek: d.credits_per_week,
      costs: d.costs,
      plan: d.plan,
    })).catch(() => {});
  }, []);

  const toggleThinker = (name) => {
    setThinkers(prev => {
      const next = new Set(prev);
      if (next.has(name)) {
        if (next.size <= 2) return prev; // minimum 2
        next.delete(name);
      } else {
        next.add(name);
      }
      return next;
    });
  };

  const [showGuestTeaser, setShowGuestTeaser] = React.useState(false);
  const [guestTeaserData, setGuestTeaserData] = React.useState(null);

  const GUEST_TEASER_RESPONSES = {
    advice: [
      { name: "Socrates", tradition: "Socratic", response: "Before we can answer what you should do, we must first ask: what do you truly want? Not what you think you should want — what draws you, even when no one is watching? The unexamined choice is no choice at all." },
      { name: "Machiavelli", tradition: "Machiavellian", response: "The question is not what is right, but what is effective. Consider: who benefits from each path? What power do you gain, and what do you lose? Virtue without strategy is merely beautiful failure." },
    ],
    predict: [
      { name: "Aristotle", tradition: "Aristotelian", response: "To predict well, we must understand the nature of the thing in question — its tendencies, its telos. What is the natural trajectory here? The probable follows from character and circumstance." },
      { name: "William James", tradition: "Pragmatist", response: "Prediction is less about seeing the future than about understanding which possibilities are live, forced, and momentous. What are the practical consequences of each outcome?" },
    ],
    writing: [
      { name: "Jesus", tradition: "Jesus", response: "Speak plainly. The most powerful truths need no decoration. Say what you mean as if speaking to a child or a dying friend — with that clarity and that urgency." },
      { name: "Socrates", tradition: "Socratic", response: "Does your writing know what it doesn't know? The strongest prose admits its own limits. Question every certainty on the page — if it survives, it deserves to stay." },
    ],
  };

  // Run the actual deliberation (called after intake or directly)
  const runDeliberation = async (contextStr = "") => {
    const q = question.trim();
    const p = prose.trim();
    setError("");
    setDeliberating(true);
    setResult(null);
    setIntakeQuestions(null);
    try {
      const body = {
        question: q || "Please read and respond to this passage.",
        mode,
        thinkers: [...thinkers],
        council_tier: councilTier,
        swarm: councilTier === "swarm",
      };
      if (contextStr) body.context = contextStr;
      if (mode === "writing" && p) body.prose = p;
      const r = await api("/council", { method: "POST", body: JSON.stringify(body) });
      if (r.credits_remaining !== undefined) {
        setCredits(prev => prev ? { ...prev, remaining: r.credits_remaining } : null);
      }
      setResult(r);
    } catch (e) {
      if (e.limitData) {
        setLimitData(e.limitData);
      } else {
        setError(e.message || "The council could not convene. Try again.");
      }
    }
    setDeliberating(false);
  };

  const handleSubmit = async () => {
    const q = question.trim();
    const p = prose.trim();
    if (mode === "writing" && writingInputMode === "prose" && !p) {
      setError("Paste the text you'd like the council to read."); return;
    }
    if (mode !== "writing" && !q) { setError("Ask the council something."); return; }
    if (mode === "writing" && writingInputMode === "question" && !q) {
      setError("Ask a question about your writing."); return;
    }

    // Guest teaser flow — show 2 mock responses, then prompt signup
    if (isGuest) {
      setError("");
      setDeliberating(true);
      setResult(null);

                </button>

            ) : (
              <>
                <button className="empty-cta-primary" onClick={() => window.location.href = "/app?upgrade=1"}>
                  Upgrade →

                  Back
                </button>

          <div style={{ marginTop: 16, fontSize: 11, color: "var(--text-dim)", opacity: 0.6 }}>

          </div>
        </div>

          <div style={{ fontSize: 14, color: "var(--text-dim)", fontFamily: "var(--font-sans)", lineHeight: 1.6 }}>
            Your question sounds personal. A few details will help the council give you

            }}>
            {councilTier === "swarm" ? "Deploy the Swarm" : "Convene the Council"} →
          </button>
          <button onClick={handleSkipIntake} style={{
            padding: "14px 20px", fontSize: 13, fontFamily: "var(--font-sans)",
            background: "none", border: "1px solid var(--border)", borderRadius: 8,
            color: "var(--text-dim)", cursor: "pointer",
          }}>
            Skip
          </button>
        </div>
      </div>
    );
  }

  if (deliberating) {
    return <CouncilDeliberating thinkers={[...thinkers]} swarm={swarmMode} />;
  }

  if (result) {
    // ── Swarm result layout ──────────────────────────────────────────────────
    if (result.swarm) {
      return (
        <div className="write-container">
          <div className="write-section">

            {/* Header bar */}
            <div style={{ display: "flex", alignItems: "center", gap: 14, marginBottom: 28 }}>
              <div className="write-label" style={{ color: "var(--accent)", fontSize: 10, letterSpacing: "0.3em" }}>
                SWARM INTELLIGENCE
              </div>
              <div style={{
                padding: "3px 12px", borderRadius: 20,
                border: "1px solid var(--accent-dim)",
                fontFamily: "var(--font-sans)", fontSize: 11, color: "var(--accent)",
                letterSpacing: "0.06em",
              }}>
                {result.shift_percentage}% shifted between rounds
              </div>
              <div style={{
                fontFamily: "var(--font-sans)", fontSize: 11, color: "var(--text-faint)",
              }}>
                {result.n_agents} agents · 2 rounds
              </div>
              {result.detected_domains?.length > 0 && (
                <div style={{
                  fontFamily: "var(--font-sans)", fontSize: 10, color: "var(--text-faint)",
                  letterSpacing: "0.08em", textTransform: "uppercase",
                }}>
                  Domain: {result.detected_domains.join(" · ")}
                </div>
              )}
            </div>

            {/* Network graph visualization */}
            <SwarmResultsGraph resultData={result} size={400} />

            {/* Tradition family legend */}
            <div className="swarm-legend">
              {[
                { label: "Ancients", color: "#818cf8" },
                { label: "Abrahamic", color: "#60a5fa" },
                { label: "Modernity", color: "#f59e0b" },
                { label: "Contemporary", color: "#c8a46e" },
                { label: "Alt", color: "#34d399" },
                { label: "Friction", color: "#f43f5e" },
              ].map(({ label, color }) => (
                <div key={label} className="swarm-legend-item">
                  <div className="swarm-legend-dot" style={{ background: color }} />
                  {label}
                </div>
              ))}
            </div>

            {/* Synthesis */}
            <div style={{ marginTop: 24, marginBottom: 28, padding: "24px 28px", background: "var(--bg-elevated)", borderRadius: "var(--radius)", border: "1px solid var(--border)" }}>
              <div className="write-label" style={{ marginBottom: 12, fontSize: 10 }}>THE POPULATION SPEAKS</div>
              <p style={{ fontFamily: "var(--font)", fontSize: "1.05rem", color: "var(--text)", lineHeight: 1.85 }}>
                {result.synthesis}
              </p>
            </div>

            {/* Fault lines + What shifted */}
            {(result.fault_lines || result.what_shifted) && (
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14, marginBottom: 28 }}>
                {result.fault_lines && (
                  <div style={{ padding: "16px 18px", background: "var(--bg-elevated)", borderRadius: "var(--radius)", border: "1px solid var(--border)" }}>
                    <div className="write-label" style={{ marginBottom: 10, fontSize: 10 }}>Fault Lines</div>
                    <p style={{ fontFamily: "var(--font-sans)", fontSize: 13, color: "var(--text-dim)", lineHeight: 1.65 }}>
                      {result.fault_lines}
                    </p>
                  </div>
                )}
                {result.what_shifted && (
                  <div style={{ padding: "16px 18px", background: "var(--bg-elevated)", borderRadius: "var(--radius)", border: "1px solid var(--border)" }}>
                    <div className="write-label" style={{ marginBottom: 10, fontSize: 10 }}>What Shifted</div>
                    <p style={{ fontFamily: "var(--font-sans)", fontSize: 13, color: "var(--text-dim)", lineHeight: 1.65 }}>
                      {result.what_shifted}
                    </p>
                  </div>
                )}
              </div>
            )}

            {/* Tradition breakdown grid */}
            <div className="write-label" style={{ marginBottom: 14 }}>Tradition Breakdown</div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(200px, 1fr))", gap: 10, marginBottom: 32 }}>
              {result.thinkers.map(t => (
                <SwarmTraditionCard key={t.name} card={t} />
              ))}
            </div>

            <button className="action-btn" onClick={handleReset}>
              Ask another question
            </button>
          </div>
        </div>
      );
    }

    // ── Original council result layout ───────────────────────────────────────
    return (
      <div className="write-container">
        <div className="write-section">
          {/* Synthesis */}
          <div style={{ marginBottom: 36, padding: "28px 32px", background: "var(--bg-elevated)", borderRadius: "var(--radius)", border: "1px solid var(--border)" }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 14 }}>
              <div className="write-label" style={{ color: "var(--accent)", fontSize: 10, letterSpacing: "0.3em" }}>THE COUNCIL SPEAKS</div>
              <div style={{ display: "flex", gap: 8 }}>
              <button
                onClick={() => {
                  // Build markdown export
                  const lines = [
                    `# Council Deliberation`,
                    ``,
                    `**Question:** ${result.question}`,
                    `**Mode:** ${result.mode}`,
                    `**Date:** ${new Date().toLocaleDateString("en-US", { year:"numeric", month:"long", day:"numeric" })}`,
                    ``,
                    `---`,
                    ``,
                    `## Synthesis`,
                    ``,
                    result.synthesis,
                    ``,
                  ];
                  if (result.thinkers?.length) {
                    lines.push(`---`, ``, `## Individual Positions`, ``);
                    result.thinkers.forEach(t => {
                      lines.push(`### ${t.name} *(${t.tradition})*`);
                      lines.push(`**Position:** ${t.final_position || t.ideal_position}`);
                      lines.push(``, t.key_argument || "", ``);
                    });
                  }
                  if (result.tensions?.length) {
                    lines.push(`---`, ``, `## Tensions`, ``);
                    result.tensions.forEach(t => lines.push(`- ${t}`));
                    lines.push(``);
                  }
                  if (result.alliances?.length) {
                    lines.push(`---`, ``, `## Convergences`, ``);
                    result.alliances.forEach(a => lines.push(`- ${a}`));
                    lines.push(``);
                  }
                  lines.push(`---`, ``, `*Generated by Lumafox Council — lumafox.ai*`);
                  const blob = new Blob([lines.join("\n")], { type: "text/markdown" });
                  const url = URL.createObjectURL(blob);
                  const a = document.createElement("a");
                  a.href = url;
                  a.download = `council-${result.question.slice(0,40).replace(/[^a-z0-9]+/gi,"-").toLowerCase()}.md`;
                  document.body.appendChild(a); a.click();
                  document.body.removeChild(a); URL.revokeObjectURL(url);
                  toast("Deliberation saved as markdown.");
                }}
                style={{ background: "none", border: "1px solid var(--border)", borderRadius: 6, padding: "4px 12px", color: "var(--text-dim)", fontSize: 11, cursor: "pointer", fontFamily: "var(--font-sans)", display: "flex", alignItems: "center", gap: 5 }}
              >
                ↓ Save deliberation
              </button>
              <button
                onClick={() => {
                  navigator.clipboard.writeText(result.synthesis).then(() => toast("Synthesis copied — paste into Voice to refine in your style."));
                }}
                style={{ background: "none", border: "1px solid var(--accent-dim)", borderRadius: 6, padding: "4px 12px", color: "var(--accent)", fontSize: 11, cursor: "pointer", fontFamily: "var(--font-sans)", letterSpacing: "0.04em", display: "flex", alignItems: "center", gap: 6 }}
              >
                <svg width="11" height="11" viewBox="0 0 14 14" fill="none">
                  <rect x="0" y="5" width="2" height="4" rx="1" fill="currentColor" opacity="0.6"/>
                  <rect x="3" y="2" width="2" height="10" rx="1" fill="currentColor"/>
                  <rect x="6" y="4" width="2" height="6" rx="1" fill="currentColor" opacity="0.8"/>
                  <rect x="9" y="1" width="2" height="12" rx="1" fill="currentColor"/>
                  <rect x="12" y="4" width="2" height="6" rx="1" fill="currentColor" opacity="0.7"/>
                </svg>
                Refine in my Voice →
              </button>
              </div>
            </div>
            <p style={{ fontFamily: "var(--font)", fontSize: "1.05rem", color: "var(--text)", lineHeight: 1.85 }}>
              {result.synthesis}
            </p>
          </div>

          {/* Thinker cards */}
          <div className="write-label" style={{ marginBottom: 14 }}>Individual Positions</div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(280px, 1fr))", gap: 12, marginBottom: 28 }}>
            {result.thinkers.map(t => (
              <ThinkerCard key={t.name} thinker={t} deliberationResult={result} />
            ))}
          </div>

          {/* Tensions & Alliances */}
          {(result.tensions?.length > 0 || result.alliances?.length > 0) && (
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16, marginBottom: 28 }}>
              {result.tensions?.length > 0 && (
                <div style={{ padding: "16px 18px", background: "var(--bg-elevated)", borderRadius: "var(--radius)", border: "1px solid var(--border)" }}>
                  <div className="write-label" style={{ marginBottom: 10, fontSize: 10 }}>Tensions</div>
                  {result.tensions.map((t, i) => (
                    <p key={i} style={{ fontFamily: "var(--font-sans)", fontSize: 13, color: "var(--text-dim)", marginBottom: 6, lineHeight: 1.5 }}>{t}</p>
                  ))}
                </div>
              )}
              {result.alliances?.length > 0 && (
                <div style={{ padding: "16px 18px", background: "var(--bg-elevated)", borderRadius: "var(--radius)", border: "1px solid var(--border)" }}>
                  <div className="write-label" style={{ marginBottom: 10, fontSize: 10 }}>Convergences</div>
                  {result.alliances.map((a, i) => (
                    <p key={i} style={{ fontFamily: "var(--font-sans)", fontSize: 13, color: "var(--text-dim)", marginBottom: 6, lineHeight: 1.5 }}>{a}</p>
                  ))}
                </div>
              )}
            </div>
          )}

          {/* Narrative */}
          {result.narrative && (
            <div style={{ marginBottom: 28 }}>
              <div className="write-label" style={{ marginBottom: 10 }}>How the Deliberation Unfolded</div>
              <p style={{ fontFamily: "var(--font-sans)", fontSize: 14, color: "var(--text-dim)", lineHeight: 1.8 }}>
                {result.narrative}
              </p>
            </div>
          )}

          <button className="action-btn" onClick={handleReset}>
            Ask another question
          </button>
        </div>
      </div>
    );
  }

  return (
    <div className="write-container">
      <div className="write-section" style={{ maxWidth: 560 }}>

        {/* ── Hero header ── */}
        <h1 style={{
          fontFamily: "var(--font)", fontSize: "2.2rem", fontWeight: 600,
          color: "var(--text)", margin: "0 0 6px", lineHeight: 1.2,
        }}>
          {councilTier === "swarm" ? "Ask 40 Philosophical Minds" : "Summon the Council"}
        </h1>
        <p style={{
          fontFamily: "var(--font-sans)", fontSize: 15, color: "var(--text-dim)",
          margin: "0 0 28px", lineHeight: 1.65,
        }}>
          {councilTier === "swarm"
            ? "From Plato to Nietzsche, watch traditions deliberate your question in real-time."
            : `${thinkers.size} of history's sharpest minds deliberate your question. Disagreement is the point.`
          }
        </p>

        {/* ── Main input — THE HERO ── */}
        {(mode !== "writing" || writingInputMode === "question") && (
          <textarea
            value={question}
            onChange={e => setQuestion(e.target.value)}
            placeholder={
              mode === "advice" ? "What question do you bring?" :
              mode === "predict" ? "What do you want them to reason about?" :
              "What do you want to understand about your writing?"
            }
            style={{
              width: "100%", minHeight: 100, padding: "16px 18px",
              background: "var(--bg-elevated)", border: "1px solid var(--accent-dim)",
              borderRadius: "var(--radius-lg, 12px)", color: "var(--text)",
              fontFamily: "var(--font)", fontSize: "1.1rem", lineHeight: 1.7,
              resize: "vertical", marginBottom: 12,
            }}
          />
        )}
        {mode === "writing" && writingInputMode === "prose" && (
          <>
            <textarea
              value={prose}
              onChange={e => setProse(e.target.value)}
              placeholder="Paste the text you'd like critiqued..."
              style={{
                width: "100%", minHeight: 160, padding: "16px 18px",
                background: "var(--bg-elevated)", border: "1px solid var(--accent-dim)",
                borderRadius: "var(--radius-lg, 12px)", color: "var(--text)",
                fontFamily: "var(--font)", fontSize: "1.1rem", lineHeight: 1.7,
                resize: "vertical", marginBottom: 8,
              }}
            />
            <textarea
              value={question}
              onChange={e => setQuestion(e.target.value)}
              placeholder="Anything specific to address? (optional)"
              style={{
                width: "100%", minHeight: 50, padding: "10px 14px",
                background: "var(--bg-elevated)", border: "1px solid var(--border)",
                borderRadius: "var(--radius)", color: "var(--text)",
                fontFamily: "var(--font-sans)", fontSize: 14, lineHeight: 1.6,
                resize: "vertical", marginBottom: 12,
              }}
            />
          </>
        )}

        {/* ── Example questions — clickable suggestions ── */}
        {!question && (mode !== "writing" || writingInputMode === "question") && (
          <div style={{ display: "flex", gap: 6, marginBottom: 14, flexWrap: "wrap", alignItems: "center" }}>
            <span style={{ fontFamily: "var(--font-sans)", fontSize: 10, color: "var(--text-faint)", letterSpacing: "0.1em", textTransform: "uppercase", marginRight: 2 }}>Try</span>
            {(mode === "advice" ? [
              "Should I be honest even when it hurts?",
              "How do I find meaning in my work?",
              "Is it right to forgive someone who isn't sorry?",
            ] : mode === "predict" ? [
              "What happens when AI replaces most jobs?",
              "Will democracy survive the internet?",
              "What comes after the culture wars?",
            ] : [
              "How do I write about grief without sentimentality?",
              "What makes dialogue feel alive?",
              "How do I find my voice as a writer?",
            ]).map(q => (
              <button key={q} onClick={() => setQuestion(q)} style={{
                padding: "3px 10px", borderRadius: 16,
                border: "1px solid var(--border)", background: "none",
                color: "var(--text-faint)", fontFamily: "var(--font-sans)", fontSize: 11,
                cursor: "pointer", transition: "all 0.15s",
                maxWidth: "100%", textAlign: "left", lineHeight: 1.4,
              }}
              onMouseEnter={e => { e.target.style.borderColor = "var(--accent-dim)"; e.target.style.color = "var(--text-dim)"; }}
              onMouseLeave={e => { e.target.style.borderColor = "var(--border)"; e.target.style.color = "var(--text-faint)"; }}
              >{q}</button>
            ))}
          </div>
        )}

        {/* ── Mode pills — secondary, below input ── */}
        <div style={{ display: "flex", gap: 6, marginBottom: 20, flexWrap: "wrap", alignItems: "center" }}>
          <span style={{ fontFamily: "var(--font-sans)", fontSize: 10, color: "var(--text-faint)", letterSpacing: "0.15em", textTransform: "uppercase", marginRight: 4 }}>Mode</span>
          {[["advice", "Advice"], ["predict", "Prediction"], ["writing", "Writing"]].map(([val, label]) => (
            <button key={val} onClick={() => setMode(val)} style={{
              padding: "4px 14px", borderRadius: 20,
              border: `1px solid ${mode === val ? "var(--accent)" : "var(--border)"}`,
              background: mode === val ? "rgba(200,164,110,0.12)" : "none",
              color: mode === val ? "var(--accent)" : "var(--text-faint)",
              fontFamily: "var(--font-sans)", fontSize: 12, cursor: "pointer", transition: "all 0.15s",
            }}>{label}</button>
          ))}
          {mode === "writing" && (
            <>
              <span style={{ opacity: 0.3, margin: "0 2px" }}>|</span>
              {[["question", "Ask about craft"], ["prose", "Critique text"]].map(([val, label]) => (
                <button key={val} onClick={() => setWritingInputMode(val)} style={{
                  padding: "4px 12px", borderRadius: 20,
                  border: `1px solid ${writingInputMode === val ? "var(--accent-dim)" : "var(--border)"}`,
                  background: "none",
                  color: writingInputMode === val ? "var(--text)" : "var(--text-faint)",
                  fontFamily: "var(--font-sans)", fontSize: 11, cursor: "pointer", transition: "all 0.15s",
                }}>{label}</button>
              ))}
            </>
          )}
        </div>

        {/* ── Tier selector — card-based, above submit ── */}
        <div className="council-tier-grid" style={{
          display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8, marginBottom: 16,
        }}>
          {[
            { key: "lite",  label: "Lite",  sub: "3 thinkers · 1 round", cost: 1 },
            { key: "full",  label: "Full",  sub: "6 thinkers · 2 rounds", cost: 3 },
            { key: "swarm", label: "Swarm", sub: "40 agents · 19 traditions",  cost: 10, recommended: true },
          ].map(t => (
            <button key={t.key} onClick={() => { setCouncilTier(t.key); setSwarmMode(t.key === "swarm"); }}
              style={{
                position: "relative",
                padding: "12px 10px", border: `1px solid ${councilTier === t.key ? "var(--accent)" : "var(--border)"}`,
                borderRadius: "var(--radius)", background: councilTier === t.key ? "rgba(200,164,110,0.08)" : "var(--bg-elevated)",
                color: councilTier === t.key ? "var(--accent)" : "var(--text-dim)",
                fontFamily: "var(--font-sans)", cursor: "pointer", transition: "all 0.15s",
                textAlign: "center",
              }}>
              {t.recommended && (
                <div style={{
                  position: "absolute", top: -8, left: "50%", transform: "translateX(-50%)",
                  padding: "1px 8px", borderRadius: 10,
                  background: "var(--accent)", color: "var(--bg)",
                  fontSize: 9, fontWeight: 600, letterSpacing: "0.08em", textTransform: "uppercase",
                  whiteSpace: "nowrap",
                }}>Recommended</div>
              )}
              <div style={{ fontSize: 14, fontWeight: 600, letterSpacing: "0.02em", marginBottom: 3 }}>{t.label}</div>
              <div style={{ fontSize: 10, opacity: 0.55, lineHeight: 1.4 }}>{t.sub}</div>
              <div style={{ fontSize: 10, color: "var(--accent)", marginTop: 4, opacity: 0.8 }}>{t.cost} credit{t.cost !== 1 ? "s" : ""}</div>
            </button>
          ))}
        </div>

        {/* Credit balance */}
        {credits && (
          <div style={{ fontFamily: "var(--font-sans)", fontSize: 11, color: "var(--text-dim)", marginBottom: 16, display: "flex", alignItems: "center", gap: 8 }}>
            <span style={{ color: credits.remaining > 0 ? "var(--accent)" : "#e07070" }}>
              {credits.remaining} credit{credits.remaining !== 1 ? "s" : ""} remaining
            </span>
            <span style={{ opacity: 0.4 }}>·</span>
            <span>{credits.perWeek}/week on {credits.plan} plan</span>
            {credits.remaining === 0 && <span style={{ color: "#e07070" }}>· resets Monday</span>}
          </div>
        )}

        {/* Thinker selector — full mode only */}
        {councilTier === "full" && (
          <div style={{ marginBottom: 16 }}>
            <div style={{ fontFamily: "var(--font-sans)", fontSize: 10, letterSpacing: "0.2em", textTransform: "uppercase", color: "var(--text-faint)", marginBottom: 8 }}>
              Council Members
            </div>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
              {ALL_THINKERS.map(name => (
                <button key={name} onClick={() => toggleThinker(name)} style={{
                  padding: "4px 12px", borderRadius: 20,
                  border: `1px solid ${thinkers.has(name) ? "var(--accent-dim)" : "var(--border)"}`,
                  background: thinkers.has(name) ? "rgba(200,164,110,0.1)" : "none",
                  color: thinkers.has(name) ? "var(--text)" : "var(--text-faint)",
                  fontFamily: "var(--font-sans)", fontSize: 11, cursor: "pointer", transition: "all 0.15s",
                }}>
                  {name}
                  <span style={{ marginLeft: 4, fontSize: 9, color: "var(--text-faint)", opacity: 0.6 }}>
                    {TRADITION_LABEL[name]}
                  </span>
                </button>
              ))}
            </div>
            <div style={{ marginTop: 5, fontFamily: "var(--font-sans)", fontSize: 10, color: "var(--text-faint)" }}>
              {thinkers.size} selected · min 2
            </div>
          </div>
        )}

        {error && <div style={{ color: "#e07070", fontFamily: "var(--font-sans)", fontSize: 13, marginBottom: 12 }}>{error}</div>}

        {/* ── Primary CTA — always visible, guests get teaser flow ── */}
        <button className="action-btn" onClick={handleSubmit} style={{ width: "100%", padding: "14px 0", fontSize: 15 }}>
          {councilTier === "swarm" ? "Deploy the Swarm" : councilTier === "lite" ? "Quick Council" : "Convene the Council"}
        </button>

        {/* ── Guest Teaser Modal ── */}
        {showGuestTeaser && guestTeaserData && (
          <div style={{
            position: "fixed", inset: 0, zIndex: 9999,
            background: "rgba(0,0,0,0.75)", backdropFilter: "blur(8px)",
            display: "flex", alignItems: "center", justifyContent: "center",
            padding: 24,
          }} onClick={() => setShowGuestTeaser(false)}>
            <div onClick={e => e.stopPropagation()} style={{
              background: "var(--bg-elevated)", border: "1px solid var(--border)",
              borderRadius: 16, maxWidth: 560, width: "100%", padding: "32px 28px",
              boxShadow: "0 24px 80px rgba(0,0,0,0.5)",
              maxHeight: "85vh", overflowY: "auto",
            }}>
              <div style={{ fontSize: 11, textTransform: "uppercase", letterSpacing: 2, color: "var(--accent)", fontFamily: "var(--font-sans)", marginBottom: 8 }}>
                Preview — 2 of {councilTier === "swarm" ? "40" : "6"} minds responded
              </div>
              <div style={{ fontSize: 15, color: "var(--text-dim)", fontFamily: "var(--font-serif)", marginBottom: 20, fontStyle: "italic" }}>
                "{guestTeaserData.question}"
              </div>

              {guestTeaserData.responses.map((resp, i) => (
                <div key={i} style={{
                  padding: "16px 18px", marginBottom: 12,
                  background: "rgba(200,164,110,0.04)", border: "1px solid rgba(200,164,110,0.12)",
                  borderRadius: 10,
                }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8 }}>
                    <div style={{ width: 8, height: 8, borderRadius: "50%", background: TRADITION_COLORS[resp.tradition] || "var(--accent)" }} />
                    <span style={{ fontSize: 13, fontWeight: 600, color: "var(--text)", fontFamily: "var(--font-sans)" }}>{resp.name}</span>
                    <span style={{ fontSize: 10, color: "var(--text-dim)", fontFamily: "var(--font-sans)", textTransform: "uppercase", letterSpacing: 1 }}>{resp.tradition}</span>
                  </div>
                  <div style={{ fontSize: 14, color: "var(--text)", lineHeight: 1.65, fontFamily: "var(--font-serif)" }}>
                    {resp.response}
                  </div>
                </div>
              ))}

              <div style={{
                marginTop: 20, padding: "16px 20px",
                background: "linear-gradient(135deg, rgba(200,164,110,0.08), rgba(200,164,110,0.02))",
                border: "1px solid rgba(200,164,110,0.2)", borderRadius: 10,
                textAlign: "center",
              }}>
                <div style={{ fontSize: 15, fontWeight: 600, color: "var(--text)", fontFamily: "var(--font-sans)", marginBottom: 6 }}>

function ThinkerCard({ thinker, deliberationResult }) {
  const [expanded, setExpanded] = useState(false);
  const [askOpen, setAskOpen] = useState(false);
  const [askInput, setAskInput] = useState("");
  const [askLoading, setAskLoading] = useState(false);
  const [conversation, setConversation] = useState([]); // [{role, content}]

  const interrogate = async () => {
    if (!askInput.trim() || askLoading) return;
    const q = askInput.trim();
    setAskInput("");
    setConversation(prev => [...prev, { role: "user", content: q }]);
    setAskLoading(true);
    try {
      const result = await api("/council/interrogate", {
        method: "POST",
        body: JSON.stringify({
          thinker: thinker.name,
          question: q,
          deliberation_context: deliberationResult || {},
        }),
      });
      setConversation(prev => [...prev, { role: "thinker", content: result.response }]);
    } catch (e) {
      setConversation(prev => [...prev, { role: "thinker", content: `Error: ${e.message}` }]);
    }
    setAskLoading(false);
  };

  return (
    <div style={{
      background: "var(--bg-elevated)", border: "1px solid var(--border)",
      borderRadius: "var(--radius)", padding: "18px 20px",
    }}>
      <div style={{ fontFamily: "var(--font-sans)", fontSize: 10, letterSpacing: "0.2em", textTransform: "uppercase", color: "var(--text-faint)", marginBottom: 6 }}>
        {TRADITION_LABEL[thinker.name] || thinker.tradition}
      </div>
      <div style={{ fontFamily: "var(--font)", fontSize: "1rem", color: "var(--text)", marginBottom: 10 }}>
        {thinker.name}
      </div>
      <p style={{ fontFamily: "var(--font-sans)", fontSize: 13, color: "var(--text-dim)", lineHeight: 1.65, marginBottom: 10 }}>
        {thinker.final_position || thinker.ideal_position}
      </p>
      <div style={{ display: "flex", gap: 12, alignItems: "center", flexWrap: "wrap" }}>
        {thinker.key_argument && (
          <button onClick={() => setExpanded(e => !e)} style={{
            background: "none", border: "none", cursor: "pointer",
            fontFamily: "var(--font-sans)", fontSize: 11, color: "var(--text-faint)",
            padding: 0, letterSpacing: "0.05em",
          }}>
            {expanded ? "▲ Less" : "▼ Full argument"}
          </button>
        )}
        {deliberationResult && (
          <button onClick={() => setAskOpen(o => !o)} style={{
            background: askOpen ? "rgba(200,164,110,0.1)" : "none",
            border: "1px solid rgba(200,164,110,0.2)", borderRadius: 6,
            cursor: "pointer", fontFamily: "var(--font-sans)", fontSize: 11,
            color: "var(--accent)", padding: "3px 10px", letterSpacing: "0.03em",
          }}>
            {askOpen ? "✕ Close" : `Ask ${thinker.name}`}
          </button>
        )}
      </div>
      {expanded && thinker.key_argument && (
        <p style={{ fontFamily: "var(--font-sans)", fontSize: 13, color: "var(--text-dim)", lineHeight: 1.7, marginTop: 10 }}>
          {thinker.key_argument}
        </p>
      )}
      {thinker.private_thought && expanded && (
        <p style={{ fontFamily: "var(--font-sans)", fontSize: 12, color: "var(--text-faint)", fontStyle: "italic", marginTop: 8, borderTop: "1px solid var(--border)", paddingTop: 8 }}>
          Private thought: "{thinker.private_thought}"
        </p>
      )}

      {/* ── Interrogation panel ── */}
      {askOpen && (
        <div style={{ marginTop: 14, borderTop: "1px solid var(--border)", paddingTop: 12 }}>
          {conversation.length > 0 && (
            <div style={{ maxHeight: 300, overflowY: "auto", marginBottom: 10 }}>
              {conversation.map((m, i) => (
                <div key={i} style={{ marginBottom: 10 }}>
                  <div style={{
                    fontSize: 10, textTransform: "uppercase", letterSpacing: "0.15em",
                    color: m.role === "user" ? "var(--text-faint)" : "var(--accent)",
                    fontFamily: "var(--font-sans)", marginBottom: 3,
                  }}>
                    {m.role === "user" ? "You" : thinker.name}
                  </div>
                  <div style={{
                    fontSize: 13, color: "var(--text-dim)", lineHeight: 1.65,
                    fontFamily: m.role === "user" ? "var(--font-sans)" : "var(--font)",
                    whiteSpace: "pre-wrap",
                  }}>
                    {m.content}
                  </div>
                </div>
              ))}
            </div>
          )}
          <div style={{ display: "flex", gap: 8 }}>
            <input
              type="text"
              placeholder={`Ask ${thinker.name} a follow-up…`}
              value={askInput}
              onChange={e => setAskInput(e.target.value)}
              onKeyDown={e => { if (e.key === "Enter") interrogate(); }}
              style={{
                flex: 1, padding: "8px 12px", fontSize: 13,
                fontFamily: "var(--font-sans)", background: "var(--bg-surface, #111)",
                border: "1px solid var(--border)", borderRadius: 6,
                color: "var(--text)", outline: "none",
              }}
            />
            <button onClick={interrogate} disabled={askLoading || !askInput.trim()} style={{
              padding: "8px 14px", fontSize: 12, fontFamily: "var(--font-sans)",
              background: "var(--accent)", color: "#111", border: "none",
              borderRadius: 6, cursor: "pointer", fontWeight: 600,
              opacity: (askLoading || !askInput.trim()) ? 0.4 : 1,
            }}>
              {askLoading ? "…" : "Ask"}
            </button>
          </div>
        </div>
      )}
    </div>
  );
}


// ── Profile Card with inline rename ──
function ProfileCard({ p, active, onSelect, onRenamed }) {
  const [editing, setEditing] = React.useState(false);
  const [draft, setDraft] = React.useState(p.name);
  const inputRef = React.useRef(null);

  React.useEffect(() => {
    if (editing) { setDraft(p.name); setTimeout(() => inputRef.current?.select(), 30); }
  }, [editing]);

  async function commitRename() {
    const name = draft.trim();
    if (!name || name === p.name) { setEditing(false); return; }
    try {
      const res = await api(`/profiles/${p.profile_id}/name`, {
        method: "PATCH",
        body: JSON.stringify({ name }),
      });
      onRenamed(res.name);
    } catch(e) { toast("Couldn't rename — try again", "error"); }
    setEditing(false);
  }

  function handleKeyDown(e) {
    if (e.key === "Enter") commitRename();
    if (e.key === "Escape") setEditing(false);
  }

  return (
    <div
      className={`profile-card ${active ? "active" : ""}`}
      onClick={() => { if (!editing) onSelect(); }}
      style={{ display: "flex", alignItems: "center", gap: 10, position: "relative" }}
    >
      <ProfileAvatar avatar={p.avatar} size={28} style={{ "data-profile-id": p.profile_id }} />
      <div style={{ flex: 1, minWidth: 0 }}>
        {editing ? (
          <input
            ref={inputRef}
            value={draft}
            onChange={e => setDraft(e.target.value)}
            onBlur={commitRename}
            onKeyDown={handleKeyDown}
            onClick={e => e.stopPropagation()}
            maxLength={60}
            style={{
              width: "100%", background: "var(--bg-hover)", border: "1px solid var(--accent)",
              borderRadius: 4, padding: "2px 6px", color: "var(--text)",
              fontFamily: "var(--font-serif)", fontSize: 15, outline: "none",
            }}
          />
        ) : (
          <div className="profile-card-name" style={{ display: "flex", alignItems: "center", gap: 5 }}>
            <span style={{ flex: 1, minWidth: 0, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{p.name}</span>
          </div>
        )}
        <div className="profile-card-meta">{p.refinement_count} refinements</div>
      </div>
      {!editing && (
        <button
          onClick={e => { e.stopPropagation(); setEditing(true); }}
          title="Rename"
          style={{
            background: "none", border: "none", cursor: "pointer",
            color: "var(--text-dim)", padding: "2px 4px", borderRadius: 4,
            opacity: 0, transition: "opacity 0.15s",
            fontSize: 12, lineHeight: 1, flexShrink: 0,
          }}
          className="rename-btn"
        >✎</button>
      )}
    </div>
  );
}

function AvatarPicker({ profile, onSaved, onClose }) {
  const [uploading, setUploading] = React.useState(false);
  const fileRef = React.useRef();

  async function pickPreset(emoji) {
    await api(`/profiles/${profile.profile_id}/avatar`, {
      method: "PATCH",
      body: JSON.stringify({ avatar: emoji }),
    });
    onSaved(emoji);
  }

  async function handleUpload(e) {
    const file = e.target.files?.[0];
    if (!file) return;
    setUploading(true);
    try {
      const form = new FormData();
      form.append("file", file);
      const res = await fetch(`/profiles/${profile.profile_id}/avatar/upload`, {
        method: "POST",
        headers: { Authorization: `Bearer ${getToken()}` },
        body: form,
      });
      const data = await res.json();
      onSaved(data.avatar);
    } catch {
      toast("Upload failed — try a smaller image.");
    } finally {
      setUploading(false);
    }
  }

  return (
    <div style={{
      position: "fixed", inset: 0, background: "rgba(0,0,0,0.6)",
      display: "flex", alignItems: "center", justifyContent: "center", zIndex: 200,
    }} onClick={onClose}>
      <div style={{
        background: "#1a1a1a", border: "1px solid var(--border-light)",
        borderRadius: 12, padding: 24, width: 320, maxWidth: "90vw",
        boxShadow: "0 24px 60px rgba(0,0,0,0.7)",

        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
          <span style={{ fontFamily: "var(--font-serif)", fontSize: 15, color: "var(--text)" }}>Choose an avatar</span>
          <button onClick={onClose} style={{ background: "none", border: "none", color: "var(--text-dim)", cursor: "pointer", fontSize: 18 }}>×</button>
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(5, 1fr)", gap: 8, marginBottom: 16 }}>

            <button key={key} title={label} onClick={() => pickPreset(key)} style={{
              background: profile.avatar === key ? "var(--accent-glow)" : "var(--bg-hover)",
              border: profile.avatar === key ? "1px solid var(--accent)" : "1px solid var(--border-light)",
              borderRadius: 8, padding: "10px 0", cursor: "pointer",
              fontSize: 22, display: "flex", alignItems: "center", justifyContent: "center",
              transition: "all 0.15s",
            }}>{key}</button>
          ))}
        </div>
        <button onClick={() => fileRef.current?.click()} disabled={uploading} style={{
          width: "100%", padding: "10px", border: "1px dashed var(--border-light)",
          borderRadius: 8, background: "none", color: uploading ? "var(--text-dim)" : "var(--text)",
          cursor: uploading ? "default" : "pointer", fontFamily: "var(--font-sans)", fontSize: 13,

      </div>
    </div>
  );
}

// ── Voice Maturity System ──
const VOICE_MILESTONES = [
  { at: 0,  label: "Blank Slate",     icon: "◇", desc: "No refinements yet" },
  { at: 1,  label: "First Words",     icon: "◈", desc: "Voice is learning" },
  { at: 3,  label: "Taking Shape",    icon: "◆", desc: "Patterns emerging" },
  { at: 5,  label: "Finding Form",    icon: "⬡", desc: "Distinctive traits locked in" },
  { at: 10, label: "Apprentice",      icon: "✦", desc: "Reliable first drafts" },
  { at: 20, label: "Journeyman",      icon: "⟐", desc: "Nuance and range" },
  { at: 35, label: "Craftsman",       icon: "◎", desc: "Precision at sentence level" },
  { at: 50, label: "Master Voice",    icon: "✶", desc: "Indistinguishable from you" },
];

function getVoiceMaturity(count) {
  let current = VOICE_MILESTONES[0];
  let next = VOICE_MILESTONES[1];
  for (let i = VOICE_MILESTONES.length - 1; i >= 0; i--) {
    if (count >= VOICE_MILESTONES[i].at) {
      current = VOICE_MILESTONES[i];
      next = VOICE_MILESTONES[i + 1] || null;
      break;
    }
  }
  const progress = next
    ? Math.min(1, (count - current.at) / (next.at - current.at))
    : 1;
  return { current, next, progress, milestoneIndex: VOICE_MILESTONES.indexOf(current) };
}

function VoiceMaturityMeter({ refinementCount }) {
  const { current, next, progress, milestoneIndex } = getVoiceMaturity(refinementCount);
  const totalStages = VOICE_MILESTONES.length;
  const overallProgress = (milestoneIndex + progress) / (totalStages - 1);

  return (
    <div style={{
      margin: "0 0 24px", padding: "18px 20px",
      background: "rgba(200,164,110,0.03)", border: "1px solid rgba(200,164,110,0.1)",
      borderRadius: 12,
    }}>
      {/* Top row: icon + stage name + count */}
      <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 14 }}>
        <div style={{
          width: 40, height: 40, borderRadius: 10,
          background: `linear-gradient(135deg, rgba(200,164,110,${0.06 + overallProgress * 0.12}), rgba(200,164,110,${0.02 + overallProgress * 0.06}))`,
          border: "1px solid rgba(200,164,110,0.15)",
          display: "flex", alignItems: "center", justifyContent: "center",
          fontSize: 20, flexShrink: 0,
        }}>
          {current.icon}
        </div>
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ fontSize: 14, fontWeight: 600, color: "var(--text)", fontFamily: "var(--font-sans)" }}>
            {current.label}
          </div>
          <div style={{ fontSize: 11, color: "var(--text-dim)", fontFamily: "var(--font-sans)" }}>
            {current.desc}
          </div>
        </div>
        <div style={{
          padding: "4px 10px", borderRadius: 8,
          background: "rgba(200,164,110,0.08)", border: "1px solid rgba(200,164,110,0.12)",
          textAlign: "center", flexShrink: 0,
        }}>
          <div style={{ fontSize: 16, fontWeight: 700, color: "var(--accent)", fontFamily: "var(--font-sans)", lineHeight: 1.2 }}>
            {refinementCount}
          </div>
        </div>
      </div>

      {/* Progress bar — taller, more visual */}
      <div style={{
        height: 6, background: "rgba(200,164,110,0.06)", borderRadius: 3,
        overflow: "hidden", marginBottom: 10,
      }}>
        <div style={{
          height: "100%", borderRadius: 3,
          background: "linear-gradient(90deg, var(--accent), #e8c87a)",
          width: `${Math.max(overallProgress * 100, 2)}%`,
          transition: "width 0.6s ease",
          boxShadow: overallProgress > 0.05 ? "0 0 8px rgba(217,168,60,0.3)" : "none",
        }} />
      </div>

      {/* Milestone markers with labels on hover */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: next ? 10 : 0 }}>
        {VOICE_MILESTONES.map((m, i) => (
          <div key={i} title={`${m.label} — ${m.at} refinements`}
            style={{
              display: "flex", flexDirection: "column", alignItems: "center", gap: 3,
              cursor: "default",
            }}
          >
            <div style={{
              width: i <= milestoneIndex ? 9 : 7,
              height: i <= milestoneIndex ? 9 : 7,
              borderRadius: "50%",
              background: i <= milestoneIndex ? "var(--accent)" : "rgba(200,164,110,0.12)",
              border: i === milestoneIndex + 1 ? "1px solid rgba(200,164,110,0.3)" : "none",
              transition: "all 0.3s",
              boxShadow: i === milestoneIndex ? "0 0 6px rgba(217,168,60,0.4)" : "none",
            }} />
          </div>
        ))}
      </div>

      {/* Next milestone callout */}
      {next && (
        <div style={{
          fontSize: 12, color: "var(--text-dim)", fontFamily: "var(--font-sans)",
          textAlign: "center", lineHeight: 1.4,
        }}>
          {next.at - refinementCount === 1 ? "1 refinement" : `${next.at - refinementCount} refinements`} to{" "}
          <strong style={{ color: "var(--accent)" }}>{next.label}</strong>
          <span style={{ color: "var(--text-faint)", marginLeft: 4 }}>{next.icon}</span>
        </div>
      )}
    </div>
  );
}

function VoiceDiscoveryQuiz({ profileId, profileName, onComplete }) {
  const [step, setStep] = useState(0);
  const [choices, setChoices] = useState({});
  const [loading, setLoading] = useState(false);

  const pair = DISCOVERY_PAIRS[step];
  const total = DISCOVERY_PAIRS.length;
  const progress = Object.keys(choices).length / total;

  const handleChoice = (choice) => {
    const next = { ...choices, [pair.dimension]: choice };
    setChoices(next);
    if (step < total - 1) {
      setStep(step + 1);
    }
  };

  const handleBack = () => {
    if (step > 0) setStep(step - 1);
  };

  const handleSubmit = async () => {
    setLoading(true);
    try {
      // Build a natural-language description from choices
      const preferences = DISCOVERY_PAIRS.map(p => {
        const c = choices[p.dimension];
        if (!c) return null;
        return c === "a" ? p.aLabel : p.bLabel;
      }).filter(Boolean);

      const description = "VOICE STYLE PREFERENCES (from guided discovery):\n" +
        preferences.map((p, i) => `${i + 1}. ${p}`).join("\n");

      // Save as the first refinement via teach
      await api(`/profiles/${profileId}/teach`, {
        method: "POST",
        body: JSON.stringify({
          message: description,
          command: "principle",
          conversation_history: [],
        }),
      });

      if (onComplete) onComplete();
    } catch (e) { toastError(e.message); }
    setLoading(false);
  };

  const allAnswered = Object.keys(choices).length === total;

  return (
    <div className="write-container">
      <div className="write-section" style={{ maxWidth: 600 }}>
        <div style={{ marginBottom: 24 }}>
          <div style={{ fontSize: 11, textTransform: "uppercase", letterSpacing: 2, color: "var(--accent)", fontFamily: "var(--font-sans)", marginBottom: 6 }}>
            Voice Discovery
          </div>
          <div style={{ fontSize: 22, fontWeight: 700, color: "var(--text)", fontFamily: "var(--font-serif, var(--font))", marginBottom: 6 }}>
            Which sounds more like you?
          </div>
          <div style={{ fontSize: 13, color: "var(--text-dim)", fontFamily: "var(--font-sans)", lineHeight: 1.5 }}>
            Pick the sentence that feels closer to how you write — or how you <em>want</em> to write. No wrong answers.
          </div>
        </div>

        {/* Progress bar */}
        <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 20 }}>
          <div style={{ flex: 1, height: 3, background: "rgba(200,164,110,0.1)", borderRadius: 2, overflow: "hidden" }}>
            <div style={{ height: "100%", width: `${progress * 100}%`, background: "var(--accent)", borderRadius: 2, transition: "width 0.3s ease" }} />
          </div>
          <span style={{ fontSize: 11, color: "var(--text-faint)", fontFamily: "var(--font-sans)", whiteSpace: "nowrap" }}>
            {step + 1} / {total}
          </span>
        </div>

        {/* Dimension label */}
        <div style={{ fontSize: 11, color: "var(--text-faint)", fontFamily: "var(--font-sans)", marginBottom: 12, textTransform: "uppercase", letterSpacing: 1 }}>
          {pair.prompt}
        </div>

        {/* Choice A */}
        <button
          onClick={() => handleChoice("a")}
          style={{
            width: "100%", textAlign: "left", padding: "16px 18px", marginBottom: 10,
            background: choices[pair.dimension] === "a" ? "rgba(200,164,110,0.08)" : "var(--bg-elevated, #141414)",
            border: `1px solid ${choices[pair.dimension] === "a" ? "var(--accent)" : "var(--border)"}`,
            borderRadius: 10, color: "var(--text)", cursor: "pointer",
            fontFamily: "var(--font)", fontSize: 15, lineHeight: 1.7,
            transition: "all 0.15s",
          }}
        >
          <div style={{ marginBottom: 8 }}>{pair.a}</div>
          <div style={{ fontSize: 11, color: choices[pair.dimension] === "a" ? "var(--accent)" : "var(--text-faint)", fontFamily: "var(--font-sans)", fontStyle: "italic" }}>
            {pair.aLabel}
          </div>
        </button>

        {/* Choice B */}
        <button
          onClick={() => handleChoice("b")}
          style={{
            width: "100%", textAlign: "left", padding: "16px 18px", marginBottom: 16,
            background: choices[pair.dimension] === "b" ? "rgba(200,164,110,0.08)" : "var(--bg-elevated, #141414)",
            border: `1px solid ${choices[pair.dimension] === "b" ? "var(--accent)" : "var(--border)"}`,
            borderRadius: 10, color: "var(--text)", cursor: "pointer",
            fontFamily: "var(--font)", fontSize: 15, lineHeight: 1.7,
            transition: "all 0.15s",
          }}
        >
          <div style={{ marginBottom: 8 }}>{pair.b}</div>
          <div style={{ fontSize: 11, color: choices[pair.dimension] === "b" ? "var(--accent)" : "var(--text-faint)", fontFamily: "var(--font-sans)", fontStyle: "italic" }}>
            {pair.bLabel}
          </div>
        </button>

        {/* Navigation */}
        <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
          {step > 0 && (
            <button onClick={handleBack} style={{
              padding: "10px 18px", fontSize: 13, fontFamily: "var(--font-sans)",
              background: "none", border: "1px solid var(--border)", borderRadius: 8,
              color: "var(--text-dim)", cursor: "pointer",
            }}>
              ← Back
            </button>
          )}
          <div style={{ flex: 1 }} />
          {allAnswered && (
            <button className="action-btn" onClick={handleSubmit} disabled={loading} style={{ padding: "12px 28px" }}>
              {loading ? <span>Building your voice<LoadingDots /></span> : "Build my voice →"}
            </button>
          )}
        </div>
      </div>
    </div>
  );
}

function WelcomeScreen({ onCreate, onFind }) {
  const [display, setDisplay] = React.useState("");
  const [exIdx, setExIdx] = React.useState(0);
  const [phase, setPhase] = React.useState("typing"); // typing | pausing | erasing

  React.useEffect(() => {
    const target = VOICE_EXAMPLES[exIdx];
    let timeout;
    if (phase === "typing") {
      if (display.length < target.length) {
        timeout = setTimeout(() => setDisplay(target.slice(0, display.length + 1)), 42);
      } else {
        timeout = setTimeout(() => setPhase("pausing"), 1800);
      }
    } else if (phase === "pausing") {
      timeout = setTimeout(() => setPhase("erasing"), 400);
    } else {
      if (display.length > 0) {
        timeout = setTimeout(() => setDisplay(display.slice(0, -1)), 18);
      } else {
        setExIdx((i) => (i + 1) % VOICE_EXAMPLES.length);
        setPhase("typing");

    return () => clearTimeout(timeout);
  }, [display, exIdx, phase]);

  return (

// ── Particle Field — ambient background for the Voice content area ──
function ParticleField() {
  const canvasRef = React.useRef(null);
  const animRef = React.useRef(null);
  const mouseRef = React.useRef({ x: -9999, y: -9999 });

  React.useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext("2d");

    let W, H;
    const resize = () => {
      W = canvas.width = canvas.offsetWidth;
      H = canvas.height = canvas.offsetHeight;
    };
    resize();
    const resizeObs = new ResizeObserver(resize);
    resizeObs.observe(canvas);

    const COUNT = 88;
    const BASE_CONNECT_DIST = 110;
    const MOUSE_DIST = 90;

    // ── Reactive state — responds to voice thinking ──
    let thinkingIntensity = 0;     // 0 = idle, 1 = fully thinking
    let targetIntensity = 0;
    // Pulse travelers — lines that move toward center during thinking
    let travelers = [];

    const onThinkStart = () => { targetIntensity = 1; spawnTravelers(); };
    const onThinkEnd = () => {
      targetIntensity = 0;
      thinkingIntensity = 0;  // Snap to zero immediately — no lingering glow
      travelers = [];          // Clear all pulse travelers instantly
      // Scatter particles back to random positions across the full canvas
      particles.forEach(p => {
        p.x = Math.random() * (W || 800);
        p.y = Math.random() * (H || 600);
        p.vx = (Math.random() - 0.5) * 0.3;
        p.vy = (Math.random() - 0.5) * 0.3;
        p.opacity = p.baseOpacity;
      });
    };
    window.addEventListener("voice:think:start", onThinkStart);
    window.addEventListener("voice:think:end", onThinkEnd);

    const spawnTravelers = () => {
      if (!W || !H) return;
      const cx = W / 2, cy = H / 2;
      for (let i = 0; i < 5; i++) {
        // Start from random edges
        const angle = Math.random() * Math.PI * 2;
        const edgeDist = Math.max(W, H) * 0.6;
        travelers.push({
          x: cx + Math.cos(angle) * edgeDist,
          y: cy + Math.sin(angle) * edgeDist,
          tx: cx + (Math.random() - 0.5) * 60,
          ty: cy + (Math.random() - 0.5) * 60,
          progress: 0,
          speed: 0.004 + Math.random() * 0.006,
          opacity: 0.15 + Math.random() * 0.25,
        });
      }
    };

    const particles = Array.from({ length: COUNT }, () => ({
      x: Math.random() * (W || 800),
      y: Math.random() * (H || 600),
      vx: (Math.random() - 0.5) * 0.22,
      vy: (Math.random() - 0.5) * 0.22,
      r: 1.2 + Math.random() * 1.6,
      baseOpacity: 0.28 + Math.random() * 0.48,
      opacity: 0.28 + Math.random() * 0.48,
      speed: 0.6 + Math.random() * 0.8,
    }));

    const onMouseMove = (e) => {
      const rect = canvas.getBoundingClientRect();
      mouseRef.current = { x: e.clientX - rect.left, y: e.clientY - rect.top };
    };
    const onMouseLeave = () => { mouseRef.current = { x: -9999, y: -9999 }; };
    const parent = canvas.parentElement;
    parent.addEventListener("mousemove", onMouseMove);
    parent.addEventListener("mouseleave", onMouseLeave);

    const draw = () => {
      if (!W || !H) { animRef.current = requestAnimationFrame(draw); return; }
      ctx.clearRect(0, 0, W, H);
      const mx = mouseRef.current.x, my = mouseRef.current.y;

      // ── Ease thinking intensity ──
      thinkingIntensity += (targetIntensity - thinkingIntensity) * 0.03;
      const ti = thinkingIntensity;
      const cx = W / 2, cy = H / 2;

      // Dynamic values based on thinking state
      const connectDist = BASE_CONNECT_DIST + ti * 50;     // more connections when thinking
      const opacityBoost = ti * 0.25;                       // brighter when thinking
      const gravityStrength = ti * 0.0008;                   // gentle pull toward center

      // Update positions
      particles.forEach(p => {
        // Mouse repulsion
        const dx = p.x - mx, dy = p.y - my;
        const d = Math.sqrt(dx * dx + dy * dy);
        if (d < MOUSE_DIST && d > 0) {
          const force = (1 - d / MOUSE_DIST) * 0.4;
          p.vx += (dx / d) * force;
          p.vy += (dy / d) * force;
        }

        // ── Thinking gravity — gentle pull toward center ──
        if (ti > 0.01) {
          const gcx = p.x - cx, gcy = p.y - cy;
          const gd = Math.sqrt(gcx * gcx + gcy * gcy);
          if (gd > 30) {
            p.vx -= (gcx / gd) * gravityStrength * gd;
            p.vy -= (gcy / gd) * gravityStrength * gd;
          }
        }

        p.vx *= 0.985;
        p.vy *= 0.985;
        p.x += p.vx * p.speed;
        p.y += p.vy * p.speed;

        // Wrap edges
        if (p.x < -10) p.x = W + 10;
        if (p.x > W + 10) p.x = -10;
        if (p.y < -10) p.y = H + 10;
        if (p.y > H + 10) p.y = -10;
      });

      // Draw connections
      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
          const a = particles[i], b = particles[j];
          const dx = b.x - a.x, dy = b.y - a.y;
          const d = Math.sqrt(dx * dx + dy * dy);
          if (d < connectDist) {
            const alpha = (1 - d / connectDist) * (0.22 + opacityBoost * 0.15);
            ctx.beginPath();
            ctx.moveTo(a.x, a.y);
            ctx.lineTo(b.x, b.y);
            ctx.strokeStyle = `rgba(217,168,60,${alpha})`;
            ctx.lineWidth = 0.8 + ti * 0.3;
            ctx.stroke();
          }
        }
      }

      // ── Draw pulse travelers (lines moving toward center) ──
      travelers = travelers.filter(t => t.progress < 1);
      travelers.forEach(t => {
        t.progress += t.speed;
        const p = t.progress;
        const x = t.x + (t.tx - t.x) * p;
        const y = t.y + (t.ty - t.y) * p;
        const tailP = Math.max(0, p - 0.15);
        const tailX = t.x + (t.tx - t.x) * tailP;
        const tailY = t.y + (t.ty - t.y) * tailP;
        const fadeAlpha = t.opacity * (p < 0.2 ? p / 0.2 : p > 0.8 ? (1 - p) / 0.2 : 1);
        ctx.beginPath();
        ctx.moveTo(tailX, tailY);
        ctx.lineTo(x, y);
        ctx.strokeStyle = `rgba(217,168,60,${fadeAlpha})`;
        ctx.lineWidth = 1.2;
        ctx.stroke();
        // Leading dot
        ctx.beginPath();
        ctx.arc(x, y, 1.5, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(217,168,60,${fadeAlpha * 1.5})`;
        ctx.fill();
      });

      // Spawn new travelers periodically while thinking
      if (ti > 0.3 && Math.random() < 0.02 * ti) {
        spawnTravelers();
      }

      // Draw particles
      particles.forEach(p => {
        const dx = p.x - mx, dy = p.y - my;
        const d = Math.sqrt(dx * dx + dy * dy);
        const mouseBoost = d < MOUSE_DIST ? (1 - d / MOUSE_DIST) * 0.55 : 0;
        const alpha = Math.min(1, p.baseOpacity + mouseBoost + opacityBoost);

        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r + mouseBoost * 1.8 + ti * 0.4, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(217,168,60,${alpha})`;
        ctx.fill();
      });

      animRef.current = requestAnimationFrame(draw);
    };

    draw();
    return () => {
      cancelAnimationFrame(animRef.current);
      resizeObs.disconnect();
      parent.removeEventListener("mousemove", onMouseMove);
      parent.removeEventListener("mouseleave", onMouseLeave);
      window.removeEventListener("voice:think:start", onThinkStart);
      window.removeEventListener("voice:think:end", onThinkEnd);
    };
  }, []);

  return (
    <canvas
      ref={canvasRef}
      style={{
        position: "absolute", inset: 0, width: "100%", height: "100%",
        pointerEvents: "none", display: "block", zIndex: -1,
      }}
    />
  );
}

function VoiceNav({ mode, setMode, refinementCount }) {
  const [open, setOpen] = useState(false);
  const ref = React.useRef(null);
  const active = VOICE_MODES.some(m => m.key === mode) || mode === "home";
  const untrained = (refinementCount || 0) === 0;

  React.useEffect(() => {
    if (!open) return;
    const handler = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener("mousedown", handler);
    return () => document.removeEventListener("mousedown", handler);
  }, [open]);

  const handleSelect = (m) => {
    if (untrained && m.needsVoice) {
      setOpen(false);
      setMode("voice");
      toast("Teach the voice something first — then this unlocks.");
      return;
    }
    setMode(m.key);
    setOpen(false);
  };

  return (
    <div className="tools-menu-wrap" ref={ref} style={{ position: "relative" }}>
      <button
        className={`topbar-btn ${active ? "active" : ""}`}
        onClick={() => setOpen(o => !o)}
        style={{ letterSpacing: "0.04em" }}
      >
        Voice {open ? "▲" : "▾"}
      </button>
      {open && (
        <div className="tools-dropdown" style={{ minWidth: 180 }}>
          {VOICE_MODES.map(m => {
            const locked = untrained && m.needsVoice;
            return (
              <button
                key={m.key}
                className={`tools-dropdown-item ${mode === m.key ? "active" : ""}`}
                onClick={() => handleSelect(m)}
                style={{ display: "flex", flexDirection: "column", alignItems: "flex-start", gap: 1, opacity: locked ? 0.4 : 1 }}
              >
                <span style={{ display: "flex", alignItems: "center", gap: 6 }}>
                  {m.label}
                  {m.key === "teach" && untrained && (
                    <span style={{ fontSize: 9, color: "var(--accent)", letterSpacing: "0.12em", textTransform: "uppercase" }}>Start here</span>
                  )}
                  {locked && <span style={{ fontSize: 9, opacity: 0.6 }}>🔒</span>}
                </span>
                <span style={{ fontSize: 10, opacity: 0.5, fontWeight: 400 }}>{m.desc}</span>
              </button>
            );
          })}
        </div>
      )}
    </div>
  );
}
