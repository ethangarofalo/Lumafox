function App() {
  const [user, setUserState] = useState(getUser);
  const [profiles, setProfiles] = useState([]);
  const [activeProfile, setActiveProfile] = useState(null);
  const [mode, setMode] = useState("voice");
  const [showCouncil, setShowCouncil] = useState(false);
  const [mobileSidebarOpen, setMobileSidebarOpen] = useState(false);
  const [showCreate, setShowCreate] = useState(false);
  const [showFind, setShowFind] = useState(false);
  const [showAuth, setShowAuth] = useState(false);
  const [authInitialMode, setAuthInitialMode] = useState("login");
  const [showOnboarding, setShowOnboarding] = useState(() => !localStorage.getItem("lumafox_onboarded"));
  const [pendingDesc, setPendingDesc] = useState("");
  const [confirmDelete, setConfirmDelete] = useState(false);
  const [historySignal, setHistorySignal] = useState(0);
  const [loaded, setLoaded] = useState(false);
  const [showAvatarPicker, setShowAvatarPicker] = useState(false);

  const isGuest = user?.user_id?.startsWith("guest-");
  const [sessionReady, setSessionReady] = useState(false);

  // Open auth modal immediately if landing page sent ?signin=1
  useEffect(() => {
    const params = new URLSearchParams(window.location.search);
    if (params.get("signin") === "1") {
      setShowAuth(true);
      window.history.replaceState({}, "", "/app");
    } else if (params.get("reset")) {
      setAuthInitialMode("reset");
      setShowAuth(true);
      // keep ?reset= in URL so AuthModal can read it; it will clear it on submit
    }
  }, []);

  // Jump straight to Council if landing page sent ?council=1
  useEffect(() => {
    if (new URLSearchParams(window.location.search).get("council") === "1") {
      setShowCouncil(true);
      window.history.replaceState({}, "", "/app");
    }
  }, []);

  // On every page load: silently refresh a real user's token to keep them logged in.
  // IMPORTANT: sessionReady gates all downstream API calls (loadProfiles, etc.)
  // so they don't fire with a stale token and trigger a false 401 → logout.
  useEffect(() => {
    const existing = getToken();
    const storedUser = getUser();
    const isRealUser = storedUser && !storedUser.user_id?.startsWith("guest-");

    if (existing && isRealUser) {
      // Silently refresh — extends expiry window so the session stays alive
      fetch(`${API}/auth/refresh`, {
        method: "POST",
        headers: { "Authorization": `Bearer ${existing}`, "Content-Type": "application/json" },
      })
        .then(r => {
          if (r.ok) return r.json();
          // Only treat 401 as a real auth failure — everything else is transient
          if (r.status === 401) return Promise.reject("auth_expired");
          return Promise.reject("transient");
        })
        .then(data => {
          setToken(data.token);
          setUser(data.user);
          setUserState(data.user);
          setSessionReady(true);
        })
        .catch(err => {
          if (err === "auth_expired") {
            // Token truly expired or invalid — clear and create a guest session
            clearToken(); clearUser();
            fetch(`${API}/auth/guest`, { method: "POST", headers: { "Content-Type": "application/json" } })
              .then(r => r.json())
              .then(data => { setToken(data.token); setUser(data.user); setUserState(data.user); setSessionReady(true); })
              .catch(() => setSessionReady(true));
          } else {
            // Network error, server restarting, cold start — keep existing session intact
            console.warn("Token refresh failed (transient), keeping existing session");
            setSessionReady(true);
          }
        });
    } else if (!existing) {
      // No token at all — create guest session
      fetch(`${API}/auth/guest`, { method: "POST", headers: { "Content-Type": "application/json" } })
        .then(r => r.json())
        .then(data => { setToken(data.token); setUser(data.user); setUserState(data.user); setSessionReady(true); })
        .catch(() => setSessionReady(true));
    } else {
      // Existing guest token — just proceed
      setSessionReady(true);
    }
  }, []);

  const loadProfiles = useCallback(async () => {
    try {
      const list = await api("/profiles");
      setProfiles(list);
      setActiveProfile(prev => prev || list[0] || null);
    } catch (e) { console.error("Failed to load profiles:", e); }
    setLoaded(true);
  }, []);

  // Gate downstream API calls behind sessionReady so we never fire with a stale token
  useEffect(() => { if (user && sessionReady) loadProfiles(); }, [user, sessionReady, loadProfiles]);

  const handleAuth = async (u) => {
    setUserState(u);
    setShowAuth(false);
    await loadProfiles();
  };

  const handleLogout = () => {
    clearToken(); clearUser();
    // Create a new guest session immediately after logout
    fetch(`${API}/auth/guest`, { method: "POST", headers: { "Content-Type": "application/json" } })
      .then(r => r.json())
      .then(data => { setToken(data.token); setUser(data.user); setUserState(data.user); setProfiles([]); setActiveProfile(null); setLoaded(false); })
      .catch(() => { setUserState(null); setProfiles([]); setActiveProfile(null); });
  };

  const handleCreate = (profile) => {
    setProfiles(prev => [profile, ...prev]);
    setActiveProfile(profile);
    setShowCreate(false);
    setMode("voice");
  };

  const handleRefinementSaved = (count) => {
    setActiveProfile(prev => prev ? { ...prev, refinement_count: count } : prev);
    setProfiles(prev => prev.map(p =>
      p.profile_id === activeProfile?.profile_id ? { ...p, refinement_count: count } : p
    ));
  };

  const handleFindResult = (description) => {
    setShowFind(false);
    setPendingDesc(description);
    setShowCreate(true);
  };

  const handleDelete = () => { if (activeProfile) setConfirmDelete(true); };

  const confirmDeleteProfile = async () => {
    setConfirmDelete(false);
    if (!activeProfile) return;
    const name = activeProfile.name;
    try {
      await api(`/profiles/${activeProfile.profile_id}`, { method: "DELETE" });

      setProfiles(remaining);
      setActiveProfile(remaining[0] || null);
      toastSuccess(`"${name}" deleted`);
    } catch (e) { toastError(e.message); }
  };

  // Show spinner only on very first load before guest session is established
  if (!user) {
    return (
      <div className="app">
        <div className="empty-state">
          <div style={{ color: "var(--text-dim)" }}>Loading<LoadingDots /></div>
        </div>
      </div>
    );
  }

  return (
    <div className="app">
      {/* Top bar */}
      <div className="topbar">
        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
          <a href="/?home=1" className="topbar-logo" style={{ display: "flex", alignItems: "center", gap: 8, textDecoration: "none", color: "inherit" }}>
            <img src="/static/lumafox-icon.png" alt="Lumafox" style={{ height: 34, width: "auto", display: "block" }} />
            <span>Lumafox</span>

          {/* Mobile: toggle sidebar */}
          <button

            ≡ Voices
          </button>
        </div>
        {/* Centered segmented toggle */}

            Voice

                          : mode === t.key;
                        return (
                          <button key={t.key} onClick={() => setMode(t.key)} style={{
                            padding: "4px 10px",
                            fontSize: 12, fontFamily: "var(--font-sans)",
                            fontWeight: isActive ? 600 : 400,
                            background: isActive ? "rgba(200,164,110,0.1)" : "none",
                            border: "none", borderRadius: 6,
                            color: isActive ? "var(--accent)" : "var(--text-dim)",
                            cursor: "pointer", transition: "all 0.15s", whiteSpace: "nowrap",
                          }}>{t.label}</button>
                        );
                      })}
                    </div>
                  )}
                </div>
                <div className="profile-header-actions" style={{ position: "relative" }}>
                  <ProfileMenu
                    onExport={() => setMode("export")}
                    onDelete={handleDelete}
                  />
                </div>
              </div>

              {/* Keep all views mounted so state survives tab switches */}
              {mode === "discover" && (
                <VoiceDiscoveryQuiz
                  profileId={activeProfile.profile_id}
                  profileName={activeProfile.name}
                  onComplete={() => { handleRefinementSaved(1); setMode("voice"); toastSuccess("Voice style mapped! Now teach it details."); }}
                />
              )}
              <div style={{ display: (mode === "voice" || mode === "teach" || mode === "write" || mode === "translate") ? "contents" : "none", position: "relative", zIndex: 1 }}>
                <VoiceView profileId={activeProfile.profile_id} profileName={activeProfile.name} refinementCount={activeProfile.refinement_count} onRefinementSaved={handleRefinementSaved} onDiscover={() => setMode("discover")} openHistorySignal={historySignal} />
              </div>
              <div style={{ display: mode === "analyze" ? "contents" : "none", position: "relative", zIndex: 1 }}>
                <AnalyzeView profileId={activeProfile.profile_id} profileName={activeProfile.name} />
              </div>
              <div style={{ display: mode === "upload" ? "contents" : "none", position: "relative", zIndex: 1 }}>
                <UploadView profileId={activeProfile.profile_id} />
              </div>
              <div style={{ display: mode === "export" ? "contents" : "none", position: "relative", zIndex: 1 }}>
                <ExportView profileId={activeProfile.profile_id} />
              </div>
            </>
          ) : (
            <WelcomeScreen onCreate={() => setShowCreate(true)} onFind={() => setShowFind(true)} />
          )}
        </div>
      </div>

      {/* Modals */}
      {showOnboarding && (
        <OnboardingTour onDone={(dest) => {
          localStorage.setItem("lumafox_onboarded", "1");
          setShowOnboarding(false);
          if (dest === "council") setShowCouncil(true);
        }} />
      )}
      {showCreate && (
        <CreateProfileModal
          onClose={() => { setShowCreate(false); setPendingDesc(""); }}
          onCreate={handleCreate}
          prefillDesc={pendingDesc}
        />
      )}
      {showFind && <FindVoiceModal onClose={() => setShowFind(false)} onResult={handleFindResult} />}
      {showAvatarPicker && activeProfile && (
        <AvatarPicker
          profile={activeProfile}
          onSaved={(newAvatar) => {
            setActiveProfile(prev => ({ ...prev, avatar: newAvatar }));
            setProfiles(prev => prev.map(p => p.profile_id === activeProfile.profile_id ? { ...p, avatar: newAvatar } : p));
            setShowAvatarPicker(false);
          }}
          onClose={() => setShowAvatarPicker(false)}
        />
      )}
      {showAuth && (
        <AuthModal
          onClose={() => { setShowAuth(false); setAuthInitialMode("login"); }}
          onAuth={handleAuth}
          guestId={isGuest ? user.user_id : null}
          initialMode={authInitialMode}
        />
      )}
      {confirmDelete && activeProfile && (
        <ConfirmModal
          title={`Delete "${activeProfile.name}"?`}
          body="This will permanently delete the voice profile and all its refinements. This cannot be undone."
          confirmLabel="Delete Profile"
          onConfirm={confirmDeleteProfile}
          onCancel={() => setConfirmDelete(false)}
        />
      )}
      <ToastStack />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
