function TeachView({ profileId, profileName, refinementCount, onRefinementSaved }) {
  const isNew = refinementCount === 0;

  // ── Session ID — one per mount, encodes start time ──
  const [sessionId] = useState(() => new Date().toISOString().replace(/[:.]/g, "-"));

  // ── Restore from localStorage on mount; reset when profile changes ──
  const [messages, setMessages] = useState(() => {
    try {
      const saved = localStorage.getItem(`voice_conv_${profileId}`);
      if (saved) {
        const { sid, msgs } = JSON.parse(saved);
        if (msgs && msgs.length > 0) return msgs;
      }
    } catch {}
    return isNew ? [{ role: "agent", content: ONBOARDING_GREETING, isGreeting: true }] : [];
  });

  const [input, setInput] = useState("");
  const [command, setCommand] = useState("auto");   // "auto" is the natural default
  const [loading, setLoading] = useState(false);
  const [showGuide, setShowGuide] = useState(false);
  const [showHistory, setShowHistory] = useState(false);
  const [advancedMode, setAdvancedMode] = useState(false);  // hidden by default
  const [savingPicker, setSavingPicker] = useState(null); // { agentMsg, userMsg, idx }
  const [inlineCouncil, setInlineCouncil] = useState(null); // { question } — triggered by "summon the council"
  const messagesEnd = useRef(null);
  const textareaRef = useRef(null);

  // Count only real user turns (not the greeting)
  const userTurns = messages.filter(m => m.role === "user").length;
  // Advanced mode shows explicit commands; in normal mode everything goes through "auto"
  const effectiveCommand = advancedMode ? command : "auto";

  // ── Scroll to bottom ──
  useEffect(() => { messagesEnd.current?.scrollIntoView({ behavior: "smooth" }); }, [messages]);

  // ── Reset on profile switch ──
  useEffect(() => {
    try {
      const saved = localStorage.getItem(`voice_conv_${profileId}`);
      if (saved) {
        const { msgs } = JSON.parse(saved);
        if (msgs && msgs.length > 0) { setMessages(msgs); return; }
      }
    } catch {}
    setMessages(refinementCount === 0 ? [{ role: "agent", content: ONBOARDING_GREETING, isGreeting: true }] : []);
  }, [profileId]);

  // ── Persist to localStorage whenever messages change ──
  useEffect(() => {
    if (messages.length === 0) return;
    try {
      localStorage.setItem(`voice_conv_${profileId}`, JSON.stringify({ sid: sessionId, msgs: messages }));
    } catch {}
  }, [messages, profileId, sessionId]);

  // ── Save to server (fire-and-forget after each AI response) ──
  const saveToServer = (msgs) => {
    const serializable = msgs
      .filter(m => !m.isGreeting)
      .map(m => ({ role: m.role, content: m.content, command: m.command || null }));
    if (serializable.length === 0) return;
    api(`/profiles/${profileId}/conversations`, {
      method: "POST",
      body: JSON.stringify({ session_id: sessionId, messages: serializable }),
    }).catch(() => {}); // silent fail — localStorage is the safety net
  };

  const send = async () => {
    if (!input.trim() || loading) return;
    const text = input.trim();
    setInput("");

    // ── "Summon the council" intercept ──
    const councilTrigger = /summon\s+the\s+council(?:\s+on\s+this)?/i;
    if (councilTrigger.test(text)) {
      const question = text.replace(councilTrigger, "").replace(/^[\s,.:]+|[\s,.:]+$/g, "").trim();
      setInlineCouncil({ question: question || text });
      const summonMsg = [...messages, { role: "user", content: text, command: "auto" },
        { role: "agent", content: "⚖️ The council has been summoned.", isSummon: true }];
      setMessages(summonMsg);
      setLoading(false);
      return;
    }

    const activeCommand = effectiveCommand;
    const nextMessages = [...messages, { role: "user", content: text, command: activeCommand }];
    setMessages(nextMessages);
    setLoading(true);

    try {
      const history = messages
        .filter(m => !m.isGreeting)
        .slice(-8)
        .map(m => ({ role: m.role === "user" ? "user" : "agent", content: m.content }));

      if (isNew && userTurns === 0) {
        history.unshift({ role: "agent", content: ONBOARDING_GREETING });
      }

      const result = await api(`/profiles/${profileId}/teach`, {
        method: "POST",
        body: JSON.stringify({ message: text, command: activeCommand, conversation_history: history }),
      });
      const saved = result.refinement_saved ? result.refinement_type : null;
      const withResponse = [...nextMessages, {
        role: "agent", content: result.response,
        refinement: saved, count: result.refinement_count,
        // track the preceding user message index for save-as-refinement
        prevUserIdx: nextMessages.length - 1,
      }];
      setMessages(withResponse);
      saveToServer(withResponse);
      if (saved) {
        toastSuccess(`${saved} saved — ${result.refinement_count} total refinements`);
        onRefinementSaved && onRefinementSaved(result.refinement_count);
      }
    } catch (e) {
      const withErr = [...nextMessages, { role: "agent", content: `Error: ${e.message}` }];
      setMessages(withErr);
      toastError(e.message);
    }
    setLoading(false);
    setTimeout(() => textareaRef.current?.focus(), 50);
  };

  const handleKeyDown = (e) => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
  };

  const DECISION_KEYWORDS = /\b(should|decide|deciding|choice|choose|whether|dilemma|torn|weighing|what if|ought|best path|right move|right choice|is it worth|do i|do we|should i|should we)\b/i;
  const showCouncilOrb = input.length > 20 && DECISION_KEYWORDS.test(input) && !inlineCouncil;

  const handleInput = (e) => {
    setInput(e.target.value);
    e.target.style.height = "auto";
    e.target.style.height = Math.min(e.target.scrollHeight, 160) + "px";
  };

  const startNewConversation = () => {
    // Save current session first, then reset
    saveToServer(messages);
    setMessages(refinementCount === 0 ? [{ role: "agent", content: ONBOARDING_GREETING, isGreeting: true }] : []);
    localStorage.removeItem(`voice_conv_${profileId}`);
  };

  const loadSession = (msgs, sid) => {
    // Hydrate loaded messages
    const hydrated = msgs.map(m => ({ ...m, isGreeting: false }));
    setMessages(hydrated);
    try {
      localStorage.setItem(`voice_conv_${profileId}`, JSON.stringify({ sid, msgs: hydrated }));
    } catch {}
  };

  return (
    <div className="chat-container">
      {/* ── Top bar with history / new conversation ── */}
      <div className="chat-topbar">
        <button className="chat-history-btn" onClick={() => setShowHistory(true)}>
          ↩ Past conversations
        </button>
        <button className="chat-new-btn" onClick={startNewConversation}>
          + New
        </button>
      </div>

      <div className="chat-messages">
        {/* Empty state — visible beneath the particle field */}
        {messages.length === 0 && (
          <div className="chat-empty">
            <div className="chat-empty-title">Talk to this voice</div>
            <div className="chat-empty-hint">
              Tell it something — a line you love, a tone you want, a habit to avoid.<br />
              It will listen, respond, and learn from what you say.
            </div>
          </div>
        )}
        {messages.map((m, i) => {
          const precedingUserMsg = m.prevUserIdx != null ? messages[m.prevUserIdx]?.content : null;
          return (
            <div key={i} className={`msg ${m.role}`}>
              <div className="msg-label">
                {m.role === "user"
                  ? (advancedMode && m.command && m.command !== "auto" && m.command !== "dialogue" ? `/${m.command}` : "you")
                  : (m.isGreeting ? profileName : "voice")}
              </div>
              <div className="msg-content" style={m.isGreeting ? { whiteSpace: "pre-line" } : {}}>
                {m.content}
              </div>
              {m.refinement && (
                <span className="msg-badge">
                  {m.refinement === "saved" ? "noted" : `${m.refinement.replace("_", " ")} noted`}
                  {m.count ? ` · ${m.count} total` : ""}
                </span>
              )}
              {/* Save-as-refinement button — on agent messages that weren't already auto-saved */}
              {m.role === "agent" && !m.isGreeting && !m.refinement && (
                <button
                  className="msg-save-btn"
                  title="Save as a voice refinement"
                  onClick={() => setSavingPicker({ agentMsg: m.content, userMsg: precedingUserMsg, idx: i })}
                >
                  save as refinement
                </button>
              )}
            </div>
          );
        })}
        {loading && (
          <div className="msg agent">
            <div className="msg-label">voice</div>
            <div className="msg-content" style={{ color: "var(--text-faint)" }}><LoadingDots /></div>
          </div>
        )}
        <div ref={messagesEnd} />
      </div>

      {/* ── Inline Council Panel — summoned from chat ── */}
      {inlineCouncil && (
        <InlineCouncilPanel
          question={inlineCouncil.question}
          onClose={() => setInlineCouncil(null)}
        />
      )}

      <div className="chat-input-area">
        {/* Advanced mode: explicit command controls */}
        {advancedMode && (
          <>
            <div className="chat-commands">
              {COMMAND_GUIDE.map(c => (
                <button
                  key={c.key}
                  className={`cmd-btn ${command === c.key ? "active" : ""}`}
                  onClick={() => setCommand(c.key)}
                  title={c.desc}
                >
                  /{c.label}
                </button>
              ))}
            </div>
            <div style={{ marginBottom: 8 }}>
              <button className="cmd-guide-toggle" onClick={() => setShowGuide(g => !g)}>
                {showGuide ? "hide guide" : "command guide"}
              </button>
              {showGuide && (
                <div className="cmd-guide">
                  {COMMAND_GUIDE.map(c => (
                    <div key={c.key} style={{ marginBottom: 4 }}>
                      <strong>/{c.label}</strong> — {c.desc}
                    </div>
                  ))}
                </div>
              )}
            </div>
          </>
        )}
        <div className="chat-input-row" style={{ position: "relative" }}>
          {showCouncilOrb && (
            <button className="council-orb"
              onClick={() => { setInlineCouncil({ question: input }); setInput(""); }}>
              <svg width="12" height="12" viewBox="0 0 14 14" fill="none">
                <circle cx="7" cy="2" r="1.5" fill="currentColor"/>
                <circle cx="2" cy="11" r="1.5" fill="currentColor"/>
                <circle cx="12" cy="11" r="1.5" fill="currentColor"/>
                <line x1="7" y1="2" x2="2" y2="11" stroke="currentColor" strokeWidth="0.8"/>
                <line x1="7" y1="2" x2="12" y2="11" stroke="currentColor" strokeWidth="0.8"/>
                <line x1="2" y1="11" x2="12" y2="11" stroke="currentColor" strokeWidth="0.8"/>
              </svg>
              Ask the Council?
            </button>
          )}
          <textarea
            ref={textareaRef}
            className="chat-textarea" rows={1}
            placeholder={
              advancedMode && command !== "auto" && command !== "dialogue"
                ? `/${command}: describe what you're teaching...`
                : "Talk to this voice…"
            }
            value={input} onChange={handleInput} onKeyDown={handleKeyDown}
          />
          <button className="send-btn" onClick={send} disabled={loading || !input.trim()}>
            Send
          </button>
        </div>
        <div className="chat-input-footer">
          <button className="chat-advanced-toggle" onClick={() => { setAdvancedMode(a => !a); setCommand("auto"); }}>
            {advancedMode ? "← natural mode" : "advanced ↗"}
          </button>
        </div>
      </div>

      {showHistory && (
        <PastConversationsPanel
          profileId={profileId}
          onLoad={loadSession}
          onClose={() => setShowHistory(false)}
        />
      )}
      {savingPicker && (
        <SaveRefinementPicker
          agentMsg={savingPicker.agentMsg}
          userMsg={savingPicker.userMsg}
          profileId={profileId}
          onSaved={(count) => {
            onRefinementSaved && onRefinementSaved(count);
            // Mark the message as saved so the button disappears
            setMessages(prev => prev.map((m, i) =>
              i === savingPicker.idx ? { ...m, refinement: "saved", count } : m
            ));
          }}
          onClose={() => setSavingPicker(null)}
        />
      )}
    </div>
  );
}


// ── Write View ──
function WriteView({ profileId, profileName }) {
  const [instruction, setInstruction] = useState("");
  const [context, setContext] = useState("");
  const [output, setOutput] = useState("");
  const [loading, setLoading] = useState(false);
  const [showContext, setShowContext] = useState(false);
  const [correction, setCorrection] = useState("");
  const [correcting, setCorrecting] = useState(false);
  const [refinementCount, setRefinementCount] = useState(null);
  const correctionRef = React.useRef(null);

  useEffect(() => { setOutput(""); setInstruction(""); setContext(""); setCorrection(""); setRefinementCount(null); }, [profileId]);

  useEffect(() => {
    if (output && correctionRef.current) {
      correctionRef.current.scrollIntoView({ behavior: "smooth", block: "nearest" });
    }
  }, [output]);

  const generate = async () => {
    if (!instruction.trim() || loading) return;
    setLoading(true);
    setOutput("");
    setCorrection("");
    try {
      const result = await api(`/profiles/${profileId}/write`, {
        method: "POST",
        body: JSON.stringify({ instruction: instruction.trim(), context: context.trim() }),
      });
      setOutput(result.text);
    } catch (e) { setOutput(`Error: ${e.message}`); toastError(e.message); }
    setLoading(false);
  };

  const teachAndRetry = async () => {
    if (!correction.trim() || correcting) return;
    setCorrecting(true);
    const teachMsg = `The voice was asked to write: "${instruction.trim()}"\n\nIt produced this:\n\n${output}\n\nThat is wrong. ${correction.trim()}`;
    try {
      const taught = await api(`/profiles/${profileId}/teach`, {
        method: "POST",
        body: JSON.stringify({ message: teachMsg, command: "correct", conversation_history: [] }),
      });
      setRefinementCount(taught.refinement_count);
      toastSuccess(`Correction saved · ${taught.refinement_count} refinement${taught.refinement_count === 1 ? "" : "s"} total`);
      setOutput("");
      const result = await api(`/profiles/${profileId}/write`, {
        method: "POST",
        body: JSON.stringify({ instruction: instruction.trim(), context: context.trim() }),
      });
      setOutput(result.text);
      setCorrection("");
    } catch (e) { toastError(e.message); }
    setCorrecting(false);
  };

  return (
    <div className="write-container">
      <div className="write-section">
        <div className="write-label">What should this voice write?</div>
        <textarea
          className="write-textarea" rows={3}
          placeholder="e.g., 'An opening paragraph about why most modern writing is lifeless.'"
          value={instruction} onChange={e => setInstruction(e.target.value)}
        />

        {!showContext ? (
          <button
            className="action-btn secondary" style={{ marginTop: 12, fontSize: 12 }}
            onClick={() => setShowContext(true)}
          >
            + Add context or notes
          </button>
        ) : (
          <>
            <div className="write-label" style={{ marginTop: 20 }}>Context / Notes</div>
            <textarea
              className="write-textarea" rows={4}
              placeholder="Optional: an outline, notes, previous draft, or audience description"
              value={context} onChange={e => setContext(e.target.value)}
            />
          </>
        )}

        <button className="action-btn" style={{ marginTop: 16 }} onClick={generate} disabled={loading || !instruction.trim()}>
          {loading ? <span>Writing<LoadingDots /></span> : `Write as ${profileName}`}
        </button>

        {output && (
          <>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginTop: 32 }}>
              <div className="write-label" style={{ marginTop: 0 }}>Output</div>
              <div style={{ display: "flex", gap: 8 }}>
                <button className="action-btn secondary" style={{ fontSize: 12, padding: "4px 12px" }}
                  onClick={() => copyText(output)}>Copy</button>
                <button className="action-btn secondary" style={{ fontSize: 12, padding: "4px 12px" }}
                  onClick={generate} disabled={loading}>Regenerate</button>
              </div>
            </div>
            <div className="write-output">{output}</div>

            <div ref={correctionRef} style={{
              marginTop: 20, padding: "16px", borderRadius: "var(--radius)",
              border: "1px solid var(--border-light)", background: "var(--bg-elevated)"
            }}>
              <div style={{ fontSize: 12, color: "var(--text-dim)", fontFamily: "var(--font-sans)", marginBottom: 8 }}>
                Correct the voice
                {refinementCount !== null && (
                  <span style={{ color: "var(--accent)", marginLeft: 8 }}>· {refinementCount} refinement{refinementCount === 1 ? "" : "s"}</span>
                )}
              </div>
              <textarea
                className="write-textarea" rows={3}
                placeholder="e.g., 'Too ornate. My sentences are shorter and more direct. The first sentence should not start with an abstract noun.'"
                value={correction}
                onChange={e => setCorrection(e.target.value)}
                style={{ marginBottom: 10 }}
              />
              <button
                className="action-btn" style={{ width: "100%" }}
                onClick={teachAndRetry}
                disabled={correcting || !correction.trim()}
              >
                {correcting ? <span>Teaching & rewriting<LoadingDots /></span> : "Teach & retry →"}
              </button>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginTop: 32 }}>

}

function VoiceView({ profileId, profileName, refinementCount, onRefinementSaved, onDiscover, openHistorySignal }) {
  const isNew = refinementCount === 0;
  const [sessionId] = useState(() => new Date().toISOString().replace(/[:.]/g, "-"));

  const [messages, setMessages] = useState(() => {
    try {
      const saved = localStorage.getItem(`voice_conv_${profileId}`);
      if (saved) {
        const { msgs } = JSON.parse(saved);
        if (msgs && msgs.length > 0) return msgs;
      }
    } catch {}
    return isNew ? [{ role: "agent", content: ONBOARDING_GREETING, isGreeting: true }] : [];
  });

  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const [showHistory, setShowHistory] = useState(false);
  // Allow parent to trigger history open
  useEffect(() => {
    if (openHistorySignal) setShowHistory(true);
  }, [openHistorySignal]);
  const [savingPicker, setSavingPicker] = useState(null);
  const [inlineCouncil, setInlineCouncil] = useState(null);
  const [correctingIdx, setCorrectingIdx] = useState(null);
  const [correctionText, setCorrectionText] = useState("");
  const [correctionLoading, setCorrectionLoading] = useState(false);
  const [uploading, setUploading] = useState(false);
  const [sendPulse, setSendPulse] = useState(false);
  const messagesEnd = useRef(null);
  const textareaRef = useRef(null);
  const fileInputRef = useRef(null);
  const idleTimer = useRef(null);

  const userTurns = messages.filter(m => m.role === "user").length;

  // ── Inactivity pulse — draw attention to Send after idle with text ──
  useEffect(() => {
    if (idleTimer.current) clearTimeout(idleTimer.current);
    setSendPulse(false);
    if (input.trim().length > 10 && !loading) {
      idleTimer.current = setTimeout(() => setSendPulse(true), 5000);
    }
    return () => { if (idleTimer.current) clearTimeout(idleTimer.current); };
  }, [input, loading]);

  // ── Scroll to bottom ──
  useEffect(() => { messagesEnd.current?.scrollIntoView({ behavior: "smooth" }); }, [messages]);

  // ── Reset on profile switch ──
  useEffect(() => {
    try {
      const saved = localStorage.getItem(`voice_conv_${profileId}`);
      if (saved) {
        const { msgs } = JSON.parse(saved);
        if (msgs && msgs.length > 0) { setMessages(msgs); return; }
      }
    } catch {}
    setMessages(refinementCount === 0 ? [{ role: "agent", content: ONBOARDING_GREETING, isGreeting: true }] : []);
  }, [profileId]);

  // ── Persist to localStorage ──
  useEffect(() => {
    if (messages.length === 0) return;
    try {
      localStorage.setItem(`voice_conv_${profileId}`, JSON.stringify({ sid: sessionId, msgs: messages }));
    } catch {}
  }, [messages, profileId, sessionId]);

  // ── Save to server ──
  const saveToServer = (msgs) => {
    const serializable = msgs
      .filter(m => !m.isGreeting)
      .map(m => ({ role: m.role, content: m.content, command: m.command || null }));
    if (serializable.length === 0) return;
    api(`/profiles/${profileId}/conversations`, {
      method: "POST",
      body: JSON.stringify({ session_id: sessionId, messages: serializable }),
    }).catch(() => {});
  };

  // ── Send message ──
  const send = async (overrideText) => {
    const text = (overrideText || input).trim();
    if (!text || loading) return;
    if (!overrideText) setInput("");

    // Council intercept
    const councilTrigger = /summon\s+the\s+council(?:\s+on\s+this)?/i;
    if (councilTrigger.test(text)) {
      const question = text.replace(councilTrigger, "").replace(/^[\s,.:]+|[\s,.:]+$/g, "").trim();
      setInlineCouncil({ question: question || text });
      setMessages(prev => [...prev,
        { role: "user", content: text },
        { role: "agent", content: "⚖️ The council has been summoned.", isSummon: true },
      ]);
      return;
    }

    const nextMessages = [...messages, { role: "user", content: text }];
    setMessages(nextMessages);
    setLoading(true);
    window.dispatchEvent(new Event("voice:think:start"));

    try {
      const history = messages
        .filter(m => !m.isGreeting)
        .slice(-8)
        .map(m => ({ role: m.role === "user" ? "user" : "agent", content: m.content }));

      if (isNew && userTurns === 0) {
        history.unshift({ role: "agent", content: ONBOARDING_GREETING });
      }

      const result = await api(`/profiles/${profileId}/converse`, {
        method: "POST",
        body: JSON.stringify({ message: text, conversation_history: history }),
      });

      const agentMsg = {
        role: "agent",
        content: result.response,
        intent: result.intent, // "write" | "translate" | "chat"
        refinement: result.refinement_saved ? result.refinement_type : null,
        count: result.refinement_count,
        prevUserIdx: nextMessages.length - 1,
        // Store the original instruction for re-generation
        originalInstruction: text,
      };
      const withResponse = [...nextMessages, agentMsg];
      // Clear loading BEFORE setting messages to prevent VoiceThinking overlay
      setLoading(false);
      window.dispatchEvent(new Event("voice:think:end"));
      setMessages(withResponse);
      saveToServer(withResponse);
      if (result.refinement_saved) {
        toastSuccess(`${result.refinement_type} saved — ${result.refinement_count} total refinements`);
        onRefinementSaved && onRefinementSaved(result.refinement_count);
      }
    } catch (e) {
      setLoading(false);
      window.dispatchEvent(new Event("voice:think:end"));
      setMessages([...nextMessages, { role: "agent", content: `Error: ${e.message}` }]);
      toastError(e.message);
    }
    setTimeout(() => textareaRef.current?.focus(), 50);
  };

  // ── Correct & retry (for write responses) ──
  const correctAndRetry = async (msgIdx) => {
    if (!correctionText.trim() || correctionLoading) return;
    setCorrectionLoading(true);
    const originalMsg = messages[msgIdx];
    const instruction = originalMsg.originalInstruction || "";

    // First teach the correction
    const teachMsg = `The voice was asked to write: "${instruction}"\n\nIt produced this:\n\n${originalMsg.content}\n\nThat is wrong. ${correctionText.trim()}`;
    try {
      const taught = await api(`/profiles/${profileId}/teach`, {
        method: "POST",
        body: JSON.stringify({ message: teachMsg, command: "correct", conversation_history: [] }),
      });
      toastSuccess(`Correction saved · ${taught.refinement_count} refinements`);
      onRefinementSaved && onRefinementSaved(taught.refinement_count);

      // Now re-generate
      const result = await api(`/profiles/${profileId}/converse`, {
        method: "POST",
        body: JSON.stringify({ message: instruction, conversation_history: [] }),
      });

      // Replace the old response with the new one
      setMessages(prev => {
        const updated = [...prev];
        updated[msgIdx] = {
          ...updated[msgIdx],
          content: result.response,
          corrected: true,
          count: taught.refinement_count,
        };
        return updated;
      });
      setCorrectingIdx(null);
      setCorrectionText("");
    } catch (e) {
      toastError(e.message);
    }
    setCorrectionLoading(false);
  };

  // ── File upload via paperclip ──
  const handleFileUpload = async (e) => {
    const files = Array.from(e.target.files || []);
    if (files.length === 0) return;
    setUploading(true);

    const names = files.map(f => f.name).join(", ");
    setMessages(prev => [...prev, { role: "user", content: `📎 ${names}`, isUpload: true }]);

    try {
      for (const file of files) {
        const formData = new FormData();
        formData.append("file", file);
        await fetch(`/profiles/${profileId}/upload`, {
          method: "POST",
          headers: { "Authorization": `Bearer ${localStorage.getItem("auth_token")}` },
          body: formData,
        });
      }

      // Auto-ingest
      setMessages(prev => [...prev, { role: "agent", content: "Reading your writing…", isProcessing: true }]);
      const result = await api(`/profiles/${profileId}/ingest`, { method: "POST" });

      setMessages(prev => {
        const updated = [...prev];
        updated[updated.length - 1] = {
          role: "agent",
          content: result.new_refinements > 0
            ? `Extracted ${result.new_refinements} refinement${result.new_refinements > 1 ? "s" : ""} from your writing. ${result.total_refinements} total.`
            : `Read your writing — nothing new to extract. Try uploading longer or more distinctive samples.`,
          intent: "chat",
        };
        return updated;
      });

      if (result.new_refinements > 0) {
        toastSuccess(`${result.new_refinements} refinements extracted`);
        onRefinementSaved && onRefinementSaved(result.total_refinements);
      }
    } catch (err) {
      setMessages(prev => [...prev, { role: "agent", content: `Upload failed: ${err.message}` }]);
      toastError(err.message);
    }
    setUploading(false);
    if (fileInputRef.current) fileInputRef.current.value = "";
  };

  const handleKeyDown = (e) => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
  };

  const DECISION_KEYWORDS = /\b(should|decide|deciding|choice|choose|whether|dilemma|torn|weighing|what if|ought|best path|right move|right choice|is it worth|do i|do we|should i|should we)\b/i;
  const showCouncilOrb = input.length > 20 && DECISION_KEYWORDS.test(input) && !inlineCouncil;

  const handleInput = (e) => {
    setInput(e.target.value);
    e.target.style.height = "auto";
    e.target.style.height = Math.min(e.target.scrollHeight, 160) + "px";
  };

  const startNewConversation = () => {
    saveToServer(messages);
    setMessages(refinementCount === 0 ? [{ role: "agent", content: ONBOARDING_GREETING, isGreeting: true }] : []);
    localStorage.removeItem(`voice_conv_${profileId}`);
  };

  const loadSession = (msgs, sid) => {
    const hydrated = msgs.map(m => ({ ...m, isGreeting: false }));
    setMessages(hydrated);
    try {
      localStorage.setItem(`voice_conv_${profileId}`, JSON.stringify({ sid, msgs: hydrated }));
    } catch {}
  };

  // Pick 5 prompt starters — prioritize onboarding ones for new profiles
  const [starters] = useState(() => {
    if (isNew) {
      const onboard = PROMPT_STARTERS.filter(p => p.onboard);
      const rest = PROMPT_STARTERS.filter(p => !p.onboard).sort(() => Math.random() - 0.5);
      return [...onboard, ...rest].slice(0, 5);
    }
    const shuffled = [...PROMPT_STARTERS].sort(() => Math.random() - 0.5);
    return shuffled.slice(0, 5);
  });

  // Contextual placeholder — adapts based on last message
  const [placeholderIdx, setPlaceholderIdx] = useState(0);
  useEffect(() => {
    const timer = setInterval(() => {
      setPlaceholderIdx(prev => (prev + 1) % PLACEHOLDER_EXAMPLES.length);
    }, 4000);
    return () => clearInterval(timer);
  }, []);

  const lastMsg = messages[messages.length - 1];
  const lastWasVoiceWriting = lastMsg?.role === "agent" && lastMsg?.intent === "write";
  const lastWasVoiceChat = lastMsg?.role === "agent" && !lastMsg?.intent && !lastMsg?.isGreeting;
  const contextPlaceholder = lastWasVoiceWriting
    ? "Suggest a correction, continue the discussion, or ask for something new…"
    : lastWasVoiceChat
    ? "Respond, share an example, or ask it to write something…"
    : PLACEHOLDER_EXAMPLES[placeholderIdx];

  return (
    <div className="chat-container">
      {/* ── Top bar — minimal, only + New ── */}
      <div className="chat-topbar" style={{ justifyContent: "flex-end" }}>
        <button className="chat-new-btn" onClick={startNewConversation}>
          + New
        </button>
      </div>

      <div className="chat-messages" style={
        /* When only greeting/onboarding, stack content near the bottom so it sits right above the input */
        (messages.length <= 1 && (messages.length === 0 || messages[0]?.isGreeting))
          ? { display: "flex", flexDirection: "column", justifyContent: "flex-end" }
          : {}
      }>
        {/* ── Suggestions — collapsible, compact ── */}
        {(messages.length === 0 || (messages.length === 1 && messages[0]?.isGreeting)) && (
          <SuggestionsMenu starters={starters} onSelect={(text) => send(text)} />
        )}

        {/* ── Discovery banner for new profiles ── */}
        {isNew && onDiscover && (
          <button onClick={onDiscover} style={{
            display: "flex", alignItems: "center", gap: 12,
            width: "100%", maxWidth: 520, padding: "12px 16px", marginBottom: 8,
            background: "linear-gradient(135deg, rgba(200,164,110,0.06), rgba(200,164,110,0.02))",
            border: "1px solid rgba(200,164,110,0.15)", borderRadius: 10,
            color: "var(--text)", cursor: "pointer", textAlign: "left",
            transition: "border-color 0.15s",
          }}
            onMouseEnter={e => e.currentTarget.style.borderColor = "rgba(200,164,110,0.35)"}
            onMouseLeave={e => e.currentTarget.style.borderColor = "rgba(200,164,110,0.15)"}
          >
            <span style={{ fontSize: 18, flexShrink: 0 }}>◇</span>
            <div>
              <div style={{ fontSize: 12, fontWeight: 600, fontFamily: "var(--font-sans)", color: "var(--accent)", marginBottom: 1 }}>
                Discover your style
              </div>
              <div style={{ fontSize: 11, color: "var(--text-dim)", fontFamily: "var(--font-sans)" }}>
                Pick between sentence pairs — 2 minutes
              </div>
            </div>
            <span style={{ marginLeft: "auto", color: "var(--text-dim)", fontSize: 14 }}>→</span>
          </button>
        )}

        {/* ── Messages ── */}
        {messages.map((m, i) => {
          const precedingUserMsg = m.prevUserIdx != null ? messages[m.prevUserIdx]?.content : null;
          const isWrite = m.intent === "write";
          const isTranslate = m.intent === "translate";
          const isGenerated = isWrite || isTranslate;

          return (
            <div key={i} className={`msg ${m.role}`} style={m.isGreeting ? { marginBottom: 12 } : {}}>
              <div className="msg-label">
                {m.role === "user" ? (
                  <>
                    <span className="msg-avatar">Y</span>
                    you
                  </>
                ) : (
                  <>
                    <span className="msg-avatar"><img src="/static/lumafox-icon.png" alt="" /></span>
                    {m.isGreeting ? profileName
                      : isWrite ? `${profileName} · wrote`
                      : isTranslate ? `${profileName} · rendered`
                      : "voice"}
                  </>
                )}
              </div>

              {/* Generated text gets special presentation */}
              {m.role === "agent" && isGenerated ? (
                <div style={{
                  background: "var(--bg-elevated, #1a1a1a)",
                  border: "1px solid var(--border)",
                  borderRadius: "var(--radius, 10px)",
                  padding: "16px 18px",
                  marginTop: 4,
                  whiteSpace: "pre-wrap",
                  lineHeight: 1.7,
                  fontSize: 15,
                }}>
                  {m.content}
                  {m.corrected && (
                    <div style={{ marginTop: 8, fontSize: 11, color: "var(--accent)", fontFamily: "var(--font-sans)" }}>
                      ✓ corrected & regenerated
                    </div>
                  )}
                </div>
              ) : (
                <div className="msg-content" style={m.isGreeting ? { whiteSpace: "pre-line" } : {}}>
                  {m.content}
                </div>
              )}

              {/* Onboarding steps — shown after greeting for new profiles */}
              {m.isGreeting && isNew && (
                <OnboardingSteps
                  refinementCount={refinementCount}
                  hasUploads={false}
                  hasSentMessage={userTurns > 0}
                />
              )}

              {/* Refinement badge */}
              {m.refinement && (
                <span className="msg-badge">
                  {m.refinement === "saved" ? "noted" : `${m.refinement.replace("_", " ")} noted`}
                  {m.count ? ` · ${m.count} total` : ""}
                </span>
              )}

              {/* ── Contextual actions ── */}
              {m.role === "agent" && !m.isGreeting && !m.isSummon && (
                <div style={{ display: "flex", gap: 8, marginTop: 6, flexWrap: "wrap" }}>
                  {/* Copy — for write/translate responses */}
                  {isGenerated && (
                    <button className="msg-save-btn" onClick={() => copyText(m.content)}>
                      copy
                    </button>
                  )}
                  {/* Correct — for write responses */}
                  {isWrite && correctingIdx !== i && (
                    <button className="msg-save-btn" onClick={() => { setCorrectingIdx(i); setCorrectionText(""); }}>
                      correct this
                    </button>
                  )}
                  {/* Re-render — for translate responses */}
                  {isTranslate && (
                    <button className="msg-save-btn" onClick={() => m.originalInstruction && send(m.originalInstruction)}>
                      re-render
                    </button>
                  )}
                  {/* Save as refinement — for chat responses */}
                  {!isGenerated && !m.refinement && (
                    <button className="msg-save-btn"
                      onClick={() => setSavingPicker({ agentMsg: m.content, userMsg: precedingUserMsg, idx: i })}>
                      save as refinement
                    </button>
                  )}
                </div>
              )}

              {/* ── Inline correction panel ── */}
              {correctingIdx === i && (
                <div style={{
                  marginTop: 10, padding: 14, borderRadius: "var(--radius)",
                  border: "1px solid var(--border-light, #333)", background: "var(--bg-elevated, #1a1a1a)",
                }}>
                  <div style={{ fontSize: 12, color: "var(--text-dim)", fontFamily: "var(--font-sans)", marginBottom: 8 }}>
                    What's wrong? The voice will learn and retry.
                  </div>
                  <textarea
                    className="write-textarea" rows={2}
                    placeholder="e.g., 'Too ornate. My sentences are shorter. Don't start with abstract nouns.'"
                    value={correctionText}
                    onChange={e => setCorrectionText(e.target.value)}
                    style={{ marginBottom: 8, fontSize: 14 }}
                    autoFocus
                  />
                  <div style={{ display: "flex", gap: 8 }}>
                    <button className="action-btn" style={{ flex: 1, fontSize: 13 }}
                      onClick={() => correctAndRetry(i)}
                      disabled={correctionLoading || !correctionText.trim()}>
                      {correctionLoading ? <span>Teaching<LoadingDots /></span> : "Teach & retry →"}
                    </button>
                    <button className="action-btn secondary" style={{ fontSize: 13 }}
                      onClick={() => { setCorrectingIdx(null); setCorrectionText(""); }}>
                      cancel
                    </button>
                  </div>
                </div>
              )}
            </div>
          );
        })}

        {loading && messages[messages.length - 1]?.role !== "agent" && (
          <div className="msg agent">
            <div className="msg-label">
              <span className="msg-avatar"><img src="/static/lumafox-icon.png" alt="" /></span>
              voice
            </div>
            <div className="msg-content"><VoiceThinking profileName={profileName} userMessage={messages.filter(m => m.role === "user").slice(-1)[0]?.content || ""} /></div>
          </div>
        )}
        <div ref={messagesEnd} />
      </div>

      {/* ── Inline Council Panel ── */}
      {inlineCouncil && (
        <InlineCouncilPanel
          question={inlineCouncil.question}
          onClose={() => setInlineCouncil(null)}
        />
      )}

      {/* ── Input area ── */}
      <div className="chat-input-area" style={{ padding: "10px 20px 14px", borderTop: "none", background: "transparent" }}>
        {showCouncilOrb && (
          <button className="council-orb" style={{ marginBottom: 6 }}
            onClick={() => { setInlineCouncil({ question: input }); setInput(""); }}>
            <svg width="12" height="12" viewBox="0 0 14 14" fill="none">
              <circle cx="7" cy="2" r="1.5" fill="currentColor"/>
              <circle cx="2" cy="11" r="1.5" fill="currentColor"/>
              <circle cx="12" cy="11" r="1.5" fill="currentColor"/>
              <line x1="7" y1="2" x2="2" y2="11" stroke="currentColor" strokeWidth="0.8"/>
              <line x1="7" y1="2" x2="12" y2="11" stroke="currentColor" strokeWidth="0.8"/>
              <line x1="2" y1="11" x2="12" y2="11" stroke="currentColor" strokeWidth="0.8"/>
            </svg>
            Ask the Council?
          </button>
        )}
        <input
          ref={fileInputRef}
          type="file" multiple accept=".txt,.md,.pdf,.doc,.docx"
          style={{ display: "none" }}
          onChange={handleFileUpload}
        />
        <div style={{
          display: "flex", alignItems: "flex-end", gap: 0,
          background: "var(--bg-elevated)", border: "1px solid var(--border)",
          borderRadius: 24, padding: "6px 6px 6px 4px",
          transition: "border-color 0.15s",
        }}
          onFocus={e => e.currentTarget.style.borderColor = "var(--accent-dim)"}
          onBlur={e => e.currentTarget.style.borderColor = "var(--border)"}
        >
          {/* Attach button — left */}
          <button
            onClick={() => fileInputRef.current?.click()}
            disabled={uploading}
            title="Attach writing samples"
            style={{
              background: "var(--bg-hover)", border: "none", cursor: "pointer",
              color: uploading ? "var(--accent)" : "var(--text-faint)",
              width: 36, height: 36, borderRadius: "50%",
              display: "flex", alignItems: "center", justifyContent: "center",
              fontSize: 18, lineHeight: 1, flexShrink: 0,
              transition: "all 0.15s", marginBottom: 1,
            }}
            onMouseEnter={e => { e.currentTarget.style.color = "var(--text)"; e.currentTarget.style.background = "var(--border)"; }}
            onMouseLeave={e => { e.currentTarget.style.color = "var(--text-faint)"; e.currentTarget.style.background = "var(--bg-hover)"; }}
          >
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
          </button>

          {/* Textarea — center */}
          <textarea
            ref={textareaRef}
            rows={1}
            placeholder={contextPlaceholder}
            value={input} onChange={handleInput} onKeyDown={handleKeyDown}
            style={{
              flex: 1, resize: "none", minHeight: 36, maxHeight: 160,
              padding: "7px 12px", fontSize: 15, lineHeight: 1.5,
              border: "none", outline: "none",
              background: "transparent",
              color: "var(--text)", fontFamily: "var(--font)",
            }}
          />

          {/* Send button — right */}
          <button className={`send-btn${sendPulse ? " cta-pulse" : ""}`}
            onClick={() => { send(); setSendPulse(false); }}
            disabled={loading || !input.trim()}
            style={{
              width: 36, height: 36, borderRadius: "50%",
              padding: 0, display: "flex", alignItems: "center", justifyContent: "center",
              fontSize: 18, lineHeight: 1, flexShrink: 0, marginBottom: 1,
            }}>
            ↑
          </button>
        </div>
      </div>

      {showHistory && (
        <PastConversationsPanel
          profileId={profileId}
          onLoad={loadSession}
          onClose={() => setShowHistory(false)}
        />
      )}
      {savingPicker && (
        <SaveRefinementPicker
          agentMsg={savingPicker.agentMsg}
          userMsg={savingPicker.userMsg}
          profileId={profileId}
          onSaved={(count) => {
            onRefinementSaved && onRefinementSaved(count);
            setMessages(prev => prev.map((m, i) =>
              i === savingPicker.idx ? { ...m, refinement: "saved", count } : m
            ));
          }}
          onClose={() => setSavingPicker(null)}
        />
      )}
    </div>
  );
}


// ── Analyze View ──
function AnalyzeView({ profileId, profileName }) {
  const [text, setText] = useState("");
  const [analysis, setAnalysis] = useState("");
  const [loading, setLoading] = useState(false);

  useEffect(() => { setAnalysis(""); setText(""); }, [profileId]);

  const analyze = async () => {
    if (!text.trim() || loading) return;
    setLoading(true);
    setAnalysis("");
    try {
      const result = await api(`/profiles/${profileId}/analyze`, {
        method: "POST",
        body: JSON.stringify({ text: text.trim() }),
      });
      setAnalysis(result.analysis);
    } catch (e) { setAnalysis(`Error: ${e.message}`); toastError(e.message); }
    setLoading(false);
  };

  return (
    <div className="write-container">
      <div className="write-section">
        <VoiceProfileCard profileId={profileId} profileName={profileName} />

        <div style={{ borderTop: "1px solid var(--border)", paddingTop: 24, marginTop: 8 }} />
        <div className="write-label">Paste text to analyze against this voice</div>
        <textarea
          className="write-textarea" rows={8}
          placeholder="Paste any text — an email, blog post, draft — and we'll show where it breaks from your voice."
          value={text} onChange={e => setText(e.target.value)}
        />
        <button className="action-btn" style={{ marginTop: 16 }} onClick={analyze} disabled={loading || !text.trim()}>
          {loading ? <span>Analyzing<LoadingDots /></span> : `Analyze against ${profileName}`}
        </button>
        {analysis && (
          <>
            <div className="write-label" style={{ marginTop: 32 }}>Analysis</div>
            <div className="write-output">{analysis}</div>
          </>
        )}
      </div>
    </div>
  );
}


// ── Export View ──
function ExportView({ profileId }) {
  const [markdown, setMarkdown] = useState("");
  const [loading, setLoading] = useState(true);
  const [skillLoading, setSkillLoading] = useState(false);
  const [guideLoading, setGuideLoading] = useState(false);
  const [guideContent, setGuideContent] = useState(null);

  useEffect(() => {
    setLoading(true);
    setGuideContent(null);

          {guideContent ? (

              <div style={{
                background: "#111", borderRadius: 8, padding: "20px 24px", marginBottom: 16,
                maxHeight: 400, overflowY: "auto", border: "1px solid var(--border-light)",

// ── Upload View (Bring Your Voice) ──
function UploadView({ profileId }) {
  const [files, setFiles] = useState([]);
  const [uploading, setUploading] = useState(false);
  const [ingesting, setIngesting] = useState(false);
  const [result, setResult] = useState(null);
  const [dragOver, setDragOver] = useState(false);
  const fileInput = useRef(null);

  const loadFiles = async () => {
    try {
      const r = await api(`/profiles/${profileId}/uploads`);
      setFiles(r.files);
    } catch (e) { console.error(e); }
  };

  useEffect(() => { loadFiles(); setResult(null); }, [profileId]);

  const uploadFile = async (file) => {
    if (!file) return;
    const allowed = [".txt", ".md", ".html", ".text"];
    const ext = "." + file.name.split(".").pop().toLowerCase();
    if (!allowed.includes(ext)) { toastError("Only .txt, .md, or .html files allowed"); return; }
    setUploading(true);
    try {
      const formData = new FormData();
      formData.append("file", file);
      const token = getToken();
      const res = await fetch(`${API}/profiles/${profileId}/upload`, {
        method: "POST",
        headers: token ? { "Authorization": `Bearer ${token}` } : {},
        body: formData,
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({ detail: "Upload failed" }));
        throw new Error(err.detail);
      }
      await loadFiles();
      toastSuccess("File uploaded");
    } catch (err) { toastError(err.message); }
    setUploading(false);
    if (fileInput.current) fileInput.current.value = "";
  };

  const handleInputChange = (e) => uploadFile(e.target.files?.[0]);

  const handleDrop = (e) => {
    e.preventDefault();
    setDragOver(false);
    const file = e.dataTransfer.files?.[0];
    if (file) uploadFile(file);
  };

  const handleIngest = async () => {
    if (files.length === 0) { toastError("Upload some writing first."); return; }
    setIngesting(true);
    setResult(null);
    try {
      const r = await api(`/profiles/${profileId}/ingest`, { method: "POST" });
      setResult(r);
      toastSuccess(`Extracted ${r.new_refinements} refinements from your writing`);
    } catch (err) { toastError(err.message); }
    setIngesting(false);
  };

  return (
    <div className="write-container">
      <div className="write-section">
        <div className="write-label">Bring Your Voice</div>
        <p style={{ color: "var(--text-dim)", fontSize: 14, marginBottom: 20, fontFamily: "var(--font-sans)" }}>
          Upload your writing — essays, blog posts, emails, anything that sounds like you.
          Then hit "Analyze" and the system will extract examples, principles, and patterns automatically.
        </p>

        <input
          ref={fileInput} type="file" accept=".txt,.md,.html,.text"
          onChange={handleInputChange} style={{ display: "none" }}
        />
        <div
          onClick={() => !uploading && fileInput.current?.click()}
          onDrop={handleDrop}
          onDragOver={(e) => { e.preventDefault(); setDragOver(true); }}
          onDragLeave={() => setDragOver(false)}
          style={{
            border: `2px dashed ${dragOver ? "var(--accent)" : "var(--border)"}`,
            borderRadius: "var(--radius)",
            padding: "36px 24px",
            textAlign: "center",
            cursor: uploading ? "default" : "pointer",
            background: dragOver ? "rgba(200,164,110,0.06)" : "transparent",
            transition: "border-color 0.15s, background 0.15s",
            marginBottom: 20,
          }}
        >
          {uploading ? (
            <span style={{ fontFamily: "var(--font-sans)", fontSize: 14, color: "var(--text-dim)" }}>
              Uploading…
            </span>
          ) : (
            <>
              <div style={{ fontSize: 28, marginBottom: 8, opacity: 0.5 }}>↑</div>
              <div style={{ fontFamily: "var(--font-sans)", fontSize: 14, color: "var(--text-dim)" }}>
                Drop a file here, or <span style={{ color: "var(--accent)", textDecoration: "underline" }}>browse</span>
              </div>
              <div style={{ fontFamily: "var(--font-sans)", fontSize: 12, color: "var(--text-faint)", marginTop: 6 }}>
                .txt · .md · .html — up to 500 KB
              </div>
            </>
          )}
        </div>

        {files.length > 0 && (
          <div style={{ marginBottom: 20 }}>
            <div className="write-label">Uploaded Files ({files.length})</div>
            {files.map((f, i) => (
              <div key={i} style={{
                padding: "8px 12px", background: "var(--bg-elevated)", border: "1px solid var(--border)",
                borderRadius: "var(--radius)", marginBottom: 4, display: "flex", justifyContent: "space-between",
                fontFamily: "var(--font-sans)", fontSize: 13,
              }}>
                <span style={{ color: "var(--text)" }}>{f.filename}</span>
                <span style={{ color: "var(--text-faint)" }}>{(f.size / 1024).toFixed(1)} KB</span>
              </div>
            ))}
          </div>
        )}

        {files.length > 0 && (
          <button className="action-btn" onClick={handleIngest} disabled={ingesting}>
            {ingesting ? <span>Analyzing your writing<LoadingDots /></span> : "Analyze & Extract Voice"}
          </button>
        )}

        {result && (
          <div style={{ marginTop: 24 }}>
            <div className="write-label">Extracted {result.new_refinements} refinements</div>
            <div className="write-output">
              {result.refinements.map((r, i) => (
                `[${r.type}] ${r.content}`
              )).join("\n\n")}
            </div>
            <div style={{ marginTop: 8, fontSize: 12, color: "var(--text-dim)", fontFamily: "var(--font-sans)" }}>
              Total refinements on this profile: {result.total_refinements}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function AuthPage({ onAuth }) {

    e.preventDefault();
    if (!email.trim() || !password) return;
    setError("");

    try {
      const endpoint = isLogin ? "/auth/login" : "/auth/register";
      const body = isLogin
        ? { email: email.trim(), password }
        : { email: email.trim(), password, name: name.trim() };

      const res = await fetch(`${API}${endpoint}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body),
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({ detail: "Something went wrong" }));
        throw new Error(err.detail);
      }

      const data = await res.json();
      setToken(data.token);
      setUser(data.user);
      onAuth(data.user);
    } catch (err) {
      setError(err.message);
    }
    setLoading(false);

        </div>
        <div className="auth-sub">
          {isLogin ? "Sign in to your account" : "Create your account"}

        <form onSubmit={handleSubmit}>
          {error && <div className="auth-error">{error}</div>}
          {!isLogin && (
            <input
              className="auth-input" type="text" placeholder="Your name"
              value={name} onChange={e => setName(e.target.value)}
            />
          )}
          <input
            ref={emailRef}
            className="auth-input" type="email" placeholder="Email"
            value={email} onChange={e => setEmail(e.target.value)} required
          />
          <input
            className="auth-input" type="password" placeholder="Password"
            value={password} onChange={e => setPassword(e.target.value)}
            minLength={6} required

        <div className="auth-switch">
          {isLogin ? (
            <>No account? <a onClick={() => { setIsLogin(false); setError(""); }}>Create one</a></>

            <>Already have an account? <a onClick={() => { setIsLogin(true); setError(""); }}>Sign in</a></>
          )}
        </div>
      </div>
    </div>
  );

function NeuralCanvas({ thinkers, size = 340, active = false }) {
  const canvasRef = React.useRef(null);
  const animRef = React.useRef(null);
  const stateRef = React.useRef(null);
  const [hoveredNode, setHoveredNode] = React.useState(null);
  const [focusedNode, setFocusedNode] = React.useState(null);
  const [tooltipPos, setTooltipPos] = React.useState({ x: 0, y: 0 });

  React.useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    const W = canvas.width = size;
    const H = canvas.height = size;
    const cx = W / 2, cy = H / 2;
    const n = thinkers.length;
    const R = size * 0.34;

    // Build nodes — arrange in a circle, with slight random jitter
    const nodes = thinkers.map((name, i) => {
      const angle = (i / n) * Math.PI * 2 - Math.PI / 2;
      const jitter = 0.92 + Math.random() * 0.16;
      return {
        x: cx + Math.cos(angle) * R * jitter,
        y: cy + Math.sin(angle) * R * jitter,
        name,
        radius: 5 + Math.random() * 2,
        pulsePhase: Math.random() * Math.PI * 2,
        pulseSpeed: 0.018 + Math.random() * 0.012,
        glowIntensity: 0,
      };
    });

    // All edges between nodes — with draw-in animation progress
    const edges = [];
    for (let i = 0; i < nodes.length; i++) {
      for (let j = i + 1; j < nodes.length; j++) {
        const dx = nodes[j].x - nodes[i].x;
        const dy = nodes[j].y - nodes[i].y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        // Skip edges that cross the center too far (keeps it from looking like a web)
        if (dist < R * 2.1) {
          edges.push({ a: i, b: j, dist, drawProgress: 0 });
        }
      }
    }

    // Active signals traveling along edges
    const signals = [];
    const spawnSignal = () => {
      if (!active && signals.length > 2) return;
      if (active && signals.length > n * 2) return;
      const edge = edges[Math.floor(Math.random() * edges.length)];
      const forward = Math.random() > 0.5;
      signals.push({
        edge,
        t: 0,
        speed: 0.004 + Math.random() * 0.006,
        forward,
        opacity: 0,
        color: Math.random() > 0.3 ? "#c8a46e" : "#8ab4f8",
      });
    };

    // Seed some initial signals
    for (let i = 0; i < (active ? n : 2); i++) spawnSignal();

    let frame = 0;
    stateRef.current = { nodes, edges, signals, spawnSignal };

    const draw = () => {
      ctx.clearRect(0, 0, W, H);
      frame++;

      // Spawn new signals periodically
      if (frame % (active ? 18 : 60) === 0) spawnSignal();

      // Draw edges — animate draw-in for first ~60 frames
      edges.forEach(edge => {
        if (edge.drawProgress < 1) edge.drawProgress = Math.min(1, edge.drawProgress + 0.028);
        const na = nodes[edge.a], nb = nodes[edge.b];
        const tx = na.x + (nb.x - na.x) * edge.drawProgress;
        const ty = na.y + (nb.y - na.y) * edge.drawProgress;
        ctx.beginPath();
        ctx.moveTo(na.x, na.y);
        ctx.lineTo(tx, ty);
        // Gold tint while drawing in, then fade to dim
        const goldFade = 1 - edge.drawProgress;
        ctx.strokeStyle = goldFade > 0
          ? `rgba(200,164,110,${0.6 * goldFade + 0.12})`
          : "rgba(60,55,50,0.55)";
        ctx.lineWidth = goldFade > 0 ? 1.2 : 0.8;
        ctx.stroke();
      });

      // Draw signals
      for (let i = signals.length - 1; i >= 0; i--) {
        const sig = signals[i];
        sig.t += sig.speed * (active ? 1.4 : 0.7);
        if (sig.t < 0.15) sig.opacity = sig.t / 0.15;
        else if (sig.t > 0.85) sig.opacity = (1 - sig.t) / 0.15;
        else sig.opacity = 1;

        if (sig.t >= 1) {
          // Light up the destination node briefly
          const destIdx = sig.forward ? sig.edge.b : sig.edge.a;
          nodes[destIdx].glowIntensity = 1;
          signals.splice(i, 1);
          continue;
        }

        const na = nodes[sig.edge.a], nb = nodes[sig.edge.b];
        const [src, dst] = sig.forward ? [na, nb] : [nb, na];
        const px = src.x + (dst.x - src.x) * sig.t;
        const py = src.y + (dst.y - src.y) * sig.t;

        // Glow trail
        const grd = ctx.createRadialGradient(px, py, 0, px, py, 8);
        const isGold = sig.color === "#c8a46e";
        grd.addColorStop(0, isGold ? `rgba(200,164,110,${sig.opacity * 0.9})` : `rgba(138,180,248,${sig.opacity * 0.7})`);
        grd.addColorStop(1, "transparent");
        ctx.beginPath();
        ctx.arc(px, py, 8, 0, Math.PI * 2);
        ctx.fillStyle = grd;
        ctx.fill();

        // Core dot
        ctx.beginPath();
        ctx.arc(px, py, 2.5, 0, Math.PI * 2);
        ctx.fillStyle = isGold ? `rgba(200,164,110,${sig.opacity})` : `rgba(138,180,248,${sig.opacity})`;
        ctx.fill();
      }

      // Draw nodes
      const hIdx = stateRef.current?.hoveredNodeIdx ?? -1;
      const fIdx = stateRef.current?.focusedNodeIdx ?? -1;
      nodes.forEach((node, ni) => {
        node.pulsePhase += node.pulseSpeed;
        const pulse = Math.sin(node.pulsePhase) * 0.5 + 0.5;
        node.glowIntensity = Math.max(0, node.glowIntensity - 0.02);
        const isHovered = ni === hIdx;
        const isFocused = ni === fIdx;
        const boost = isHovered ? 0.7 : isFocused ? 0.9 : 0;
        if (isFocused) node.glowIntensity = Math.min(1, node.glowIntensity + 0.05);
        const glow = node.glowIntensity + (active ? pulse * 0.4 : pulse * 0.15) + boost;

        // Outer glow ring
        const outerR = node.radius + 4 + glow * 6;
        const grd = ctx.createRadialGradient(node.x, node.y, node.radius * 0.5, node.x, node.y, outerR);
        grd.addColorStop(0, `rgba(200,164,110,${0.3 + glow * 0.5})`);
        grd.addColorStop(1, "transparent");
        ctx.beginPath();
        ctx.arc(node.x, node.y, outerR, 0, Math.PI * 2);
        ctx.fillStyle = grd;
        ctx.fill();

        // Core node
        ctx.beginPath();
        ctx.arc(node.x, node.y, node.radius, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(200,164,110,${0.7 + glow * 0.3})`;
        ctx.fill();

        // Label
        ctx.font = `11px -apple-system, sans-serif`;
        ctx.fillStyle = `rgba(200,164,110,${0.5 + glow * 0.5})`;
        ctx.textAlign = "center";
        const labelY = node.y > cy + 20 ? node.y + node.radius + 16 : node.y - node.radius - 8;
        ctx.fillText(node.name, node.x, labelY);
      });

      animRef.current = requestAnimationFrame(draw);
    };

    draw();
    return () => { if (animRef.current) cancelAnimationFrame(animRef.current); };
  }, [thinkers.join(","), active, size]);

  const handleMouseMove = (e) => {
    if (!stateRef.current) return;
    const canvas = canvasRef.current;
    const rect = canvas.getBoundingClientRect();
    const scaleX = size / rect.width;
    const scaleY = size / rect.height;
    const mx = (e.clientX - rect.left) * scaleX;
    const my = (e.clientY - rect.top) * scaleY;
    const nodes = stateRef.current.nodes;
    let closest = -1, closestDist = 22;
    nodes.forEach((n, i) => {
      const d = Math.sqrt((n.x - mx) ** 2 + (n.y - my) ** 2);
      if (d < closestDist) { closestDist = d; closest = i; }
    });
    stateRef.current.hoveredNodeIdx = closest;
    setHoveredNode(closest === -1 ? null : closest);
    if (closest !== -1) {
      const n = nodes[closest];
      const sx = n.x / scaleX / (size / rect.width);
      const sy = n.y / scaleY / (size / rect.height);
      setTooltipPos({ x: rect.left + n.x * (rect.width / size), y: rect.top + n.y * (rect.height / size) });
    }
  };

  const handleMouseLeave = () => {
    if (stateRef.current) stateRef.current.hoveredNodeIdx = -1;
    setHoveredNode(null);
  };

  const handleClick = () => {
    if (hoveredNode === null) { setFocusedNode(null); if (stateRef.current) stateRef.current.focusedNodeIdx = -1; return; }
    const newFocus = focusedNode === hoveredNode ? null : hoveredNode;
    setFocusedNode(newFocus);
    if (stateRef.current) stateRef.current.focusedNodeIdx = newFocus ?? -1;
  };

  const bio = hoveredNode !== null ? THINKER_BIOS[thinkers[hoveredNode]] : null;
  const canvas = canvasRef.current;
  const rect = canvas ? canvas.getBoundingClientRect() : null;

  return (
    <div className="council-graph-wrap" style={{ display: "block", margin: "0 auto", width: size }}>
      <canvas ref={canvasRef} width={size} height={size}
        onMouseMove={handleMouseMove}
        onMouseLeave={handleMouseLeave}
        onClick={handleClick}
        style={{ display: "block", opacity: 0.92, cursor: hoveredNode !== null ? "pointer" : "default" }} />
      {hoveredNode !== null && rect && (
        <div className="council-node-tooltip" style={{
          left: canvasRef.current ? (stateRef.current?.nodes[hoveredNode]?.x ?? 0) * (rect.width / size) + 12 : 0,
          top:  canvasRef.current ? (stateRef.current?.nodes[hoveredNode]?.y ?? 0) * (rect.height / size) - 40 : 0,
        }}>
          <div className="council-node-tooltip-name">{thinkers[hoveredNode]}</div>
          {bio && <div className="council-node-tooltip-meta">{bio.dates} · {bio.tradition}</div>}
          {bio && <div className="council-node-tooltip-quote">"{bio.quote}"</div>}
          {!bio && <div className="council-node-tooltip-meta">Click to amplify</div>}
        </div>
      )}
      {focusedNode !== null && (
        <div style={{ textAlign: "center", marginTop: 8, fontSize: 11, color: "var(--accent)", letterSpacing: "0.08em", fontFamily: "var(--font-sans)" }}>
          {thinkers[focusedNode]} amplified · click again to release
        </div>
      )}
    </div>
  );
}

// ── Swarm Network Canvas — dense force-graph visualization ──────────────────
// Mirofish-inspired: 40 nodes, tradition-colored, cluster emergence, signal flow

function SwarmNetworkCanvas({ active = false, size = 460, resultData = null }) {
  const canvasRef = React.useRef(null);
  const animRef = React.useRef(null);
  const stateRef = React.useRef(null);
  const [hoveredNode, setHoveredNode] = React.useState(null);
  const [tooltipPos, setTooltipPos] = React.useState({ x: 0, y: 0 });

  React.useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    const dpr = window.devicePixelRatio || 1;
    canvas.width = size * dpr;
    canvas.height = size * dpr;
    ctx.scale(dpr, dpr);
    canvas.style.width = size + "px";
    canvas.style.height = size + "px";
    const W = size, H = size;
    const cx = W / 2, cy = H / 2;

    // Generate 40 agent nodes — distributed by tradition
    const WEIGHTS = {
      "Urban Pragmatist": 4, "Rural Traditionalist": 3, "Digital Native": 2, "Spiritual Seeker": 2,
      "Christian": 5, "First Wave": 4, "Third Wave": 3, "Postmodern": 3,
      "Stoic": 2, "Aristotelian": 2, "Nihilist": 2, "Scholastic": 2,
      "Jewish": 2, "Islamic": 2, "Second Wave": 1, "Platonist": 1,
      "Hedonist / Epicurean": 1, "Socratic Gadfly": 1, "Populist Cynic": 1,
    };

    // Place traditions in family clusters
    const familyAngles = { ancient: 0, abrahamic: 1.2, modern: 2.4, american: 3.6, alt: 4.8, friction: 5.6 };

    const nodes = [];
    let nodeId = 0;
    Object.entries(WEIGHTS).forEach(([tradition, count]) => {
      const family = TRADITION_FAMILY[tradition] || "alt";
      const baseAngle = familyAngles[family] || 0;
      const color = TRADITION_COLORS[tradition] || "#c8a46e";
      const isFriction = family === "friction";
      for (let i = 0; i < count; i++) {
        const angle = baseAngle + (Math.random() - 0.5) * 1.1;
        const dist = (0.25 + Math.random() * 0.55) * (W * 0.38);
        nodes.push({
          id: nodeId++,
          tradition,
          family,
          color,
          isFriction,
          x: cx + Math.cos(angle) * dist + (Math.random() - 0.5) * 30,
          y: cy + Math.sin(angle) * dist + (Math.random() - 0.5) * 30,
          vx: 0, vy: 0,
          radius: isFriction ? 4.5 : (3 + count * 0.3 + Math.random() * 1.5),
          pulsePhase: Math.random() * Math.PI * 2,
          pulseSpeed: 0.012 + Math.random() * 0.008,
          glowIntensity: 0,
          activated: false,
          activationTime: 0,

    // Build edges — connect within family (strong) and across families (weak)
    const edges = [];
    for (let i = 0; i < nodes.length; i++) {
      for (let j = i + 1; j < nodes.length; j++) {
        const dx = nodes[j].x - nodes[i].x;
        const dy = nodes[j].y - nodes[i].y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const sameFamily = nodes[i].family === nodes[j].family;
        const sameTradition = nodes[i].tradition === nodes[j].tradition;
        // Dense within-family connections, sparse cross-family
        const threshold = sameTradition ? W * 0.5 : sameFamily ? W * 0.35 : W * 0.15;
        if (dist < threshold) {
          edges.push({
            a: i, b: j, dist,
            strength: sameTradition ? 0.8 : sameFamily ? 0.5 : 0.2,
            drawProgress: 0,
          });
        }
      }
    }

    // Signals — traveling packets of light
    const signals = [];
    const spawnSignal = (urgent = false) => {
      if (signals.length > (active ? 60 : 8)) return;
      const edge = edges[Math.floor(Math.random() * edges.length)];
      if (!edge) return;
      const forward = Math.random() > 0.5;
      const srcNode = nodes[forward ? edge.a : edge.b];
      signals.push({
        edge, t: 0, forward,
        speed: urgent ? 0.012 : (0.003 + Math.random() * 0.005),
        opacity: 0,
        color: urgent ? "#f43f5e" : srcNode.color,
        size: urgent ? 4 : 2,
        trail: urgent,
      });
    };

    // Activation wave — nodes light up in sequence during deliberation
    let activationIdx = 0;
    const activateNext = () => {
      if (activationIdx < nodes.length) {
        nodes[activationIdx].activated = true;
        nodes[activationIdx].activationTime = frame;
        nodes[activationIdx].glowIntensity = 1.5;
        // Spawn signals from newly activated node
        const nodeEdges = edges.filter(e => e.a === activationIdx || e.b === activationIdx);
        nodeEdges.slice(0, 3).forEach(() => spawnSignal(nodes[activationIdx].isFriction));
        activationIdx++;
      }
    };

    // Seed initial signals
    for (let i = 0; i < (active ? 15 : 4); i++) spawnSignal();

    let frame = 0;

    // Simple force simulation for gentle node drift
    const applyForces = () => {
      // Repulsion between all nodes
      for (let i = 0; i < nodes.length; i++) {
        for (let j = i + 1; j < nodes.length; j++) {
          const dx = nodes[j].x - nodes[i].x;
          const dy = nodes[j].y - nodes[i].y;
          const dist = Math.max(Math.sqrt(dx * dx + dy * dy), 1);
          const minDist = (nodes[i].radius + nodes[j].radius) * 2.5;
          if (dist < minDist) {
            const force = (minDist - dist) / minDist * 0.15;
            const fx = (dx / dist) * force;
            const fy = (dy / dist) * force;
            nodes[i].vx -= fx; nodes[i].vy -= fy;
            nodes[j].vx += fx; nodes[j].vy += fy;
          }
        }
      }
      // Gravity toward center
      nodes.forEach(n => {
        const dx = cx - n.x, dy = cy - n.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist > W * 0.4) {
          n.vx += dx * 0.001;
          n.vy += dy * 0.001;
        }
      });
      // Apply velocities with damping
      nodes.forEach(n => {
        n.x += n.vx;
        n.y += n.vy;
        n.vx *= 0.92;
        n.vy *= 0.92;
      });
    };

    const draw = () => {
      ctx.clearRect(0, 0, W, H);
      frame++;

      // Activate nodes sequentially during deliberation
      if (active && frame % 8 === 0) activateNext();

      // Gentle force simulation
      if (frame % 3 === 0) applyForces();

      // Spawn signals
      if (frame % (active ? 12 : 40) === 0) spawnSignal();
      // Friction agents send disruptive signals occasionally
      if (active && frame % 25 === 0) {
        const frictionNodes = nodes.filter(n => n.isFriction && n.activated);
        if (frictionNodes.length > 0) spawnSignal(true);
      }

      // ── Draw edges ──
      edges.forEach(edge => {
        if (edge.drawProgress < 1) edge.drawProgress = Math.min(1, edge.drawProgress + 0.015);
        const na = nodes[edge.a], nb = nodes[edge.b];
        // Only draw if both nodes activated (during deliberation)
        if (active && (!na.activated || !nb.activated)) return;
        const tx = na.x + (nb.x - na.x) * edge.drawProgress;
        const ty = na.y + (nb.y - na.y) * edge.drawProgress;
        ctx.beginPath();
        ctx.moveTo(na.x, na.y);
        ctx.lineTo(tx, ty);
        const alpha = edge.strength * 0.35 * edge.drawProgress;
        ctx.strokeStyle = `rgba(200,164,110,${alpha})`;
        ctx.lineWidth = edge.strength > 0.5 ? 0.8 : 0.4;
        ctx.stroke();
      });

      // ── Draw signals ──
      for (let i = signals.length - 1; i >= 0; i--) {
        const sig = signals[i];
        sig.t += sig.speed * (active ? 1.6 : 0.8);
        if (sig.t < 0.1) sig.opacity = sig.t / 0.1;
        else if (sig.t > 0.85) sig.opacity = (1 - sig.t) / 0.15;
        else sig.opacity = 1;

        if (sig.t >= 1) {
          const destIdx = sig.forward ? sig.edge.b : sig.edge.a;
          nodes[destIdx].glowIntensity = Math.min(2, nodes[destIdx].glowIntensity + 0.6);
          signals.splice(i, 1);
          continue;
        }

        const na = nodes[sig.edge.a], nb = nodes[sig.edge.b];
        const [src, dst] = sig.forward ? [na, nb] : [nb, na];

        const py = src.y + (dst.y - src.y) * sig.t;

        // Trail effect for friction signals
        if (sig.trail) {

          grd.addColorStop(0, `rgba(244,63,94,${sig.opacity * 0.6})`);
          grd.addColorStop(1, "transparent");

          ctx.arc(px, py, 14, 0, Math.PI * 2);
          ctx.fillStyle = grd;
          ctx.fill();
        }

        // Parse signal color (hex) to RGB
        const sHex = sig.color;
        const sR = parseInt(sHex.slice(1,3), 16) || 200;
        const sG = parseInt(sHex.slice(3,5), 16) || 164;
        const sB = parseInt(sHex.slice(5,7), 16) || 110;

        // Signal glow
        const grd = ctx.createRadialGradient(px, py, 0, px, py, sig.size + 5);
        grd.addColorStop(0, `rgba(${sR},${sG},${sB},${sig.opacity * 0.8})`);
        grd.addColorStop(1, "transparent");
        ctx.beginPath();
        ctx.arc(px, py, sig.size + 5, 0, Math.PI * 2);
        ctx.fillStyle = grd;
        ctx.fill();

        // Core dot
        ctx.beginPath();
        ctx.arc(px, py, sig.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${sR},${sG},${sB},${sig.opacity})`;
        ctx.fill();
      }

      // ── Draw nodes ──
      const hIdx = stateRef.current?.hoveredNodeIdx ?? -1;
      nodes.forEach((node, ni) => {
        if (active && !node.activated) return; // Hidden until activated

        node.pulsePhase += node.pulseSpeed;
        const pulse = Math.sin(node.pulsePhase) * 0.5 + 0.5;
        node.glowIntensity = Math.max(0, node.glowIntensity - 0.015);
        const isHovered = ni === hIdx;
        const glow = node.glowIntensity + (active ? pulse * 0.5 : pulse * 0.2) + (isHovered ? 0.8 : 0);

        // Parse hex color to RGB for glow
        const hex = node.color;
        const r = parseInt(hex.slice(1,3), 16);
        const g = parseInt(hex.slice(3,5), 16);
        const b = parseInt(hex.slice(5,7), 16);

        // Outer glow — tradition-colored
        const outerR = node.radius + 3 + glow * 8;
        const grd = ctx.createRadialGradient(node.x, node.y, node.radius * 0.3, node.x, node.y, outerR);
        grd.addColorStop(0, `rgba(${r},${g},${b},${0.3 + glow * 0.4})`);
        grd.addColorStop(0.6, `rgba(${r},${g},${b},${0.08 + glow * 0.12})`);
        grd.addColorStop(1, "transparent");
        ctx.beginPath();
        ctx.arc(node.x, node.y, outerR, 0, Math.PI * 2);
        ctx.fillStyle = grd;
        ctx.fill();

        // Core node — solid with slight border
        ctx.beginPath();
        ctx.arc(node.x, node.y, node.radius, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${r},${g},${b},${0.75 + glow * 0.25})`;
        ctx.fill();
        if (node.isFriction) {

        if (isHovered || node.isFriction) {

          ctx.fillText(node.tradition, node.x, node.y - node.radius - 6);
        }
      });

      // ── Family region labels (interactive) ──
      const familyLabelPositions = [];
      if (!active || frame > 200) {
        ctx.font = "9px -apple-system, sans-serif";
        ctx.textAlign = "center";
        const labelR = W * 0.43;
        const hFam = stateRef.current?.hoveredFamily || null;
        Object.entries(familyAngles).forEach(([family, angle]) => {

  const FAMILY_DESCRIPTIONS = {

    labels.forEach(lbl => {

    // Then check nodes
    let closest = -1, closestDist = 20;
    nodes.forEach((n, i) => {

      const d = Math.sqrt((n.x - mx) ** 2 + (n.y - my) ** 2);
      if (d < closestDist) { closestDist = d; closest = i; }
    });
    stateRef.current.hoveredNodeIdx = closest;
    setHoveredNode(closest === -1 ? null : closest);
    if (closest !== -1) {
      setTooltipPos({
        x: rect.left + nodes[closest].x * (rect.width / size),
        y: rect.top + nodes[closest].y * (rect.height / size),
      });
    }
  };

  const hNode = hoveredNode !== null ? stateRef.current?.nodes[hoveredNode] : null;
  const hFamily = hoveredFamily ? FAMILY_DESCRIPTIONS[hoveredFamily] : null;

  return (
    <div className="council-graph-wrap" style={{ display: "block", margin: "0 auto", width: size, position: "relative" }}>
      <canvas ref={canvasRef}
        onMouseMove={handleMouseMove}
        onMouseLeave={() => {
          if (stateRef.current) { stateRef.current.hoveredNodeIdx = -1; stateRef.current.hoveredFamily = null; }
          setHoveredNode(null);
          setHoveredFamily(null);
        }}
        style={{ display: "block", width: size, height: size, cursor: (hoveredNode !== null || hoveredFamily) ? "pointer" : "default" }} />
      {hNode && !hoveredFamily && (
        <div className="council-node-tooltip" style={{
          left: hNode.x * (canvasRef.current?.getBoundingClientRect().width / size || 1) + 14,
          top: hNode.y * (canvasRef.current?.getBoundingClientRect().height / size || 1) - 30,
        }}>
          <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 4 }}>
            <div style={{ width: 8, height: 8, borderRadius: "50%", background: hNode.color }} />
            <div className="council-node-tooltip-name">{hNode.tradition}</div>
          </div>
          <div className="council-node-tooltip-meta">

            {hNode.isFriction ? " · FRICTION AGENT" : ""}
          </div>
        </div>
      )}
      {hFamily && (
        <div className="council-node-tooltip" style={{
          left: familyTooltipPos.x + 14,
          top: familyTooltipPos.y - 10,
          minWidth: 180, maxWidth: 240,

          <div style={{ fontSize: 12, fontWeight: 700, color: "var(--text)", marginBottom: 4, fontFamily: "var(--font-sans)" }}>

                }}>{t}</span>
              ))}

          <div style={{ fontSize: 9, color: "var(--text-dim)", marginTop: 6, fontFamily: "var(--font-sans)", opacity: 0.6 }}>
            {stateRef.current?.nodes?.filter(n => TRADITION_FAMILY[n.tradition] === hoveredFamily).length || 0} agents in this family
          </div>
        </div>
      )}
    </div>
  );

// ── Swarm Results Network — post-deliberation visualization ──────────────────

function SwarmResultsGraph({ resultData, size = 420 }) {
