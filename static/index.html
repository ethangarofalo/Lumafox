    const ctx = canvas.getContext("2d");
    const W = canvas.width = size;
    const H = canvas.height = size;
    const cx = W / 2, cy = H / 2;
    const n = thinkers.length;
    const R = size * 0.34;

    // Build nodes — arrange in a circle, with slight random jitter
    const nodes = thinkers.map((name, i) => {
      const angle = (i / n) * Math.PI * 2 - Math.PI / 2;
      const jitter = 0.92 + Math.random() * 0.16;
      return {
        x: cx + Math.cos(angle) * R * jitter,
        y: cy + Math.sin(angle) * R * jitter,
        name,
        radius: 5 + Math.random() * 2,
        pulsePhase: Math.random() * Math.PI * 2,
        pulseSpeed: 0.018 + Math.random() * 0.012,
        glowIntensity: 0,
      };
    });

    // All edges between nodes — with draw-in animation progress
    const edges = [];
    for (let i = 0; i < nodes.length; i++) {
      for (let j = i + 1; j < nodes.length; j++) {
        const dx = nodes[j].x - nodes[i].x;
        const dy = nodes[j].y - nodes[i].y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        // Skip edges that cross the center too far (keeps it from looking like a web)
        if (dist < R * 2.1) {
          edges.push({ a: i, b: j, dist, drawProgress: 0 });
        }
      }
    }

    // Active signals traveling along edges
    const signals = [];
    const spawnSignal = () => {
      if (!active && signals.length > 2) return;
      if (active && signals.length > n * 2) return;
      const edge = edges[Math.floor(Math.random() * edges.length)];
      const forward = Math.random() > 0.5;
      signals.push({
        edge,
        t: 0,
        speed: 0.004 + Math.random() * 0.006,
        forward,
        opacity: 0,
        color: Math.random() > 0.3 ? "#c8a46e" : "#8ab4f8",
      });
    };

    // Seed some initial signals
    for (let i = 0; i < (active ? n : 2); i++) spawnSignal();

    let frame = 0;
    stateRef.current = { nodes, edges, signals, spawnSignal };

    const draw = () => {
      ctx.clearRect(0, 0, W, H);
      frame++;

      // Spawn new signals periodically
      if (frame % (active ? 18 : 60) === 0) spawnSignal();

      // Draw edges — animate draw-in for first ~60 frames
      edges.forEach(edge => {
        if (edge.drawProgress < 1) edge.drawProgress = Math.min(1, edge.drawProgress + 0.028);
        const na = nodes[edge.a], nb = nodes[edge.b];
        const tx = na.x + (nb.x - na.x) * edge.drawProgress;
        const ty = na.y + (nb.y - na.y) * edge.drawProgress;
        ctx.beginPath();
        ctx.moveTo(na.x, na.y);
        ctx.lineTo(tx, ty);
        // Gold tint while drawing in, then fade to dim
        const goldFade = 1 - edge.drawProgress;
        ctx.strokeStyle = goldFade > 0
          ? `rgba(200,164,110,${0.6 * goldFade + 0.12})`
          : "rgba(60,55,50,0.55)";
        ctx.lineWidth = goldFade > 0 ? 1.2 : 0.8;
        ctx.stroke();
      });

      // Draw signals
      for (let i = signals.length - 1; i >= 0; i--) {
        const sig = signals[i];
        sig.t += sig.speed * (active ? 1.4 : 0.7);
        if (sig.t < 0.15) sig.opacity = sig.t / 0.15;
        else if (sig.t > 0.85) sig.opacity = (1 - sig.t) / 0.15;
        else sig.opacity = 1;

        if (sig.t >= 1) {
          // Light up the destination node briefly
          const destIdx = sig.forward ? sig.edge.b : sig.edge.a;
          nodes[destIdx].glowIntensity = 1;
          signals.splice(i, 1);
          continue;
        }

        const na = nodes[sig.edge.a], nb = nodes[sig.edge.b];
        const [src, dst] = sig.forward ? [na, nb] : [nb, na];
        const px = src.x + (dst.x - src.x) * sig.t;
        const py = src.y + (dst.y - src.y) * sig.t;

        // Glow trail
        const grd = ctx.createRadialGradient(px, py, 0, px, py, 8);
        const isGold = sig.color === "#c8a46e";
        grd.addColorStop(0, isGold ? `rgba(200,164,110,${sig.opacity * 0.9})` : `rgba(138,180,248,${sig.opacity * 0.7})`);
        grd.addColorStop(1, "transparent");
        ctx.beginPath();
        ctx.arc(px, py, 8, 0, Math.PI * 2);
        ctx.fillStyle = grd;
        ctx.fill();

        // Core dot
        ctx.beginPath();
        ctx.arc(px, py, 2.5, 0, Math.PI * 2);
        ctx.fillStyle = isGold ? `rgba(200,164,110,${sig.opacity})` : `rgba(138,180,248,${sig.opacity})`;
        ctx.fill();
      }

      // Draw nodes
      const hIdx = stateRef.current?.hoveredNodeIdx ?? -1;
      const fIdx = stateRef.current?.focusedNodeIdx ?? -1;
      nodes.forEach((node, ni) => {
        node.pulsePhase += node.pulseSpeed;
        const pulse = Math.sin(node.pulsePhase) * 0.5 + 0.5;
        node.glowIntensity = Math.max(0, node.glowIntensity - 0.02);
        const isHovered = ni === hIdx;
        const isFocused = ni === fIdx;
        const boost = isHovered ? 0.7 : isFocused ? 0.9 : 0;
        if (isFocused) node.glowIntensity = Math.min(1, node.glowIntensity + 0.05);
        const glow = node.glowIntensity + (active ? pulse * 0.4 : pulse * 0.15) + boost;

        // Outer glow ring
        const outerR = node.radius + 4 + glow * 6;
        const grd = ctx.createRadialGradient(node.x, node.y, node.radius * 0.5, node.x, node.y, outerR);
        grd.addColorStop(0, `rgba(200,164,110,${0.3 + glow * 0.5})`);
        grd.addColorStop(1, "transparent");
        ctx.beginPath();
        ctx.arc(node.x, node.y, outerR, 0, Math.PI * 2);
        ctx.fillStyle = grd;
        ctx.fill();

        // Core node
        ctx.beginPath();
        ctx.arc(node.x, node.y, node.radius, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(200,164,110,${0.7 + glow * 0.3})`;
        ctx.fill();

        // Label
        ctx.font = `11px -apple-system, sans-serif`;
        ctx.fillStyle = `rgba(200,164,110,${0.5 + glow * 0.5})`;
        ctx.textAlign = "center";
        const labelY = node.y > cy + 20 ? node.y + node.radius + 16 : node.y - node.radius - 8;
        ctx.fillText(node.name, node.x, labelY);
      });

      animRef.current = requestAnimationFrame(draw);
    };

    draw();
    return () => { if (animRef.current) cancelAnimationFrame(animRef.current); };
  }, [thinkers.join(","), active, size]);

  const handleMouseMove = (e) => {
    if (!stateRef.current) return;
    const canvas = canvasRef.current;
    const rect = canvas.getBoundingClientRect();
    const scaleX = size / rect.width;
    const scaleY = size / rect.height;
    const mx = (e.clientX - rect.left) * scaleX;
    const my = (e.clientY - rect.top) * scaleY;
    const nodes = stateRef.current.nodes;
    let closest = -1, closestDist = 22;
    nodes.forEach((n, i) => {
      const d = Math.sqrt((n.x - mx) ** 2 + (n.y - my) ** 2);
      if (d < closestDist) { closestDist = d; closest = i; }
    });
    stateRef.current.hoveredNodeIdx = closest;
    setHoveredNode(closest === -1 ? null : closest);
    if (closest !== -1) {
      const n = nodes[closest];
      const sx = n.x / scaleX / (size / rect.width);
      const sy = n.y / scaleY / (size / rect.height);
      setTooltipPos({ x: rect.left + n.x * (rect.width / size), y: rect.top + n.y * (rect.height / size) });
    }
  };

  const handleMouseLeave = () => {
    if (stateRef.current) stateRef.current.hoveredNodeIdx = -1;
    setHoveredNode(null);
  };

  const handleClick = () => {
    if (hoveredNode === null) { setFocusedNode(null); if (stateRef.current) stateRef.current.focusedNodeIdx = -1; return; }
    const newFocus = focusedNode === hoveredNode ? null : hoveredNode;
    setFocusedNode(newFocus);
    if (stateRef.current) stateRef.current.focusedNodeIdx = newFocus ?? -1;
  };

  const bio = hoveredNode !== null ? THINKER_BIOS[thinkers[hoveredNode]] : null;
  const canvas = canvasRef.current;
  const rect = canvas ? canvas.getBoundingClientRect() : null;

  return (
    <div className="council-graph-wrap" style={{ display: "block", margin: "0 auto", width: size }}>
      <canvas ref={canvasRef} width={size} height={size}
        onMouseMove={handleMouseMove}
        onMouseLeave={handleMouseLeave}
        onClick={handleClick}
        style={{ display: "block", opacity: 0.92, cursor: hoveredNode !== null ? "pointer" : "default" }} />
      {hoveredNode !== null && rect && (
        <div className="council-node-tooltip" style={{
          left: canvasRef.current ? (stateRef.current?.nodes[hoveredNode]?.x ?? 0) * (rect.width / size) + 12 : 0,
          top:  canvasRef.current ? (stateRef.current?.nodes[hoveredNode]?.y ?? 0) * (rect.height / size) - 40 : 0,
        }}>
          <div className="council-node-tooltip-name">{thinkers[hoveredNode]}</div>
          {bio && <div className="council-node-tooltip-meta">{bio.dates} · {bio.tradition}</div>}
          {bio && <div className="council-node-tooltip-quote">"{bio.quote}"</div>}
          {!bio && <div className="council-node-tooltip-meta">Click to amplify</div>}
        </div>
      )}
      {focusedNode !== null && (
        <div style={{ textAlign: "center", marginTop: 8, fontSize: 11, color: "var(--accent)", letterSpacing: "0.08em", fontFamily: "var(--font-sans)" }}>
          {thinkers[focusedNode]} amplified · click again to release
        </div>
      )}
    </div>
  );
}

// ── Council deliberating state — full dramatic canvas with cycling thinker status ──
const COUNCIL_VERBS = [
  "deliberating", "considering", "reasoning", "formulating",
  "reflecting", "arguing", "weighing", "responding",
];

const SWARM_TRADITIONS = [
  "Platonist", "Aristotelian", "Stoic", "Christian", "Islamic", "Jewish",
  "Hedonist", "Nihilist", "Postmodern", "Early Modernity", "Late Modernity",
  "High Modernity", "Contemporary American",
];

function CouncilDeliberating({ thinkers, swarm = false }) {
  const [activeThinker, setActiveThinker] = React.useState(0);
  const [verb, setVerb] = React.useState(COUNCIL_VERBS[0]);
  const [fade, setFade] = React.useState(true);
  const [round, setRound] = React.useState(1);

  const displayNames = swarm ? SWARM_TRADITIONS : thinkers;

  React.useEffect(() => {
    const cycle = setInterval(() => {
      setFade(false);
      setTimeout(() => {
        setActiveThinker(i => (i + 1) % displayNames.length);
        setVerb(COUNCIL_VERBS[Math.floor(Math.random() * COUNCIL_VERBS.length)]);
        setFade(true);
      }, 300);
    }, swarm ? 1200 : 1800);
    return () => clearInterval(cycle);
  }, [displayNames.length, swarm]);

  // Swarm: cycle round indicator between 1 and 2
  React.useEffect(() => {
    if (!swarm) return;
    const t = setTimeout(() => setRound(2), 18000); // ~18s into deliberation
    return () => clearTimeout(t);
  }, [swarm]);

  return (
    <div style={{
      flex: 1, display: "flex", flexDirection: "column",
      alignItems: "center", justifyContent: "center",
      minHeight: 420, gap: 0,
    }}>
      <NeuralCanvas thinkers={swarm ? SWARM_TRADITIONS : thinkers} size={380} active={true} />

      {/* Thinker status line */}
      <div style={{
        marginTop: 4, height: 36, display: "flex",
        alignItems: "center", justifyContent: "center", gap: 10,
      }}>
        <span style={{
          fontFamily: "var(--font)", fontSize: "1.05rem",
          color: "var(--accent)",
          opacity: fade ? 1 : 0,
          transition: "opacity 0.3s ease",
        }}>
          {displayNames[activeThinker]}
        </span>
        <span style={{
          fontFamily: "var(--font-sans)", fontSize: "0.8rem",
          color: "var(--text-faint)", letterSpacing: "0.12em",
          opacity: fade ? 1 : 0,
          transition: "opacity 0.3s ease",
        }}>
          {verb}
        </span>
      </div>

      {/* Round indicator dots */}
      <div style={{ display: "flex", gap: 6, marginTop: 16 }}>
        {displayNames.map((_, i) => (
          <div key={i} style={{
            width: 5, height: 5, borderRadius: "50%",
            background: i === activeThinker ? "var(--accent)" : "var(--border)",
            transition: "background 0.3s",
          }} />
        ))}
      </div>

      <div style={{
        marginTop: 20,
        fontFamily: "var(--font-sans)", fontSize: 11,
        color: "var(--text-faint)", letterSpacing: "0.2em",
        textTransform: "uppercase",
      }}>
        {swarm
          ? `Swarm intelligence · Round ${round} of 2 · 40 agents`
          : "The council convenes"}
      </div>
    </div>
  );
}

function CouncilView({ isGuest, onNeedAuth }) {
  const [mode, setMode] = useState("advice");
  const [question, setQuestion] = useState("");
  const [prose, setProse] = useState("");
  const [writingInputMode, setWritingInputMode] = useState("question"); // "question" | "prose"
  const [thinkers, setThinkers] = useState(new Set(ALL_THINKERS));
  const [swarmMode, setSwarmMode] = useState(false);
  const [councilTier, setCouncilTier] = useState("full"); // "lite" | "full" | "swarm"
  const [credits, setCredits] = useState(null); // {remaining, per_week, costs}
  const [deliberating, setDeliberating] = useState(false);
  const [result, setResult] = useState(null);
  const [error, setError] = useState("");
  const [limitData, setLimitData] = useState(null);

  // Load credit balance on mount
  React.useEffect(() => {
    api("/council/credits").then(d => setCredits({
      remaining: d.credits_remaining,
      perWeek: d.credits_per_week,
      costs: d.costs,
      plan: d.plan,
    })).catch(() => {});
  }, []);

  const toggleThinker = (name) => {
    setThinkers(prev => {
      const next = new Set(prev);
      if (next.has(name)) {
        if (next.size <= 2) return prev; // minimum 2
        next.delete(name);
      } else {
        next.add(name);
      }
      return next;
    });
  };

  const handleSubmit = async () => {
    if (isGuest) { onNeedAuth(); return; }
    const q = question.trim();
    const p = prose.trim();
    if (mode === "writing" && writingInputMode === "prose" && !p) {
      setError("Paste the text you'd like the council to read."); return;
    }
    if (mode !== "writing" && !q) { setError("Ask the council something."); return; }
    if (mode === "writing" && writingInputMode === "question" && !q) {
      setError("Ask a question about your writing."); return;
    }
    setError("");
    setDeliberating(true);
    setResult(null);
    try {
      const body = {
        question: q || "Please read and respond to this passage.",
        mode,
        thinkers: [...thinkers],
        council_tier: councilTier,
        swarm: councilTier === "swarm",
      };
      if (mode === "writing" && p) body.prose = p;
      const r = await api("/council", { method: "POST", body: JSON.stringify(body) });
      if (r.credits_remaining !== undefined) {
        setCredits(prev => prev ? { ...prev, remaining: r.credits_remaining } : null);
      }
      setResult(r);
    } catch (e) {
      if (e.limitData) {
        setLimitData(e.limitData);
      } else {
        setError(e.message || "The council could not convene. Try again.");
      }
    }
    setDeliberating(false);
  };

  const handleReset = () => { setResult(null); setQuestion(""); setProse(""); };

  if (limitData) {
    return (
      <div className="write-container" style={{ display: "flex", alignItems: "center", justifyContent: "center", minHeight: 400 }}>
        <div style={{ textAlign: "center", maxWidth: 420, padding: "0 24px" }}>
          <div style={{ fontSize: 32, marginBottom: 16 }}>⚖️</div>
          <div style={{ fontSize: 20, fontWeight: 600, color: "var(--text)", marginBottom: 12 }}>
            The council has adjourned for the week.
          </div>
          <div style={{ fontSize: 14, color: "var(--text-dim)", lineHeight: 1.6, marginBottom: 28 }}>
            {limitData.message}
          </div>
          <div style={{ display: "flex", gap: 10, justifyContent: "center", flexWrap: "wrap" }}>
            {limitData.is_guest ? (
              <>
                <button className="empty-cta-primary" onClick={() => onNeedAuth && onNeedAuth()}>
                  Create free account →
                </button>
                <button className="empty-cta-secondary" onClick={() => setLimitData(null)}>
                  Back
                </button>
              </>
            ) : (
              <>
                <button className="empty-cta-primary" onClick={() => window.location.href = "/app?upgrade=1"}>
                  Upgrade →
                </button>
                <button className="empty-cta-secondary" onClick={() => setLimitData(null)}>
                  Back
                </button>
              </>
            )}
          </div>
          <div style={{ marginTop: 16, fontSize: 11, color: "var(--text-dim)", opacity: 0.6 }}>
            Usage resets every Monday. {limitData.used}/{limitData.limit} used this week.
          </div>
        </div>
      </div>
    );
  }

  if (deliberating) {
    return <CouncilDeliberating thinkers={[...thinkers]} swarm={swarmMode} />;
  }

  if (result) {
    // ── Swarm result layout ──────────────────────────────────────────────────
    if (result.swarm) {
      return (
        <div className="write-container">
          <div className="write-section">

            {/* Header bar */}
            <div style={{ display: "flex", alignItems: "center", gap: 14, marginBottom: 28 }}>
              <div className="write-label" style={{ color: "var(--accent)", fontSize: 10, letterSpacing: "0.3em" }}>
                SWARM INTELLIGENCE
              </div>
              <div style={{
                padding: "3px 12px", borderRadius: 20,
                border: "1px solid var(--accent-dim)",
                fontFamily: "var(--font-sans)", fontSize: 11, color: "var(--accent)",
                letterSpacing: "0.06em",
              }}>
                {result.shift_percentage}% shifted between rounds
              </div>
              <div style={{
                fontFamily: "var(--font-sans)", fontSize: 11, color: "var(--text-faint)",
              }}>
                {result.n_agents} agents · 2 rounds
              </div>
            </div>

            {/* Synthesis */}
            <div style={{ marginBottom: 28, padding: "24px 28px", background: "var(--bg-elevated)", borderRadius: "var(--radius)", border: "1px solid var(--border)" }}>
              <div className="write-label" style={{ marginBottom: 12, fontSize: 10 }}>THE POPULATION SPEAKS</div>
              <p style={{ fontFamily: "var(--font)", fontSize: "1.05rem", color: "var(--text)", lineHeight: 1.85 }}>
                {result.synthesis}
              </p>
            </div>

            {/* Fault lines + What shifted */}
            {(result.fault_lines || result.what_shifted) && (
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14, marginBottom: 28 }}>
                {result.fault_lines && (
                  <div style={{ padding: "16px 18px", background: "var(--bg-elevated)", borderRadius: "var(--radius)", border: "1px solid var(--border)" }}>
                    <div className="write-label" style={{ marginBottom: 10, fontSize: 10 }}>Fault Lines</div>
                    <p style={{ fontFamily: "var(--font-sans)", fontSize: 13, color: "var(--text-dim)", lineHeight: 1.65 }}>
                      {result.fault_lines}
                    </p>
                  </div>
                )}
                {result.what_shifted && (
                  <div style={{ padding: "16px 18px", background: "var(--bg-elevated)", borderRadius: "var(--radius)", border: "1px solid var(--border)" }}>
                    <div className="write-label" style={{ marginBottom: 10, fontSize: 10 }}>What Shifted</div>
                    <p style={{ fontFamily: "var(--font-sans)", fontSize: 13, color: "var(--text-dim)", lineHeight: 1.65 }}>
                      {result.what_shifted}
                    </p>
                  </div>
                )}
              </div>
            )}

            {/* Tradition breakdown grid */}
            <div className="write-label" style={{ marginBottom: 14 }}>Tradition Breakdown</div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(200px, 1fr))", gap: 10, marginBottom: 32 }}>
              {result.thinkers.map(t => (
                <SwarmTraditionCard key={t.name} card={t} />
              ))}
            </div>

            <button className="action-btn" onClick={handleReset}>
              Ask another question
            </button>
          </div>
        </div>
      );
    }

    // ── Original council result layout ───────────────────────────────────────
    return (
      <div className="write-container">
        <div className="write-section">
          {/* Synthesis */}

            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 14 }}>
              <div className="write-label" style={{ color: "var(--accent)", fontSize: 10, letterSpacing: "0.3em" }}>THE COUNCIL SPEAKS</div>

              <button

                  const lines = [

                    `**Mode:** ${result.mode}`,
                    `**Date:** ${new Date().toLocaleDateString("en-US", { year:"numeric", month:"long", day:"numeric" })}`,
                    ``,
                    `---`,
                    ``,
                    `## Synthesis`,
                    ``,

                  ];
                  if (result.thinkers?.length) {

                  document.body.appendChild(a); a.click();
                  document.body.removeChild(a); URL.revokeObjectURL(url);

              >

              >

const VOICE_EXAMPLES = [
  "a novelist who never uses adverbs",
  "a CEO who writes like a poet",
  "a scientist who explains like a storyteller",
  "a lawyer who argues like a philosopher",
  "a teacher who makes the hard simple",

function WelcomeScreen({ onCreate, onFind }) {
  const [display, setDisplay] = React.useState("");
  const [exIdx, setExIdx] = React.useState(0);
  const [phase, setPhase] = React.useState("typing"); // typing | pausing | erasing

  React.useEffect(() => {
    const target = VOICE_EXAMPLES[exIdx];
    let timeout;
    if (phase === "typing") {
      if (display.length < target.length) {
        timeout = setTimeout(() => setDisplay(target.slice(0, display.length + 1)), 42);
      } else {
        timeout = setTimeout(() => setPhase("pausing"), 1800);
      }
    } else if (phase === "pausing") {
      timeout = setTimeout(() => setPhase("erasing"), 400);
    } else {
      if (display.length > 0) {
        timeout = setTimeout(() => setDisplay(display.slice(0, -1)), 18);
      } else {
        setExIdx((i) => (i + 1) % VOICE_EXAMPLES.length);
        setPhase("typing");
      }
    }
    return () => clearTimeout(timeout);
  }, [display, exIdx, phase]);

  return (
    <div className="empty-state">
      <ParticleField />
      <div className="empty-state-inner">
        <div className="empty-hero">
          Your writing has a voice.<br />
          Now it can <em>teach</em>.

        <div className="empty-typewriter">

        <div className="empty-sub">
          Create a voice profile, give it your writing, and it learns how you think.
          Use it to write, analyze drafts, or export it to any tool you already use.

        <div className="empty-cta-row">
          <button className="empty-cta-primary" onClick={onCreate}>
            Start a Voice →

            <div className="empty-proof-label">Steps to start</div>
          </div>
          <div className="empty-proof-item">
            <div className="empty-proof-num">0</div>
            <div className="empty-proof-label">Coding required</div>
          </div>
        </div>
      </div>
    </div>
  );

// ── Particle Field — ambient background for the Voice content area ──
function ParticleField() {
  const canvasRef = React.useRef(null);
  const animRef = React.useRef(null);
  const mouseRef = React.useRef({ x: -9999, y: -9999 });

  React.useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext("2d");

    let W, H;
    const resize = () => {
      W = canvas.width = canvas.offsetWidth;
      H = canvas.height = canvas.offsetHeight;
    };
    resize();
    const resizeObs = new ResizeObserver(resize);
    resizeObs.observe(canvas);

    const COUNT = 88;
    const CONNECT_DIST = 110;
    const MOUSE_DIST = 90;

    const particles = Array.from({ length: COUNT }, () => ({
      x: Math.random() * (W || 800),
      y: Math.random() * (H || 600),
      vx: (Math.random() - 0.5) * 0.22,
      vy: (Math.random() - 0.5) * 0.22,
      r: 1.2 + Math.random() * 1.6,
      opacity: 0.28 + Math.random() * 0.48,
      // Some particles drift faster for depth
      speed: 0.6 + Math.random() * 0.8,
    }));

    const onMouseMove = (e) => {
      const rect = canvas.getBoundingClientRect();
      mouseRef.current = { x: e.clientX - rect.left, y: e.clientY - rect.top };
    };
    const onMouseLeave = () => { mouseRef.current = { x: -9999, y: -9999 }; };
    // Listen on the parent container so mouse still works with pointer-events:none on canvas
    const parent = canvas.parentElement;
    parent.addEventListener("mousemove", onMouseMove);
    parent.addEventListener("mouseleave", onMouseLeave);

    const draw = () => {
      if (!W || !H) { animRef.current = requestAnimationFrame(draw); return; }
      ctx.clearRect(0, 0, W, H);
      const mx = mouseRef.current.x, my = mouseRef.current.y;

      // Update positions
      particles.forEach(p => {
        // Gentle mouse repulsion
        const dx = p.x - mx, dy = p.y - my;
        const d = Math.sqrt(dx * dx + dy * dy);
        if (d < MOUSE_DIST && d > 0) {
          const force = (1 - d / MOUSE_DIST) * 0.4;
          p.vx += (dx / d) * force;
          p.vy += (dy / d) * force;
        }

        // Velocity damping
        p.vx *= 0.985;
        p.vy *= 0.985;

        // Drift
        p.x += p.vx * p.speed;
        p.y += p.vy * p.speed;

        // Wrap edges
        if (p.x < -10) p.x = W + 10;
        if (p.x > W + 10) p.x = -10;
        if (p.y < -10) p.y = H + 10;
        if (p.y > H + 10) p.y = -10;
      });

      // Draw connections
      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
          const a = particles[i], b = particles[j];
          const dx = b.x - a.x, dy = b.y - a.y;
          const d = Math.sqrt(dx * dx + dy * dy);
          if (d < CONNECT_DIST) {
            const alpha = (1 - d / CONNECT_DIST) * 0.22;
            ctx.beginPath();
            ctx.moveTo(a.x, a.y);
            ctx.lineTo(b.x, b.y);
            ctx.strokeStyle = `rgba(217,168,60,${alpha})`;
            ctx.lineWidth = 0.8;
            ctx.stroke();
          }
        }
      }

      // Draw particles
      particles.forEach(p => {
        // Mouse proximity brightens particle
        const dx = p.x - mx, dy = p.y - my;
        const d = Math.sqrt(dx * dx + dy * dy);
        const boost = d < MOUSE_DIST ? (1 - d / MOUSE_DIST) * 0.55 : 0;
        const alpha = Math.min(1, p.opacity + boost);

        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r + boost * 1.8, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(217,168,60,${alpha})`;
        ctx.fill();
      });

      animRef.current = requestAnimationFrame(draw);
    };

    draw();
    return () => {
      cancelAnimationFrame(animRef.current);
      resizeObs.disconnect();
      parent.removeEventListener("mousemove", onMouseMove);
      parent.removeEventListener("mouseleave", onMouseLeave);
    };
  }, []);

  return (
    <canvas
      ref={canvasRef}
      style={{
        position: "absolute", inset: 0, width: "100%", height: "100%",
        pointerEvents: "none", display: "block", zIndex: 0,
      }}
    />
  );
}

function VoiceNav({ mode, setMode, refinementCount }) {
  const [open, setOpen] = useState(false);
  const ref = React.useRef(null);
  const active = VOICE_MODES.some(m => m.key === mode) || mode === "home";
  const untrained = (refinementCount || 0) === 0;

  React.useEffect(() => {
    if (!open) return;
    const handler = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener("mousedown", handler);
    return () => document.removeEventListener("mousedown", handler);
  }, [open]);

  const handleSelect = (m) => {
    if (untrained && m.needsVoice) {
      setOpen(false);
      setMode("teach");
      toast("Teach the voice something first — then this unlocks.");
      return;
    }
    setMode(m.key);
    setOpen(false);
  };

  return (
    <div className="tools-menu-wrap" ref={ref} style={{ position: "relative" }}>
      <button
        className={`topbar-btn ${active ? "active" : ""}`}
        onClick={() => setOpen(o => !o)}
        style={{ letterSpacing: "0.04em" }}
      >
        Voice {open ? "▲" : "▾"}
      </button>
      {open && (
        <div className="tools-dropdown" style={{ minWidth: 180 }}>
          {VOICE_MODES.map(m => {
            const locked = untrained && m.needsVoice;
            return (
              <button
                key={m.key}
                className={`tools-dropdown-item ${mode === m.key ? "active" : ""}`}
                onClick={() => handleSelect(m)}
                style={{ display: "flex", flexDirection: "column", alignItems: "flex-start", gap: 1, opacity: locked ? 0.4 : 1 }}
              >
                <span style={{ display: "flex", alignItems: "center", gap: 6 }}>

                    <span style={{ fontSize: 9, color: "var(--accent)", letterSpacing: "0.12em", textTransform: "uppercase" }}>Start here</span>
                  )}

                </span>
                <span style={{ fontSize: 10, opacity: 0.5, fontWeight: 400 }}>{m.desc}</span>

            );
          })}
        </div>
      )}

  );

  const [mobileSidebarOpen, setMobileSidebarOpen] = useState(false);
  const [showCreate, setShowCreate] = useState(false);
  const [showFind, setShowFind] = useState(false);
  const [showAuth, setShowAuth] = useState(false);
  const [showOnboarding, setShowOnboarding] = useState(() => !localStorage.getItem("lumafox_onboarded"));
  const [pendingDesc, setPendingDesc] = useState("");
  const [confirmDelete, setConfirmDelete] = useState(false);
  const [loaded, setLoaded] = useState(false);

  const isGuest = user?.user_id?.startsWith("guest-");

  // Open auth modal immediately if landing page sent ?signin=1
  useEffect(() => {
    if (new URLSearchParams(window.location.search).get("signin") === "1") {
      setShowAuth(true);
      window.history.replaceState({}, "", "/app");
    }
  }, []);

  // Jump straight to Council if landing page sent ?council=1
  useEffect(() => {
    if (new URLSearchParams(window.location.search).get("council") === "1") {
      setShowCouncil(true);
      window.history.replaceState({}, "", "/app");
    }
  }, []);

  // On every page load: silently refresh a real user's token to keep them logged in.
  // If the token is missing or expired, fall back to a guest session instead.
  useEffect(() => {
    const existing = getToken();
    const storedUser = getUser();
    const isRealUser = storedUser && !storedUser.user_id?.startsWith("guest-");

    if (existing && isRealUser) {
      // Silently refresh — extends expiry window so the session stays alive
      fetch(`${API}/auth/refresh`, {
        method: "POST",
        headers: { "Authorization": `Bearer ${existing}`, "Content-Type": "application/json" },
      })
        .then(r => r.ok ? r.json() : Promise.reject(r.status))
        .then(data => {
          setToken(data.token);
          setUser(data.user);
          setUserState(data.user);
        })
        .catch(() => {
          // Token expired or invalid — clear and create a guest session
          clearToken(); clearUser();
          fetch(`${API}/auth/guest`, { method: "POST", headers: { "Content-Type": "application/json" } })
            .then(r => r.json())
            .then(data => { setToken(data.token); setUser(data.user); setUserState(data.user); })
            .catch(console.error);
        });
    } else if (!existing) {
      // No token at all — create guest session
      fetch(`${API}/auth/guest`, { method: "POST", headers: { "Content-Type": "application/json" } })
        .then(r => r.json())
        .then(data => { setToken(data.token); setUser(data.user); setUserState(data.user); })
        .catch(console.error);
    }
    // If existing token is a guest session, leave it as-is
  }, []);

  const loadProfiles = useCallback(async () => {
    try {
      const list = await api("/profiles");
      setProfiles(list);
      setActiveProfile(prev => prev || list[0] || null);
    } catch (e) { console.error("Failed to load profiles:", e); }
    setLoaded(true);
  }, []);

  useEffect(() => { if (user) loadProfiles(); }, [user, loadProfiles]);

  const handleAuth = async (u) => {
    setUserState(u);
    setShowAuth(false);
    await loadProfiles();
  };

  const handleLogout = () => {
    clearToken(); clearUser();
    // Create a new guest session immediately after logout
    fetch(`${API}/auth/guest`, { method: "POST", headers: { "Content-Type": "application/json" } })
      .then(r => r.json())
      .then(data => { setToken(data.token); setUser(data.user); setUserState(data.user); setProfiles([]); setActiveProfile(null); setLoaded(false); })
      .catch(() => { setUserState(null); setProfiles([]); setActiveProfile(null); });
  };

  const handleCreate = (profile) => {
    setProfiles(prev => [profile, ...prev]);
    setActiveProfile(profile);
    setShowCreate(false);
    setMode("home");
  };

  const handleRefinementSaved = (count) => {
    setActiveProfile(prev => prev ? { ...prev, refinement_count: count } : prev);

      p.profile_id === activeProfile?.profile_id ? { ...p, refinement_count: count } : p

  const handleFindResult = (description) => {
    setShowFind(false);
    setPendingDesc(description);
    setShowCreate(true);
  };

              </div>
              <div style={{ display: mode === "upload" ? "contents" : "none", position: "relative", zIndex: 1 }}>
                <UploadView profileId={activeProfile.profile_id} />
              </div>
              <div style={{ display: mode === "export" ? "contents" : "none", position: "relative", zIndex: 1 }}>
                <ExportView profileId={activeProfile.profile_id} />
              </div>
            </>
          ) : (
            <WelcomeScreen onCreate={() => setShowCreate(true)} onFind={() => setShowFind(true)} />
          )}
        </div>
      </div>

      {/* Modals */}
      {showOnboarding && (
        <OnboardingTour onDone={(dest) => {
          localStorage.setItem("lumafox_onboarded", "1");
          setShowOnboarding(false);
          if (dest === "council") setShowCouncil(true);
        }} />
      )}
      {showCreate && (
        <CreateProfileModal
          onClose={() => { setShowCreate(false); setPendingDesc(""); }}
          onCreate={handleCreate}
          prefillDesc={pendingDesc}
        />
      )}
      {showFind && <FindVoiceModal onClose={() => setShowFind(false)} onResult={handleFindResult} />}
      {showAuth && (
        <AuthModal
          onClose={() => setShowAuth(false)}
          onAuth={handleAuth}
          guestId={isGuest ? user.user_id : null}
        />
      )}
      {confirmDelete && activeProfile && (
        <ConfirmModal
          title={`Delete "${activeProfile.name}"?`}
          body="This will permanently delete the voice profile and all its refinements. This cannot be undone."
          confirmLabel="Delete Profile"
          onConfirm={confirmDeleteProfile}
          onCancel={() => setConfirmDelete(false)}
        />
      )}
      <ToastStack />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
