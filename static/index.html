<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lumafox</title>
  <link rel="icon" type="image/x-icon" href="/static/favicon.ico" />
  <link rel="apple-touch-icon" href="/static/lumafox-icon.png" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://lumafox.ai/" />
  <meta property="og:title" content="Lumafox — Voice your writing. Council your decisions." />
  <meta property="og:description" content="Build a precise model of how you write at your best. Summon history's sharpest minds on any decision." />
  <meta property="og:image" content="https://lumafox.ai/static/lumafox-icon.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="https://lumafox.ai/static/lumafox-icon.png" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --bg-surface: #141414;
      --bg-elevated: #1c1c1c;
      --bg-hover: #242424;
      --border: #2a2a2a;
      --border-light: #333;
      --text: #e8e8e8;
      --text-dim: #888;
      --text-faint: #555;
      --accent: #d9a83c;
      --accent-dim: #a07828;
      --accent-glow: rgba(217, 168, 60, 0.14);
      --red: #b35050;
      --green: #5a8a5a;
      --radius: 8px;
      --radius-lg: 12px;
      --font: 'Georgia', 'Times New Roman', serif;
      --font-mono: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ── Layout ── */
    .app { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 32px; height: 56px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-surface);
      position: relative;
    }
    .topbar-logo {
      font-size: 18px; letter-spacing: 0.15em; text-transform: uppercase;
      color: var(--accent); font-weight: 400;
    }
    .topbar-nav { display: flex; gap: 8px; }
    .topbar-btn {
      background: none; border: 1px solid var(--border); color: var(--text-dim);
      padding: 6px 16px; border-radius: var(--radius); cursor: pointer;
      font-family: var(--font-sans); font-size: 13px; transition: all 0.15s;
    }
    .topbar-btn:hover { border-color: var(--accent-dim); color: var(--text); }
    .topbar-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-glow); }

    /* ── Segmented mode toggle ── */
    .mode-toggle {
      position: absolute; left: 50%; transform: translateX(-50%);
      display: flex; background: var(--bg-hover); border: 1px solid var(--border);
      border-radius: 8px; padding: 3px; gap: 2px;
    }
    .mode-toggle-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 20px; border-radius: 6px; border: none; background: none;
      color: var(--text-dim); font-size: 13px; font-weight: 500;
      letter-spacing: 0.04em; cursor: pointer; transition: all 0.18s;
      font-family: var(--font-sans); white-space: nowrap;
    }
    .mode-toggle-btn:hover { color: var(--text); }
    .mode-toggle-btn.active {
      background: var(--accent-glow); color: var(--accent);
      box-shadow: inset 0 0 0 1px var(--accent-dim);
    }

    /* ── Council orb teaser ── */
    .council-orb {
      position: absolute; bottom: calc(100% + 8px); right: 0;
      display: flex; align-items: center; gap: 8px;
      background: rgba(200,164,110,0.12); border: 1px solid var(--accent-dim);
      border-radius: 20px; padding: 6px 14px; cursor: pointer;
      font-size: 12px; color: var(--accent); font-family: var(--font-sans);
      white-space: nowrap; animation: orbIn 0.25s ease;
      z-index: 10;
    }
    @keyframes orbIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    .council-orb:hover { background: rgba(200,164,110,0.2); }

    /* ── Onboarding tour ── */
    .onboarding-overlay {
      position: fixed; inset: 0; z-index: 1000;
      background: rgba(8,7,5,0.88); display: flex; align-items: center; justify-content: center;
      animation: fadeIn 0.4s ease;
    }
    .onboarding-card {
      background: var(--bg-surface); border: 1px solid var(--border);
      border-radius: 16px; max-width: 680px; width: 90%; padding: 40px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.7);
    }
    .onboarding-split { display: flex; gap: 24px; margin: 28px 0; }
    .onboarding-half {
      flex: 1; padding: 20px; border-radius: 10px; border: 1px solid var(--border);
      transition: border-color 0.2s;
    }
    .onboarding-half:hover { border-color: var(--accent-dim); }
    .onboarding-half-icon { font-size: 24px; margin-bottom: 10px; }
    .onboarding-half-title { font-size: 15px; font-weight: 600; color: var(--accent); margin-bottom: 6px; }
    .onboarding-half-desc { font-size: 12px; color: var(--text-dim); line-height: 1.6; }

    .main { flex: 1; display: flex; overflow: hidden; }

    /* ── Sidebar ── */
    .sidebar {
      width: 280px; border-right: 1px solid var(--border);
      background: var(--bg-surface); display: flex; flex-direction: column;
      flex-shrink: 0;
    }
    .sidebar-header {
      padding: 20px; border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
    }
    .sidebar-title { font-size: 13px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.1em; font-family: var(--font-sans); }

    /* ── Sidebar product tabs ── */
    .sidebar-product-tabs {
      display: flex; border-bottom: 1px solid var(--border); padding: 0 8px; gap: 4px;
    }
    .sidebar-product-tab {
      flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px;
      padding: 12px 4px; background: none; border: none;
      border-bottom: 2px solid transparent; color: var(--text-dim);
      font-size: 11px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase;
      cursor: pointer; transition: color 0.2s, border-color 0.2s; margin-bottom: -1px;
      font-family: var(--font-sans);
    }
    .sidebar-product-tab:hover { color: var(--text); }
    .sidebar-product-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* ── Council graph tooltip ── */
    .council-graph-wrap { position: relative; display: inline-block; }
    .council-node-tooltip {
      position: absolute; background: rgba(16,14,10,0.97); border: 1px solid var(--accent-dim);
      border-radius: 8px; padding: 10px 14px; pointer-events: none; z-index: 20;
      min-width: 190px; max-width: 250px; box-shadow: 0 4px 24px rgba(0,0,0,0.6);
      backdrop-filter: blur(8px);
    }
    .council-node-tooltip-name { font-size: 13px; font-weight: 600; color: var(--accent); margin-bottom: 2px; }
    .council-node-tooltip-meta { font-size: 10px; color: var(--text-dim); margin-bottom: 6px; letter-spacing: 0.05em; text-transform: uppercase; font-family: var(--font-sans); }
    .council-node-tooltip-quote { font-size: 11px; color: var(--text); line-height: 1.55; font-style: italic; opacity: 0.85; }

    /* ── Swarm legend ── */
    .swarm-legend {
      display: flex; flex-wrap: wrap; gap: 8px 16px; justify-content: center;
      margin: 12px auto 0; max-width: 420px;
    }
    .swarm-legend-item {
      display: flex; align-items: center; gap: 5px;
      font-family: var(--font-sans); font-size: 9px;
      color: var(--text-faint); letter-spacing: 0.06em; text-transform: uppercase;
    }
    .swarm-legend-dot { width: 7px; height: 7px; border-radius: 50%; }

    /* ── Voice wave background overlay ── */
    .voice-wave-bg { pointer-events: none; position: absolute; inset: 0; overflow: hidden; z-index: 0; opacity: 0.5; }
    .sidebar-list { flex: 1; overflow-y: auto; padding: 8px; }

    .profile-card {
      padding: 14px 16px; border-radius: var(--radius); cursor: pointer;
      transition: all 0.15s; margin-bottom: 4px;
    }
    .profile-card:hover { background: var(--bg-hover); }
    .profile-card:hover .rename-btn { opacity: 1 !important; }
    .profile-card.active { background: var(--accent-glow); border-left: 2px solid var(--accent); }
    .profile-card.active .rename-btn { color: var(--accent) !important; }
    .profile-card-name { font-size: 15px; color: var(--text); margin-bottom: 4px; }
    .profile-card-meta { font-size: 12px; color: var(--text-dim); font-family: var(--font-sans); }

    .new-profile-btn {
      margin: 12px; padding: 10px; border: 1px dashed var(--border-light);
      border-radius: var(--radius); background: none; color: var(--text-dim);
      cursor: pointer; font-family: var(--font-sans); font-size: 13px;
      text-align: center; transition: all 0.15s;
    }
    .new-profile-btn:hover { border-color: var(--accent-dim); color: var(--accent); }

    /* ── Content Area ── */
    .content { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }

    /* ── Chat / Teach ── */
    .chat-container { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }

    /* ── Tools nav dropdown ── */
    .topbar-nav { display: flex; align-items: center; gap: 4px; }
    .tools-menu-wrap { position: relative; }
    .tools-dropdown {
      position: absolute; top: calc(100% + 6px); left: 0;
      background: var(--bg-elevated); border: 1px solid var(--border);
      border-radius: var(--radius); min-width: 120px; z-index: 200;
      overflow: hidden; box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }
    .tools-dropdown-item {
      display: block; width: 100%; text-align: left;
      background: none; border: none; padding: 10px 16px;
      font-family: var(--font-sans); font-size: 13px;
      color: var(--text-dim); cursor: pointer; transition: all 0.12s;
    }
    .tools-dropdown-item:hover { background: var(--bg-surface); color: var(--text); }
    .tools-dropdown-item.active { color: var(--accent); }

    /* ── Chat empty state ── */
    .chat-empty {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -60%);
      text-align: center; pointer-events: none; user-select: none;
    }
    .chat-empty-title {
      font-size: 22px; color: var(--text-faint); font-family: var(--font);
      margin-bottom: 12px; opacity: 0.7;
    }
    .chat-empty-hint {
      font-size: 13px; color: var(--text-faint); font-family: var(--font-sans);
      line-height: 1.7; opacity: 0.5; max-width: 340px;
    }

    /* ── Advanced toggle + footer ── */
    .chat-input-footer {
      display: flex; justify-content: flex-end; margin-top: 6px;
    }
    .chat-advanced-toggle {
      background: none; border: none; cursor: pointer;
      font-size: 11px; font-family: var(--font-sans);
      color: var(--text-faint); padding: 0; letter-spacing: 0.03em;
      transition: color 0.15s;
    }
    .chat-advanced-toggle:hover { color: var(--accent); }

    /* ── Chat topbar (history / new) ── */
    .chat-topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 4px 20px; border-bottom: 1px solid var(--border);
      background: var(--bg-surface);
    }
    .chat-history-btn, .chat-new-btn {
      background: none; border: none; cursor: pointer;
      font-size: 12px; font-family: var(--font-sans);
      color: var(--text-faint); padding: 6px 0; transition: color 0.15s;
    }
    .chat-history-btn:hover, .chat-new-btn:hover { color: var(--accent); }
    .chat-new-btn { color: var(--text-dim); }

    /* ── Save-as-refinement inline button ── */
    .msg-save-btn {
      display: inline-block; margin-top: 8px;
      background: none; border: 1px solid var(--border);
      color: var(--text-faint); font-size: 11px; font-family: var(--font-sans);
      padding: 3px 10px; border-radius: 10px; cursor: pointer;
      transition: all 0.15s; letter-spacing: 0.03em;
    }
    .msg-save-btn:hover { border-color: var(--accent-dim); color: var(--accent); }

    /* ── Save-as-refinement picker modal ── */
    .refine-picker-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.55);
      display: flex; align-items: center; justify-content: center; z-index: 300;
    }
    .refine-picker {
      background: var(--bg-elevated); border: 1px solid var(--border);
      border-radius: 12px; padding: 28px; width: 480px; max-width: 90vw;
    }
    .refine-picker-title {
      font-size: 13px; font-family: var(--font-sans); font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-faint);
      margin-bottom: 16px;
    }
    .refine-picker-textarea {
      width: 100%; box-sizing: border-box;
      background: var(--bg-surface); border: 1px solid var(--border);
      color: var(--text); padding: 12px 14px; border-radius: var(--radius);
      font-family: var(--font); font-size: 14px; line-height: 1.6;
      resize: vertical; outline: none; margin-bottom: 16px;
    }
    .refine-picker-textarea:focus { border-color: var(--accent-dim); }
    .refine-picker-types { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
    .refine-type-btn {
      display: flex; align-items: baseline; gap: 10px;
      background: var(--bg-surface); border: 1px solid var(--border);
      padding: 10px 14px; border-radius: var(--radius); cursor: pointer;
      text-align: left; transition: all 0.15s;
    }
    .refine-type-btn:hover { border-color: var(--accent-dim); background: var(--accent-glow); }
    .refine-type-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .refine-type-label { font-size: 13px; font-weight: 600; color: var(--text); font-family: var(--font-sans); min-width: 90px; }
    .refine-type-desc { font-size: 12px; color: var(--text-faint); font-family: var(--font-sans); }
    .refine-picker-cancel {
      background: none; border: none; cursor: pointer;
      font-size: 12px; font-family: var(--font-sans); color: var(--text-faint);
    }
    .refine-picker-cancel:hover { color: var(--text-dim); }

    /* ── Past conversations panel ── */
    .past-conv-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.55);
      display: flex; align-items: flex-start; justify-content: flex-end; z-index: 300;
    }
    .past-conv-panel {
      background: var(--bg-elevated); border-left: 1px solid var(--border);
      width: 360px; max-width: 90vw; height: 100vh;
      display: flex; flex-direction: column; overflow: hidden;
    }
    .past-conv-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 20px 16px; border-bottom: 1px solid var(--border);
      font-size: 13px; font-family: var(--font-sans); font-weight: 600;
      color: var(--text); text-transform: uppercase; letter-spacing: 0.07em;
    }
    .past-conv-close {
      background: none; border: none; cursor: pointer;
      color: var(--text-faint); font-size: 14px; padding: 2px 6px;
    }
    .past-conv-close:hover { color: var(--text); }
    .past-conv-list { flex: 1; overflow-y: auto; padding: 8px 0; }
    .past-conv-empty {
      padding: 24px 20px; font-size: 13px; color: var(--text-faint);
      font-family: var(--font-sans); line-height: 1.6;
    }
    .past-conv-item {
      display: block; width: 100%; text-align: left;
      background: none; border: none; border-bottom: 1px solid var(--border);
      padding: 14px 20px; cursor: pointer; transition: background 0.12s;
    }
    .past-conv-item:hover { background: var(--bg-surface); }
    .past-conv-item-title {
      font-size: 14px; color: var(--text); margin-bottom: 4px;
      font-family: var(--font); line-height: 1.4;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .past-conv-item-meta {
      font-size: 11px; color: var(--text-faint); font-family: var(--font-sans);
    }
    .chat-messages { flex: 1; overflow-y: auto; padding: 24px 32px; position: relative; z-index: 1; }

    .msg { margin-bottom: 2rem; max-width: 720px; }
    .msg.user .msg-content { color: #FFFFFF; font-weight: 400; }
    .msg.agent .msg-content {
      color: #E8E0D0; font-weight: 300;
      padding: 20px 24px; border-radius: 0 8px 8px 0;
      background: rgba(212,175,55,0.03);
      border-left: 2px solid rgba(212,175,55,0.3);
    }
    .msg-label {
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.14em;
      margin-bottom: 8px; font-family: var(--font-sans); font-weight: 600;
      display: flex; align-items: center; gap: 8px;
    }
    .msg.user .msg-label { color: var(--accent); }
    .msg.agent .msg-label { color: var(--text-dim); }
    .msg-avatar {
      width: 22px; height: 22px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 700; flex-shrink: 0;
    }
    .msg.user .msg-avatar {
      background: var(--accent-glow); color: var(--accent); border: 1px solid var(--accent-dim);
    }
    .msg.agent .msg-avatar {
      background: rgba(200,164,110,0.08); border: 1px solid rgba(200,164,110,0.15);
      padding: 3px;
    }
    .msg-avatar img { width: 100%; height: 100%; object-fit: contain; }
    .msg-content {
      font-size: 16px; line-height: 1.8; white-space: pre-wrap;
    }
    .msg-badge {
      display: inline-block; margin-top: 8px; padding: 2px 10px;
      border-radius: 12px; font-size: 11px; font-family: var(--font-sans);
      background: var(--accent-glow); color: var(--accent); border: 1px solid var(--accent-dim);
    }

    .chat-input-area {
      border-top: 1px solid var(--border); padding: 16px 32px;
      background: var(--bg-surface); position: relative; z-index: 1;
    }
    .chat-commands {
      display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap;
    }
    .cmd-btn {
      background: var(--bg-elevated); border: 1px solid var(--border);
      color: var(--text-dim); padding: 4px 12px; border-radius: 14px;
      font-size: 12px; cursor: pointer; font-family: var(--font-mono);
      transition: all 0.15s;
    }
    .cmd-btn:hover { border-color: var(--accent-dim); color: var(--text); }
    .cmd-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-glow); }

    .chat-input-row { display: flex; gap: 12px; align-items: flex-end; }
    .chat-textarea {
      flex: 1; background: var(--bg-elevated); border: 1px solid var(--border);
      color: var(--text); padding: 12px 16px; border-radius: var(--radius);
      font-family: var(--font); font-size: 15px; line-height: 1.5;
      resize: none; min-height: 48px; max-height: 200px;
      outline: none; transition: border-color 0.15s;
    }
    .chat-textarea:focus { border-color: var(--accent-dim); }
    .chat-textarea::placeholder { color: var(--text-faint); }

    .send-btn {
      background: var(--accent); border: none; color: var(--bg);
      padding: 12px 20px; border-radius: var(--radius); cursor: pointer;
      font-family: var(--font-sans); font-size: 14px; font-weight: 600;
      white-space: nowrap; transition: all 0.2s ease;
    }
    .send-btn:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 3px 12px rgba(217,168,60,0.25); }
    .send-btn:active { transform: translateY(0); box-shadow: none; }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }

    /* ── Write Mode ── */
    .write-container { flex: 1; display: flex; flex-direction: column; padding: 32px; overflow-y: auto; }
    .write-section { max-width: 720px; width: 100%; margin: 0 auto; }
    .write-label {
      font-size: 12px; color: var(--text-dim); text-transform: uppercase;
      letter-spacing: 0.1em; margin-bottom: 8px; font-family: var(--font-sans);
    }
    .write-textarea {
      width: 100%; background: var(--bg-elevated); border: 1px solid var(--border);
      color: var(--text); padding: 16px; border-radius: var(--radius);
      font-family: var(--font); font-size: 15px; line-height: 1.7;
      resize: vertical; outline: none; transition: border-color 0.15s;
    }
    .write-textarea:focus { border-color: var(--accent-dim); }
    .write-textarea::placeholder { color: var(--text-faint); }

    .write-output {
      margin-top: 24px; padding: 24px; background: var(--bg-elevated);
      border: 1px solid var(--border); border-radius: var(--radius-lg);
      font-size: 16px; line-height: 1.8; white-space: pre-wrap;
      min-height: 120px; color: var(--text);
    }

    .action-btn {
      margin-top: 16px; padding: 10px 24px; background: var(--accent);
      border: none; color: var(--bg); border-radius: var(--radius);
      cursor: pointer; font-family: var(--font-sans); font-size: 14px;
      font-weight: 600; transition: all 0.2s ease;
      position: relative; overflow: hidden;
    }
    .action-btn:hover {
      opacity: 0.9; transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(217,168,60,0.25);
    }
    .action-btn:active { transform: translateY(0); box-shadow: none; }
    .action-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }
    .action-btn.secondary {
      background: none; border: 1px solid var(--border); color: var(--text-dim);
    }
    .action-btn.secondary:hover {
      border-color: var(--accent-dim); color: var(--text);
      box-shadow: 0 2px 8px rgba(217,168,60,0.08); transform: translateY(-1px);
    }

    /* ── CTA attention pulse — draws eye after inactivity ── */
    @keyframes ctaPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(217,168,60,0); }
      50% { box-shadow: 0 0 0 8px rgba(217,168,60,0.12); }
    }
    .cta-pulse { animation: ctaPulse 2.5s ease-in-out infinite; }
    .cta-pulse:hover { animation: none; }

    /* ── Checkmark pop for onboarding steps ── */
    @keyframes checkPop {
      0% { transform: scale(0) rotate(-20deg); opacity: 0; }
      60% { transform: scale(1.3) rotate(5deg); opacity: 1; }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }

    /* ── Empty States ── */
    .empty-state {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      justify-content: center; color: var(--text-faint); text-align: center;
      padding: 40px; position: relative; overflow: hidden;
    }
    .empty-state-inner { position: relative; z-index: 1; }
    .empty-hero {
      font-size: clamp(28px, 5vw, 52px); font-family: var(--font);
      color: var(--text); line-height: 1.15; margin-bottom: 18px;
      letter-spacing: -0.5px;
    }
    .empty-hero em { color: var(--accent); font-style: normal; }
    .empty-typewriter {
      font-size: clamp(14px, 2vw, 18px); color: var(--accent);
      font-family: var(--font); min-height: 28px; margin-bottom: 14px;
      letter-spacing: 0.01em; opacity: 0.85;
    }
    .empty-typewriter-cursor {
      display: inline-block; width: 2px; height: 1em;
      background: var(--accent); margin-left: 2px;
      vertical-align: text-bottom; animation: blink 0.9s step-end infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }
    .empty-sub { font-size: 14px; max-width: 420px; line-height: 1.7; color: var(--text-dim); margin-bottom: 32px; }
    .empty-cta-row { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .empty-cta-primary {
      padding: 14px 32px; background: var(--accent); color: #1a1610;
      border: none; border-radius: var(--radius); font-family: var(--font);
      font-size: 15px; cursor: pointer; font-weight: 600;
      transition: background 0.15s, transform 0.12s;
    }
    .empty-cta-primary:hover { background: #e8bc4a; transform: translateY(-1px); }
    .empty-cta-secondary {
      padding: 14px 28px; background: transparent; color: var(--text-dim);
      border: 1px solid var(--border); border-radius: var(--radius);
      font-family: var(--font); font-size: 14px; cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .empty-cta-secondary:hover { border-color: var(--accent-dim); color: var(--accent); }
    .empty-proof {
      margin-top: 48px; display: flex; gap: 32px; justify-content: center;
      flex-wrap: wrap;
    }
    .empty-proof-item { text-align: center; }
    .empty-proof-num {
      font-size: 22px; color: var(--accent); font-family: var(--font); margin-bottom: 4px;
    }
    .empty-proof-label { font-size: 11px; color: var(--text-faint); font-family: var(--font-sans); text-transform: uppercase; letter-spacing: 0.1em; }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.7);
      display: flex; align-items: center; justify-content: center; z-index: 100;
    }
    .modal {
      background: var(--bg-surface); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 32px; width: 480px; max-width: 90vw;
    }
    .modal-title { font-size: 18px; margin-bottom: 20px; color: var(--text); }
    .modal-input {
      width: 100%; background: var(--bg-elevated); border: 1px solid var(--border);
      color: var(--text); padding: 10px 14px; border-radius: var(--radius);
      font-family: var(--font); font-size: 15px; outline: none; margin-bottom: 12px;
    }
    .modal-input:focus { border-color: var(--accent-dim); }
    .modal-input::placeholder { color: var(--text-faint); }
    .modal-actions { display: flex; gap: 12px; justify-content: flex-end; margin-top: 20px; }

    /* ── Profile Header ── */
    .profile-header {
      padding: 16px 32px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      background: var(--bg-surface);
    }
    .profile-header-name { font-size: 16px; color: var(--text); }
    .profile-header-meta { font-size: 12px; color: var(--text-dim); font-family: var(--font-sans); margin-left: 12px; }
    .profile-header-actions { display: flex; gap: 8px; }
    .header-action {
      background: none; border: 1px solid var(--border); color: var(--text-dim);
      padding: 4px 12px; border-radius: var(--radius); cursor: pointer;
      font-family: var(--font-sans); font-size: 12px; transition: all 0.15s;
    }
    .header-action:hover { border-color: var(--accent-dim); color: var(--text); }
    .header-action.danger:hover { border-color: var(--red); color: var(--red); }

    /* ── Export View ── */
    .export-view {
      flex: 1; padding: 32px; overflow-y: auto;
    }
    .export-content {
      max-width: 720px; margin: 0 auto; background: var(--bg-elevated);
      border: 1px solid var(--border); border-radius: var(--radius-lg);
      padding: 32px; font-size: 14px; line-height: 1.7;
      font-family: var(--font-mono); white-space: pre-wrap; color: var(--text-dim);
    }

    /* ── Loading ── */
    .loading-dot { display: inline-block; animation: pulse 1.4s infinite; }
    .loading-dot:nth-child(2) { animation-delay: 0.2s; }
    .loading-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse { 0%, 80%, 100% { opacity: 0.3; } 40% { opacity: 1; } }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--border-light); }

    /* ── Find Voice ── */
    .find-voice { flex: 1; padding: 32px; overflow-y: auto; }
    .find-voice-inner { max-width: 720px; margin: 0 auto; }
    .sample-entry { margin-bottom: 16px; }
    .sample-label { font-size: 12px; color: var(--text-dim); font-family: var(--font-sans); margin-bottom: 4px; }
    .remove-sample {
      background: none; border: none; color: var(--text-faint); cursor: pointer;
      font-size: 12px; margin-left: 8px; font-family: var(--font-sans);
    }
    .remove-sample:hover { color: var(--red); }

    /* ── Auth ── */
    .auth-page {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: var(--bg);
    }
    .auth-card {
      width: 400px; max-width: 90vw; padding: 40px;
      background: var(--bg-surface); border: 1px solid var(--border);
      border-radius: var(--radius-lg);
    }
    .auth-logo {
      font-size: 24px; letter-spacing: 0.15em; text-transform: uppercase;
      color: var(--accent); text-align: center; margin-bottom: 8px;
    }
    .auth-sub {
      text-align: center; color: var(--text-dim); font-size: 14px;
      margin-bottom: 32px; font-family: var(--font-sans);
    }
    .auth-input {
      width: 100%; background: var(--bg-elevated); border: 1px solid var(--border);
      color: var(--text); padding: 12px 16px; border-radius: var(--radius);
      font-family: var(--font-sans); font-size: 14px; outline: none;
      margin-bottom: 12px; transition: border-color 0.15s;
    }
    .auth-input:focus { border-color: var(--accent-dim); }
    .auth-input::placeholder { color: var(--text-faint); }
    .auth-submit {
      width: 100%; padding: 12px; background: var(--accent); border: none;
      color: var(--bg); border-radius: var(--radius); cursor: pointer;
      font-family: var(--font-sans); font-size: 14px; font-weight: 600;
      margin-top: 8px; transition: opacity 0.15s;
    }
    .auth-submit:hover { opacity: 0.85; }
    .auth-submit:disabled { opacity: 0.4; cursor: not-allowed; }
    .auth-switch {
      text-align: center; margin-top: 20px; font-size: 13px;
      color: var(--text-dim); font-family: var(--font-sans);
    }
    .auth-switch a {
      color: var(--accent); cursor: pointer; text-decoration: none;
    }
    .auth-switch a:hover { text-decoration: underline; }
    .auth-error {
      background: rgba(179, 80, 80, 0.15); border: 1px solid var(--red);
      color: var(--red); padding: 8px 12px; border-radius: var(--radius);
      font-size: 13px; margin-bottom: 12px; font-family: var(--font-sans);
    }
    .user-badge {
      font-size: 12px; color: var(--text-dim); font-family: var(--font-sans);
      display: flex; align-items: center; gap: 12px;
      position: relative;
    }
    .user-menu-trigger {
      display: flex; align-items: center; gap: 8px;
      background: none; border: 1px solid transparent; border-radius: 8px;
      color: var(--text-dim); cursor: pointer; padding: 6px 12px;
      font-family: var(--font-sans); font-size: 13px;
      transition: all 0.15s;
    }
    .user-menu-trigger:hover {
      border-color: var(--border); color: var(--text);
      background: rgba(200,164,110,0.04);
    }
    .user-menu-trigger .user-avatar-sm {
      width: 24px; height: 24px; border-radius: 50%;
      background: var(--accent-glow); border: 1px solid var(--accent-dim);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; flex-shrink: 0;
    }
    .user-menu-trigger .user-avatar-sm img {
      width: 100%; height: 100%; object-fit: contain;
    }
    .user-menu-trigger .chevron {
      font-size: 10px; opacity: 0.5; transition: transform 0.2s;
    }
    .user-menu-trigger.open .chevron { transform: rotate(180deg); }
    .user-dropdown {
      position: absolute; right: 0; top: calc(100% + 6px);
      background: var(--bg-elevated); border: 1px solid var(--border);
      border-radius: 10px; overflow: hidden; min-width: 200px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4); z-index: 200;
    }
    .user-dropdown-header {
      padding: 14px 16px 10px; border-bottom: 1px solid var(--border);
    }
    .user-dropdown-header .name {
      font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 2px;
    }
    .user-dropdown-header .email {
      font-size: 12px; color: var(--text-faint);
    }
    .user-dropdown-item {
      display: flex; align-items: center; gap: 10px; width: 100%;
      background: none; border: none; color: var(--text);
      padding: 10px 16px; cursor: pointer; font-size: 13px;
      font-family: var(--font-sans); text-align: left;
      transition: background 0.1s;
    }
    .user-dropdown-item:hover { background: rgba(200,164,110,0.06); }
    .user-dropdown-item .item-icon { font-size: 14px; opacity: 0.6; width: 18px; text-align: center; }
    .user-dropdown-divider { height: 1px; background: var(--border); margin: 4px 12px; }
    .user-dropdown-item.danger { color: #c55; }
    .user-dropdown-item.danger:hover { background: rgba(220,80,80,0.06); }
    .logout-btn {
      background: none; border: none; color: var(--text-faint); cursor: pointer;
      font-family: var(--font-sans); font-size: 12px; padding: 0;
    }
    .logout-btn:hover { color: var(--text); }

    /* ── Toast ── */
    .toast-stack {
      position: fixed; bottom: 24px; right: 24px; z-index: 1000;
      display: flex; flex-direction: column; gap: 8px; pointer-events: none;
    }
    .toast {
      padding: 12px 18px; border-radius: var(--radius);
      font-family: var(--font-sans); font-size: 13px;
      background: var(--bg-elevated); border: 1px solid var(--border);
      color: var(--text); pointer-events: auto;
      animation: toastIn 0.3s cubic-bezier(0.2, 0.8, 0.3, 1); max-width: 360px; line-height: 1.4;
      transition: padding 0.4s ease, font-weight 0.3s ease;
    }
    .toast.success {
      border-color: var(--green);
      /* Literary emphasis — brief padding expansion creates a "pause of satisfaction" */
      animation: toastIn 0.3s cubic-bezier(0.2, 0.8, 0.3, 1), toastBreathe 0.8s ease 0.1s;
      font-weight: 500;
    }
    .toast.error { border-color: var(--red); color: var(--red); }
    .toast.info { border-color: var(--accent-dim); }
    @keyframes toastIn { from { opacity: 0; transform: translateY(8px) scale(0.97); } to { opacity: 1; transform: translateY(0) scale(1); } }
    @keyframes toastBreathe {
      0% { padding: 12px 18px; }
      40% { padding: 16px 24px; }
      100% { padding: 12px 18px; }
    }

    /* ── Landing-page entry animation ── */
    @keyframes slideInFromBelow {
      from { transform: translateY(100vh); }
      to   { transform: translateY(0); }
    }
    body.slide-in {
      animation: slideInFromBelow 0.55s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    /* ── Confirm modal ── */
    .confirm-title { font-size: 16px; color: var(--text); margin-bottom: 10px; }
    .confirm-body { font-size: 14px; color: var(--text-dim); font-family: var(--font-sans); line-height: 1.5; margin-bottom: 24px; }

    /* ── Command guide ── */
    .cmd-guide {
      margin-bottom: 10px; padding: 12px 16px; background: var(--bg-elevated);
      border: 1px solid var(--border); border-radius: var(--radius);
      font-family: var(--font-sans); font-size: 12px; color: var(--text-dim);
      line-height: 1.6;
    }
    .cmd-guide strong { color: var(--text); }
    .cmd-guide-toggle {
      background: none; border: none; color: var(--text-faint); font-family: var(--font-sans);
      font-size: 11px; cursor: pointer; padding: 0; margin-bottom: 8px;
      text-decoration: underline;
    }
    .cmd-guide-toggle:hover { color: var(--text-dim); }

    /* ── Onboarding steps ── */
    /* ── Home / workflow entry view ── */
    .home-view {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 40px 32px; position: relative; z-index: 1;
    }
    .home-bubble {
      display: flex; align-items: flex-start; gap: 14px; max-width: 560px;
      width: 100%; margin-bottom: 36px;
    }
    .home-bubble-avatar {
      width: 34px; height: 34px; border-radius: 50%;
      background: var(--accent-glow); border: 1px solid var(--accent-dim);
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; flex-shrink: 0; margin-top: 2px;
    }
    .home-bubble-body {}
    .home-bubble-label {
      font-size: 10px; font-family: var(--font-sans); text-transform: uppercase;
      letter-spacing: 0.12em; color: var(--accent); margin-bottom: 8px;
    }
    .home-bubble-text {
      font-family: var(--font); font-size: 1.15rem; color: var(--text);
      line-height: 1.65; max-width: 480px;
    }
    .home-bubble-text em { color: var(--accent); font-style: normal; }
    .home-actions {
      display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
      max-width: 560px; width: 100%;
    }
    .home-action-card {
      background: var(--bg-surface); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 20px 20px 18px;
      cursor: pointer; text-align: left; transition: border-color 0.15s, background 0.15s;
      display: flex; flex-direction: column; gap: 6px;
    }
    .home-action-card:hover {
      border-color: var(--accent-dim); background: var(--accent-glow);
    }
    .home-action-icon { font-size: 20px; margin-bottom: 2px; }
    .home-action-title {
      font-family: var(--font); font-size: 15px; color: var(--text);
    }
    .home-action-desc {
      font-family: var(--font-sans); font-size: 12px; color: var(--text-dim);
      line-height: 1.5;
    }
    .home-action-card.primary { border-color: var(--accent-dim); }
    .home-action-card.primary .home-action-title { color: var(--accent); }
    @media (max-width: 640px) {
      .home-actions { grid-template-columns: 1fr; }
      .home-view { padding: 24px 16px; justify-content: flex-start; padding-top: 48px; }
    }

    /* ── Mobile sidebar toggle (hidden on desktop) ── */
    .mobile-voices-btn { display: none; }

    /* ── Mobile layout ── */
    @media (max-width: 640px) {
      /* ── Topbar ── */
      .topbar {
        padding: 8px 12px; gap: 6px; height: 48px;
        /* Allow topbar content to overflow gracefully */
      }
      /* Hide logo text, keep icon */
      .topbar-logo span { display: none; }
      .topbar-logo img { height: 28px !important; }

      /* Short/long save button text */
      .save-full { display: none; }
      .save-short { display: inline; }

      /* Hide "Guest" label — the Save button makes it obvious */
      .topbar-guest-label { display: none; }

      /* Shorten "Save your work →" to just "Save →" on mobile */
      .topbar .topbar-btn { font-size: 11px; padding: 5px 10px; }

      /* Mode nav tabs: compact, scroll horizontally */
      .topbar-nav {
        overflow-x: auto; scrollbar-width: none;
        -webkit-overflow-scrolling: touch;
        max-width: 50vw; gap: 2px;
      }
      .topbar-nav::-webkit-scrollbar { display: none; }
      .topbar-nav .topbar-btn { font-size: 11px; padding: 5px 10px; white-space: nowrap; }

      /* Show the mobile voices toggle */
      .mobile-voices-btn {
        display: flex; align-items: center; gap: 6px;
        background: none; border: 1px solid var(--border);
        color: var(--text-dim); padding: 5px 10px;
        border-radius: var(--radius); cursor: pointer;
        font-family: var(--font-sans); font-size: 12px;
        transition: all 0.15s; flex-shrink: 0;
      }
      .mobile-voices-btn.open {
        border-color: var(--accent-dim); color: var(--accent);
      }

      /* ── Sidebar: fixed overlay ── */
      .sidebar {
        position: fixed;
        top: 0; left: 0; bottom: 0;
        width: 280px; max-width: 85vw;
        z-index: 200;
        transform: translateX(-100%);
        transition: transform 0.25s ease;
        box-shadow: none;
      }
      .sidebar.mobile-open {
        transform: translateX(0);
        box-shadow: 4px 0 32px rgba(0,0,0,0.6);
      }

      /* Backdrop behind open sidebar */
      .sidebar-backdrop {
        display: none;
        position: fixed; inset: 0; z-index: 199;
        background: rgba(0,0,0,0.55);
      }
      .sidebar-backdrop.visible { display: block; }

      /* ── Content: constrain height and scroll on mobile ── */
      .content {
        width: 100%;
        overflow-y: auto !important;
        overflow-x: hidden;
        -webkit-overflow-scrolling: touch;
        /* Fill remaining height below topbar */
        height: calc(100vh - 48px);
        max-height: calc(100vh - 48px);
      }

      /* ── Main container: keep overflow hidden on its axis ── */
      .main { overflow: hidden; }

      /* ── Write / Council / Translate containers ── */
      .write-container {
        padding: 16px;
        padding-bottom: calc(24px + env(safe-area-inset-bottom, 0px));
        overflow-y: visible; /* let .content handle scrolling */
        flex: none; /* don't stretch, just take natural height */
        min-height: 0;
      }
      .write-section { max-width: 100% !important; }
      .write-textarea {
        font-size: 16px !important; /* prevent iOS zoom on focus */
        min-height: 80px;
      }
      .write-output {
        font-size: 15px;
        line-height: 1.7;
        word-break: break-word;
      }

      /* ── Council view mobile ── */
      /* Tier cards: stack to 1 column on very small screens */
      .council-tier-grid { grid-template-columns: 1fr !important; gap: 8px !important; }

      /* Council form: let h1 breathe */
      .write-section h1 { font-size: 24px !important; }

      /* ── Chat / Teach ── */
      .chat-messages { padding: 16px; }
      .chat-input-area { padding: 10px 14px; }

      /* ── Profile header ── */
      .profile-header { padding: 10px 14px; flex-wrap: wrap; gap: 6px; }

      /* ── Other views ── */
      .export-view { padding: 16px; }
      .find-voice { padding: 16px; }

      /* ── Welcome / empty state ── */
      .empty-state { padding: 24px 20px; }
      .empty-hero { font-size: 24px; }
      .empty-proof { gap: 20px; margin-top: 32px; }

      /* ── Home action cards: single column ── */
      .home-actions { grid-template-columns: 1fr; }

      /* ── Council thinker chips: wrap tighter ── */
      .council-thinker-chips { gap: 6px !important; }

      /* ── Swarm network canvas: fit mobile ── */
      .swarm-canvas-wrap canvas {
        max-width: 100% !important;
        height: auto !important;
      }

      /* ── Touch-friendly buttons ── */
      .action-btn {
        min-height: 44px; /* Apple HIG minimum touch target */
        font-size: 14px;
      }

      /* ── Correction / teach-and-retry box ── */
      .write-container textarea { font-size: 16px !important; }

      /* ── Example question pills: scroll horizontally ── */
      .council-example-questions {
        flex-wrap: nowrap !important;
        overflow-x: auto;
        scrollbar-width: none;
        -webkit-overflow-scrolling: touch;
        padding-bottom: 4px;
      }
      .council-example-questions::-webkit-scrollbar { display: none; }

      /* ── Maturity meter: compact ── */
      .voice-maturity-meter { margin: 0 0 16px; padding: 12px 14px; }
    }

    /* Desktop defaults */
    @media (min-width: 641px) {
      .sidebar-backdrop { display: none !important; }
      .save-short { display: none; }
      .save-full { display: inline; }
    }

    /* ── Sidebar product tabs (Voice / Council) ── */
    .sidebar-product-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      padding: 0 8px;
      gap: 4px;
    }
    .sidebar-product-tab {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 12px 4px;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--text-dim);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
      margin-bottom: -1px;
    }
    .sidebar-product-tab:hover { color: var(--text); }
    .sidebar-product-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* ── Council graph wrap & tooltip ── */

<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const API = window.location.origin;

// ── Toast system ──
let _toastListeners = [];
function pushToast(msg, type = "info", duration = 3500) {
  const id = Date.now() + Math.random();
  _toastListeners.forEach(fn => fn({ id, msg, type }));
  setTimeout(() => _toastListeners.forEach(fn => fn({ id, remove: true })), duration);
}
function toast(msg) { pushToast(msg, "info"); }
function toastSuccess(msg) { pushToast(msg, "success"); }
function toastError(msg) { pushToast(msg, "error", 5000); }

function ToastStack() {
  const [toasts, setToasts] = useState([]);
  useEffect(() => {
    const fn = (t) => {
      if (t.remove) setToasts(prev => prev.filter(x => x.id !== t.id));
      else setToasts(prev => [...prev.slice(-4), t]);
    };
    _toastListeners.push(fn);
    return () => { _toastListeners = _toastListeners.filter(x => x !== fn); };
  }, []);
  if (!toasts.length) return null;
  return (
    <div className="toast-stack">
      {toasts.map(t => (
        <div key={t.id} className={`toast ${t.type}`}>{t.msg}</div>
      ))}
    </div>
  );
}

async function copyText(text) {
  try {
    await navigator.clipboard.writeText(text);
    toastSuccess("Copied to clipboard");
  } catch {
    toastError("Could not copy — try selecting and copying manually");
  }
}

// ── Auth Modal ──
function AuthModal({ onClose, onAuth, guestId, initialMode }) {
  // mode: "login" | "register" | "forgot" | "forgot-sent" | "reset"
  const [mode, setMode] = useState(initialMode || "login");
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [name, setName] = useState("");
  const [resetToken, setResetToken] = useState(initialMode === "reset" ? (new URLSearchParams(window.location.search).get("reset") || "") : "");
  const [error, setError] = useState("");
  const [loading, setLoading] = useState(false);
  const emailRef = useRef(null);

  useEffect(() => { emailRef.current?.focus(); }, [mode]);

  const handleSubmit = async (e) => {
    e.preventDefault();
    setError(""); setLoading(true);
    try {
      if (mode === "forgot") {
        await fetch(`${API}/auth/forgot-password`, {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email: email.trim() }),
        });
        setMode("forgot-sent");
        setLoading(false);
        return;
      }
      if (mode === "reset") {
        const res = await fetch(`${API}/auth/reset-password`, {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token: resetToken, password }),
        });
        if (!res.ok) {
          const err = await res.json().catch(() => ({ detail: "Something went wrong" }));
          throw new Error(err.detail);
        }
        window.history.replaceState({}, "", "/app");
        setMode("login");
        toast("Password updated — sign in with your new password.");
        setLoading(false);
        return;
      }
      const endpoint = mode === "login" ? "/auth/login" : "/auth/register";
      const body = mode === "login"
        ? { email: email.trim(), password }
        : { email: email.trim(), password, name: name.trim() };
      const headers = { "Content-Type": "application/json" };
      if (guestId) headers["X-Guest-Id"] = guestId;
      const res = await fetch(`${API}${endpoint}`, {
        method: "POST", headers, body: JSON.stringify(body),
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({ detail: "Something went wrong" }));
        throw new Error(err.detail);
      }
      const data = await res.json();
      setToken(data.token); setUser(data.user);
      onAuth(data.user);
    } catch (err) { setError(err.message); }
    setLoading(false);
  };

  const titles = { login: "Sign in", register: "Create account", forgot: "Reset password", "forgot-sent": "Check your email", reset: "Set new password" };

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()} style={{ width: 400 }}>
        <div className="modal-title">{titles[mode]}</div>
        {mode === "forgot-sent" ? (
          <div style={{ fontFamily: "var(--font-sans)", fontSize: 14, color: "var(--text-dim)", lineHeight: 1.6 }}>
            <p>If an account exists for <strong style={{ color: "var(--text)" }}>{email}</strong>, you'll receive a reset link within a minute.</p>
            <p style={{ marginTop: 8 }}>The link expires in 30 minutes.</p>
            <div className="modal-actions" style={{ marginTop: 20 }}>
              <button className="action-btn" onClick={() => setMode("login")}>Back to sign in</button>
            </div>
          </div>
        ) : (
          <>
            {guestId && mode === "register" && (
              <p style={{ fontSize: 13, color: "var(--green)", fontFamily: "var(--font-sans)", marginBottom: 16 }}>
                Your current work will be saved to your new account.
              </p>
            )}
            <form onSubmit={handleSubmit}>
              {error && (
                <div style={{ background: "rgba(179,80,80,0.15)", border: "1px solid var(--red)",
                  color: "var(--red)", padding: "8px 12px", borderRadius: "var(--radius)",
                  fontSize: 13, marginBottom: 12, fontFamily: "var(--font-sans)" }}>
                  {error}
                </div>
              )}
              {mode === "register" && (
                <input className="modal-input" type="text" placeholder="Your name"
                  value={name} onChange={e => setName(e.target.value)} />
              )}
              {mode !== "reset" && (
                <input ref={emailRef} className="modal-input" type="email" placeholder="Email" required
                  value={email} onChange={e => setEmail(e.target.value)} />
              )}
              {(mode === "login" || mode === "register" || mode === "reset") && (
                <input className="modal-input" type="password"
                  placeholder={mode === "reset" ? "New password (min 6 chars)" : "Password"}
                  minLength={6} required
                  value={password} onChange={e => setPassword(e.target.value)} />
              )}
              <div className="modal-actions">
                <button type="button" className="action-btn secondary" onClick={onClose}>Cancel</button>
                <button type="submit" className="action-btn" disabled={loading}>
                  {loading ? "…" : mode === "login" ? "Sign In" : mode === "register" ? "Create Account" : mode === "forgot" ? "Send Reset Link" : "Set Password"}
                </button>
              </div>
            </form>
            <div style={{ textAlign: "center", marginTop: 16, fontSize: 13, color: "var(--text-dim)", fontFamily: "var(--font-sans)" }}>
              {mode === "login" && (
                <>
                  <div>No account? <a style={{ color: "var(--accent)", cursor: "pointer" }}
                    onClick={() => { setMode("register"); setError(""); }}>Create one</a></div>
                  <div style={{ marginTop: 6 }}><a style={{ color: "var(--text-dim)", cursor: "pointer" }}
                    onClick={() => { setMode("forgot"); setError(""); }}>Forgot password?</a></div>
                </>
              )}
              {mode === "register" && (
                <>Have an account? <a style={{ color: "var(--accent)", cursor: "pointer" }}
                  onClick={() => { setMode("login"); setError(""); }}>Sign in</a></>
              )}
              {(mode === "forgot" || mode === "reset") && (
                <a style={{ color: "var(--text-dim)", cursor: "pointer" }}
                  onClick={() => { setMode("login"); setError(""); }}>← Back to sign in</a>
              )}
            </div>
          </>
        )}
      </div>
    </div>
  );
}

// ── Confirm Modal ──
function ConfirmModal({ title, body, confirmLabel = "Delete", onConfirm, onCancel }) {
  return (
    <div className="modal-overlay" onClick={onCancel}>
      <div className="modal" onClick={e => e.stopPropagation()} style={{ width: 400 }}>
        <div className="confirm-title">{title}</div>
        <div className="confirm-body">{body}</div>

          <button className="action-btn secondary" onClick={onCancel}>Cancel</button>

            {confirmLabel}

}

// ── Token management ──
function getToken() { return localStorage.getItem("voice_token"); }
function setToken(t) { localStorage.setItem("voice_token", t); }
function clearToken() { localStorage.removeItem("voice_token"); }
function getUser() { try { return JSON.parse(localStorage.getItem("voice_user")); } catch { return null; } }
function setUser(u) { localStorage.setItem("voice_user", JSON.stringify(u)); }
function clearUser() { localStorage.removeItem("voice_user"); }

// ── API helpers ──
async function api(path, opts = {}) {
  const token = getToken();
  const headers = { "Content-Type": "application/json", ...opts.headers };
  if (token) headers["Authorization"] = `Bearer ${token}`;
  const res = await fetch(`${API}${path}`, { headers, ...opts });
  if (res.status === 401) {
    // Don't nuke the session on every 401 — only clear if this wasn't a
    // background/secondary call. The refresh flow handles real expiry.
    throw new Error("Session expired");
  }
  if (res.status === 429) {
    const err = await res.json().catch(() => ({ detail: { message: "Limit reached." } }));
    const e = new Error("limit");
    e.limitData = typeof err.detail === "object" ? err.detail : { message: err.detail };
    throw e;
  }
  if (!res.ok) {
    const err = await res.json().catch(() => ({ detail: res.statusText }));
    throw new Error(err.detail || "API error");
  }
  return res.json();
}

// ── Loading dots ──
function LoadingDots() {
  return (
    <span>
      <span className="loading-dot">.</span>
      <span className="loading-dot">.</span>
      <span className="loading-dot">.</span>
    </span>

// ── Visible Intelligence — thinking animation ──
const FALLBACK_LABELS = [
  "sentence rhythm", "vocabulary register", "metaphor density",
  "rhetorical structure", "tonal range", "diction patterns",
];

// Extract thematic labels from the user's message for contextual thinking display
function extractThemes(text) {
  if (!text || text.length < 30) return null;
  const stripped = text.replace(/^(example:|here's my writing:?|sample:)/i, "").trim();
  // Pull quoted phrases first
  const quoted = [];
  stripped.replace(/"([^"]{3,40})"/g, (_, q) => { quoted.push(q); });
  // Extract key noun phrases: look for abstract/philosophical concepts
  const conceptPatterns = [
    /\b(the (?:idea|concept|notion|feeling|paradox|nature|role|problem|question|mystery|power|weight|cost|beauty|danger|comfort|fear|joy|meaning) of [a-z ]{3,30})/gi,
    /\b((?:human|moral|spiritual|inner|cosmic|divine|essential) [a-z]{4,})/gi,
    /\b((?:innocence|justice|virtue|suffering|happiness|love|death|truth|beauty|freedom|dignity|mortality|fragility|guilt|anger|grace|mercy|wisdom|folly|ambition|gratitude|dissatisfaction|imagination|perception|imperfection) (?:and|of|in|without|against|through|within) [a-z ]{3,25})/gi,
    /\b(innocence|justice|virtue|suffering|happiness|love|mortality|fragility|guilt|anger|grace|mercy|wisdom|dissatisfaction|imagination|imperfection)\b/gi,
  ];
  const found = new Set(quoted);
  for (const pat of conceptPatterns) {
    let m;
    while ((m = pat.exec(stripped)) !== null) {
      const phrase = m[1].toLowerCase().trim();
      if (phrase.length > 4 && phrase.length < 45) found.add(phrase);
      if (found.size >= 6) break;
    }
  }
  // If we still have few, extract capitalized multi-word phrases
  if (found.size < 3) {
    const sentences = stripped.split(/[.!?]+/);
    for (const s of sentences.slice(0, 3)) {
      const words = s.trim().split(/\s+/).filter(w => w.length > 3);
      if (words.length >= 3) {
        const key = words.slice(0, 4).join(" ").toLowerCase();
        if (key.length > 10 && key.length < 45) found.add(key);
      }
    }
  }
  const arr = [...found].slice(0, 4);
  return arr.length >= 2 ? arr : null;
}

function VoiceThinking({ profileName, userMessage }) {
  const [phase, setPhase] = useState(0);
  const [labels] = useState(() => {
    const themes = extractThemes(userMessage);
    if (themes) return themes;
    const shuffled = [...FALLBACK_LABELS].sort(() => Math.random() - 0.5);
    return shuffled.slice(0, 4);
  });
  const headerText = extractThemes(userMessage)
    ? `Thinking about ${profileName}'s ideas…`
    : `Analyzing ${profileName}'s voice…`;

  useEffect(() => {
    const timers = [];
    // Cycle through phases: 0=analyzing, 1-4=labels, 5=composing
    for (let i = 1; i <= 5; i++) {
      timers.push(setTimeout(() => setPhase(i), i * 600));
    }
    return () => timers.forEach(clearTimeout);
  }, []);

  return (
    <div style={{ fontSize: 13, fontFamily: "var(--font-sans)", color: "var(--text-faint)", lineHeight: 2 }}>
      <div style={{ color: "var(--text-dim)", marginBottom: 4, opacity: phase >= 0 ? 1 : 0, transition: "opacity 0.3s" }}>
        {headerText}
      </div>
      {labels.map((label, i) => (
        <div key={i} style={{
          opacity: phase > i ? 1 : 0,
          transform: phase > i ? "translateY(0)" : "translateY(4px)",
          transition: "all 0.3s ease",
          color: "var(--text-faint)",
        }}>
          <span style={{ color: "var(--accent)", marginRight: 6 }}>·</span>{label}
        </div>
      ))}
      {phase >= 5 && (
        <div style={{ marginTop: 4, color: "var(--text-dim)", opacity: 1, transition: "opacity 0.3s" }}>
          Composing<LoadingDots />
        </div>
      )}
    </div>
  );
}


// ── Voice Profile Dimensions Card ──
const VOICE_DIMENSIONS = [
  { key: "precision", label: "Precision", desc: "Economy of language" },
  { key: "lyricism", label: "Lyricism", desc: "Musicality and rhythm" },
  { key: "complexity", label: "Complexity", desc: "Sentence architecture" },
  { key: "imagery", label: "Imagery", desc: "Sensory and figurative language" },
  { key: "formality", label: "Formality", desc: "Register and diction" },
  { key: "irony", label: "Irony", desc: "Distance and indirection" },
];

function VoiceProfileCard({ profileId, profileName }) {
  const [dimensions, setDimensions] = useState(null);
  const [summary, setSummary] = useState("");
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);

  const generate = async () => {
    setLoading(true);
    setError(null);
    try {
      const result = await api(`/profiles/${profileId}/dimensions`, { method: "POST" });
      setDimensions(result.dimensions);
      setSummary(result.summary);
    } catch (e) {
      setError(e.message);
    }
    setLoading(false);
  };

  useEffect(() => { generate(); }, [profileId]);

  if (loading) return (
    <div style={{ padding: "24px 0", textAlign: "center", color: "var(--text-faint)", fontSize: 13, fontFamily: "var(--font-sans)" }}>
      Analyzing voice dimensions<LoadingDots />
    </div>
  );
  if (error) return (
    <div style={{ padding: "16px 0", color: "var(--text-faint)", fontSize: 13 }}>
      Could not generate voice profile. <button onClick={generate} style={{ background: "none", border: "none", color: "var(--accent)", cursor: "pointer", fontSize: 13 }}>Retry</button>
    </div>
  );
  if (!dimensions) return null;

  return (
    <div style={{ padding: "20px 0" }}>
      <div style={{ fontSize: 11, textTransform: "uppercase", letterSpacing: 2, color: "var(--accent)", fontFamily: "var(--font-sans)", marginBottom: 16 }}>
        {profileName}'s Voice
      </div>
      <div style={{ display: "flex", flexDirection: "column", gap: 10, marginBottom: 20 }}>
        {VOICE_DIMENSIONS.map(d => {
          const val = dimensions[d.key] ?? 5;
          return (
            <div key={d.key} style={{ display: "flex", alignItems: "center", gap: 12 }}>
              <div style={{ width: 90, fontSize: 12, color: "var(--text-dim)", fontFamily: "var(--font-sans)", flexShrink: 0 }}>
                {d.label}
              </div>
              <div style={{ flex: 1, height: 8, background: "rgba(200,164,110,0.08)", borderRadius: 4, overflow: "hidden" }}>
                <div style={{
                  height: "100%", borderRadius: 4,
                  background: "linear-gradient(90deg, var(--accent), #e8c87a)",
                  width: `${val * 10}%`,
                  transition: "width 0.8s ease",
                  boxShadow: val > 5 ? "0 0 6px rgba(217,168,60,0.3)" : "none",
                }} />
              </div>
              <div style={{ width: 20, fontSize: 11, color: "var(--text-faint)", fontFamily: "var(--font-sans)", textAlign: "right" }}>
                {val}
              </div>
            </div>
          );
        })}
      </div>
      {summary && (
        <div style={{ fontSize: 14, color: "var(--text-dim)", lineHeight: 1.7, fontFamily: "var(--font)", fontStyle: "italic" }}>
          {summary}
        </div>
      )}
    </div>
  );
}


// ── Create Profile Modal ──
function CreateProfileModal({ onClose, onCreate, prefillDesc = "" }) {
  const [name, setName] = useState("");
  const [desc, setDesc] = useState(prefillDesc);
  const [loading, setLoading] = useState(false);
  const ref = useRef(null);

  useEffect(() => { ref.current?.focus(); }, []);

  const handleCreate = async () => {
    if (!name.trim()) return;
    setLoading(true);
    try {
      const profile = await api("/profiles", {
        method: "POST",
        body: JSON.stringify({ name: name.trim(), base_description: desc.trim() }),
      });
      onCreate(profile);
    } catch (e) {
      toastError(e.message);
    }
    setLoading(false);
  };

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()}>
        <div className="modal-title">New Voice Profile</div>
        <input
          ref={ref} className="modal-input" placeholder="Name this voice"
          value={name} onChange={e => setName(e.target.value)}
          onKeyDown={e => e.key === "Enter" && !e.shiftKey && handleCreate()}
        />
        <textarea
          className="modal-input" rows={4} style={{ resize: "vertical", fontFamily: "var(--font)" }}
          placeholder="Describe this voice (optional — you can build it through teaching instead)"
          value={desc} onChange={e => setDesc(e.target.value)}
        />
        <div className="modal-actions">
          <button className="action-btn secondary" onClick={onClose}>Cancel</button>
          <button className="action-btn" onClick={handleCreate} disabled={loading || !name.trim()}>
            {loading ? "Creating..." : "Create"}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── Find Voice Modal ──
function FindVoiceModal({ onClose, onResult }) {
  const [samples, setSamples] = useState(["", ""]);
  const [loading, setLoading] = useState(false);

  const updateSample = (i, val) => {
    const next = [...samples];
    next[i] = val;
    setSamples(next);
  };
  const addSample = () => setSamples([...samples, ""]);
  const removeSample = (i) => setSamples(samples.filter((_, j) => j !== i));

  const handleAnalyze = async () => {
    const filled = samples.filter(s => s.trim().length > 20);
    if (filled.length < 1) { toastError("Provide at least one substantial writing sample."); return; }
    setLoading(true);
    try {
      const result = await api("/analyze-samples", {
        method: "POST",
        body: JSON.stringify({ samples: filled }),
      });
      onResult(result.voice_description);
    } catch (e) { toastError(e.message); }
    setLoading(false);
  };

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()} style={{ width: 600 }}>
        <div className="modal-title">Find Your Voice</div>
        <p style={{ color: "var(--text-dim)", fontSize: 14, marginBottom: 20, fontFamily: "var(--font-sans)" }}>
          Paste writing you admire — your own or others'. We'll identify the patterns and build a starter voice profile.
        </p>
        {samples.map((s, i) => (
          <div key={i} className="sample-entry">
            <div className="sample-label">
              Sample {i + 1}
              {samples.length > 1 && <button className="remove-sample" onClick={() => removeSample(i)}>remove</button>}
            </div>
            <textarea
              className="modal-input" rows={4} style={{ resize: "vertical", fontFamily: "var(--font)" }}
              placeholder="Paste a writing sample..."
              value={s} onChange={e => updateSample(i, e.target.value)}
            />
          </div>
        ))}
        {samples.length < 5 && (
          <button className="action-btn secondary" style={{ marginBottom: 16, fontSize: 12 }} onClick={addSample}>
            + Add sample
          </button>
        )}
        <div className="modal-actions">
          <button className="action-btn secondary" onClick={onClose}>Cancel</button>
          <button className="action-btn" onClick={handleAnalyze} disabled={loading}>
            {loading ? <span>Analyzing<LoadingDots /></span> : "Analyze Samples"}
          </button>
        </div>
      </div>
    </div>
  );
}


const COMMAND_GUIDE = [

function InlineCouncilPanel({ question, onClose }) {
  const [q, setQ] = React.useState(question || "");

    setLoading(true); setError(""); setResult(null);

      });

        <div style={{ padding: "12px 16px", display: "flex", gap: 8 }}>

const ONBOARDING_GREETING = `I learn how you write at your best. Tell me a rule you follow, show me something you've written, or ask me to write something — then correct what I get wrong.`;

// ── Save-as-Refinement picker ──
const REFINEMENT_TYPES = [
  { key: "correct", label: "correction", desc: "Something I'd say differently" },
  { key: "example", label: "example", desc: "A passage that shows my voice" },
  { key: "principle", label: "principle", desc: "A rule I always follow" },
  { key: "voice", label: "voice note", desc: "How I want to sound" },
  { key: "never", label: "anti-pattern", desc: "Something to never do" },
];

function SaveRefinementPicker({ agentMsg, userMsg, profileId, onSaved, onClose }) {
  const [saving, setSaving] = useState(false);
  const [selectedType, setSelectedType] = useState(null);
  const [note, setNote] = useState("");

  const save = async () => {
    if (!selectedType || !note.trim()) return;
    setSaving(true);
    try {
      const fullMsg = selectedType === "correct"
        ? `Context — what Voice wrote: "${agentMsg}"\n\nMy correction:\n${note}`
        : note;
      const history = userMsg
        ? [{ role: "user", content: userMsg }, { role: "agent", content: agentMsg }]
        : [];
      const result = await api(`/profiles/${profileId}/teach`, {
        method: "POST",
        body: JSON.stringify({ message: fullMsg, command: selectedType, conversation_history: history }),
      });
      toastSuccess(`${result.refinement_type} saved · ${result.refinement_count} total`);
      onSaved && onSaved(result.refinement_count);
      onClose();
    } catch (e) {
      toastError(e.message);
      setSaving(false);
    }
  };

  const placeholders = {
    correct: "What would you change? e.g. \"Use 'note' instead of 'catalog' — simpler word fits better here\"",
    example: "Paste or type a passage that shows your voice…",
    principle: "State a rule your voice follows, e.g. \"I never start sentences with 'There is'\"",
    voice: "Describe how you want to sound, e.g. \"More direct, less poetic\"",
    never: "What should this voice avoid? e.g. \"Never use semicolons\"",
  };

  // Step 1: pick a type. Step 2: write the note.
  if (!selectedType) {
    return (
      <div className="refine-picker-overlay" onClick={onClose}>
        <div className="refine-picker" onClick={e => e.stopPropagation()}>
          <div className="refine-picker-title">Save as refinement</div>
          <div style={{ fontSize: 13, color: "var(--text-dim)", marginBottom: 12, lineHeight: 1.5 }}>
            What kind of teaching is this?
          </div>
          <div className="refine-picker-types">
            {REFINEMENT_TYPES.map(r => (
              <button key={r.key} className="refine-type-btn" onClick={() => {
                setSelectedType(r.key);
                // Pre-fill with agent text for example/voice types, empty for corrections
                if (r.key !== "correct") setNote(agentMsg || "");
              }}>
                <span className="refine-type-label">{r.label}</span>
                <span className="refine-type-desc">{r.desc}</span>
              </button>
            ))}
          </div>
          <button className="refine-picker-cancel" onClick={onClose}>cancel</button>
        </div>
      </div>
    );
  }

  // Step 2: write the refinement content
  const typeLabel = REFINEMENT_TYPES.find(r => r.key === selectedType)?.label || selectedType;
  return (
    <div className="refine-picker-overlay" onClick={onClose}>
      <div className="refine-picker" onClick={e => e.stopPropagation()}>
        <div className="refine-picker-title" style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <button onClick={() => { setSelectedType(null); setNote(""); }}
            style={{ background: "none", border: "none", color: "var(--text-dim)", cursor: "pointer", fontSize: 16, padding: 0 }}>
            ←
          </button>
          {typeLabel}
        </div>

        {/* For corrections, show what Voice wrote as read-only context */}
        {selectedType === "correct" && agentMsg && (
          <div style={{
            fontSize: 13, color: "var(--text-dim)", lineHeight: 1.6,
            padding: "10px 14px", background: "var(--bg-elevated)",
            borderRadius: 8, marginBottom: 10, maxHeight: 120, overflowY: "auto",
            border: "1px solid var(--border)",
          }}>
            <div style={{ fontSize: 10, textTransform: "uppercase", letterSpacing: "0.1em", color: "var(--text-faint)", marginBottom: 4 }}>
              Voice wrote:
            </div>
            {agentMsg.length > 300 ? agentMsg.slice(0, 300) + "…" : agentMsg}
          </div>
        )}

        <textarea
          className="refine-picker-textarea"
          value={note}
          onChange={e => setNote(e.target.value)}
          placeholder={placeholders[selectedType] || "Type your refinement…"}
          rows={4}
          autoFocus
        />
        <button
          className="refine-type-btn"
          onClick={save}
          disabled={saving || !note.trim()}
          style={{ marginTop: 8, textAlign: "center", justifyContent: "center", opacity: note.trim() ? 1 : 0.4 }}
        >
          <span className="refine-type-label">{saving ? "Saving…" : `Save ${typeLabel}`}</span>
        </button>
        <button className="refine-picker-cancel" onClick={onClose}>cancel</button>
      </div>
    </div>
  );
}

      toastError("Couldn't load conversation");

      return new Date(iso).toLocaleDateString(undefined, { month: "short", day: "numeric", hour: "2-digit", minute: "2-digit" });
    } catch { return iso.slice(0, 16).replace("T", " "); }

    <div className="past-conv-overlay" onClick={onClose}>
