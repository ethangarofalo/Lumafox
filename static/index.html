<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voice — Authoring Platform</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --bg-surface: #141414;
      --bg-elevated: #1c1c1c;
      --bg-hover: #242424;
      --border: #2a2a2a;
      --border-light: #333;
      --text: #e8e8e8;
      --text-dim: #888;
      --text-faint: #555;
      --accent: #d9a83c;
      --accent-dim: #a07828;
      --accent-glow: rgba(217, 168, 60, 0.14);
      --red: #b35050;
      --green: #5a8a5a;
      --radius: 8px;
      --radius-lg: 12px;
      --font: 'Georgia', 'Times New Roman', serif;
      --font-mono: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ── Layout ── */
    .app { display: flex; flex-direction: column; min-height: 100vh; }

    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 32px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-surface);
    }
    .topbar-logo {
      font-size: 18px; letter-spacing: 0.15em; text-transform: uppercase;
      color: var(--accent); font-weight: 400;
    }
    .topbar-nav { display: flex; gap: 8px; }
    .topbar-btn {
      background: none; border: 1px solid var(--border); color: var(--text-dim);
      padding: 6px 16px; border-radius: var(--radius); cursor: pointer;
      font-family: var(--font-sans); font-size: 13px; transition: all 0.15s;
    }
    .topbar-btn:hover { border-color: var(--accent-dim); color: var(--text); }
    .topbar-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-glow); }

    .main { flex: 1; display: flex; overflow: hidden; }

    /* ── Sidebar ── */
    .sidebar {
      width: 280px; border-right: 1px solid var(--border);
      background: var(--bg-surface); display: flex; flex-direction: column;
      flex-shrink: 0;
    }
    .sidebar-header {
      padding: 20px; border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
    }
    .sidebar-title { font-size: 13px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.1em; font-family: var(--font-sans); }
    .sidebar-list { flex: 1; overflow-y: auto; padding: 8px; }

    .profile-card {
      padding: 14px 16px; border-radius: var(--radius); cursor: pointer;
      transition: all 0.15s; margin-bottom: 4px;
    }
    .profile-card:hover { background: var(--bg-hover); }
    .profile-card.active { background: var(--accent-glow); border-left: 2px solid var(--accent); }
    .profile-card-name { font-size: 15px; color: var(--text); margin-bottom: 4px; }
    .profile-card-meta { font-size: 12px; color: var(--text-dim); font-family: var(--font-sans); }

    .new-profile-btn {
      margin: 12px; padding: 10px; border: 1px dashed var(--border-light);
      border-radius: var(--radius); background: none; color: var(--text-dim);
      cursor: pointer; font-family: var(--font-sans); font-size: 13px;
      text-align: center; transition: all 0.15s;
    }
    .new-profile-btn:hover { border-color: var(--accent-dim); color: var(--accent); }

    /* ── Content Area ── */
    .content { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }

    /* ── Chat / Teach ── */
    .chat-container { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .chat-messages { flex: 1; overflow-y: auto; padding: 24px 32px; }

    .msg { margin-bottom: 24px; max-width: 720px; }
    .msg.user .msg-content { color: var(--text); }
    .msg.agent .msg-content { color: var(--text-dim); }
    .msg-label {
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em;
      margin-bottom: 6px; font-family: var(--font-sans);
    }
    .msg.user .msg-label { color: var(--accent); }
    .msg.agent .msg-label { color: var(--text-faint); }
    .msg-content { font-size: 16px; line-height: 1.7; white-space: pre-wrap; }
    .msg-badge {
      display: inline-block; margin-top: 8px; padding: 2px 10px;
      border-radius: 12px; font-size: 11px; font-family: var(--font-sans);
      background: var(--accent-glow); color: var(--accent); border: 1px solid var(--accent-dim);
    }

    .chat-input-area {
      border-top: 1px solid var(--border); padding: 16px 32px;
      background: var(--bg-surface);
    }
    .chat-commands {
      display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap;
    }
    .cmd-btn {
      background: var(--bg-elevated); border: 1px solid var(--border);
      color: var(--text-dim); padding: 4px 12px; border-radius: 14px;
      font-size: 12px; cursor: pointer; font-family: var(--font-mono);
      transition: all 0.15s;
    }
    .cmd-btn:hover { border-color: var(--accent-dim); color: var(--text); }
    .cmd-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-glow); }

    .chat-input-row { display: flex; gap: 12px; align-items: flex-end; }
    .chat-textarea {
      flex: 1; background: var(--bg-elevated); border: 1px solid var(--border);
      color: var(--text); padding: 12px 16px; border-radius: var(--radius);
      font-family: var(--font); font-size: 15px; line-height: 1.5;
      resize: none; min-height: 48px; max-height: 200px;
      outline: none; transition: border-color 0.15s;
    }
    .chat-textarea:focus { border-color: var(--accent-dim); }
    .chat-textarea::placeholder { color: var(--text-faint); }

    .send-btn {
      background: var(--accent); border: none; color: var(--bg);
      padding: 12px 20px; border-radius: var(--radius); cursor: pointer;
      font-family: var(--font-sans); font-size: 14px; font-weight: 600;
      white-space: nowrap; transition: opacity 0.15s;
    }
    .send-btn:hover { opacity: 0.85; }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Write Mode ── */
    .write-container { flex: 1; display: flex; flex-direction: column; padding: 32px; overflow-y: auto; }
    .write-section { max-width: 720px; width: 100%; margin: 0 auto; }
    .write-label {
      font-size: 12px; color: var(--text-dim); text-transform: uppercase;
      letter-spacing: 0.1em; margin-bottom: 8px; font-family: var(--font-sans);
    }
    .write-textarea {
      width: 100%; background: var(--bg-elevated); border: 1px solid var(--border);
      color: var(--text); padding: 16px; border-radius: var(--radius);
      font-family: var(--font); font-size: 15px; line-height: 1.7;
      resize: vertical; outline: none; transition: border-color 0.15s;
    }
    .write-textarea:focus { border-color: var(--accent-dim); }
    .write-textarea::placeholder { color: var(--text-faint); }

    .write-output {
      margin-top: 24px; padding: 24px; background: var(--bg-elevated);
      border: 1px solid var(--border); border-radius: var(--radius-lg);
      font-size: 16px; line-height: 1.8; white-space: pre-wrap;
      min-height: 120px; color: var(--text);
    }

    .action-btn {
      margin-top: 16px; padding: 10px 24px; background: var(--accent);
      border: none; color: var(--bg); border-radius: var(--radius);
      cursor: pointer; font-family: var(--font-sans); font-size: 14px;
      font-weight: 600; transition: opacity 0.15s;
    }
    .action-btn:hover { opacity: 0.85; }
    .action-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .action-btn.secondary {
      background: none; border: 1px solid var(--border); color: var(--text-dim);
    }
    .action-btn.secondary:hover { border-color: var(--accent-dim); color: var(--text); }

    /* ── Empty States ── */
    .empty-state {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      justify-content: center; color: var(--text-faint); text-align: center;
      padding: 40px; position: relative; overflow: hidden;
    }
    .empty-state-inner { position: relative; z-index: 1; }
    .empty-hero {
      font-size: clamp(28px, 5vw, 52px); font-family: var(--font);
      color: var(--text); line-height: 1.15; margin-bottom: 18px;
      letter-spacing: -0.5px;
    }
    .empty-hero em { color: var(--accent); font-style: normal; }
    .empty-typewriter {
      font-size: clamp(14px, 2vw, 18px); color: var(--accent);
      font-family: var(--font); min-height: 28px; margin-bottom: 14px;
      letter-spacing: 0.01em; opacity: 0.85;
    }
    .empty-typewriter-cursor {
      display: inline-block; width: 2px; height: 1em;
      background: var(--accent); margin-left: 2px;
      vertical-align: text-bottom; animation: blink 0.9s step-end infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }
    .empty-sub { font-size: 14px; max-width: 420px; line-height: 1.7; color: var(--text-dim); margin-bottom: 32px; }
    .empty-cta-row { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .empty-cta-primary {
      padding: 14px 32px; background: var(--accent); color: #1a1610;
      border: none; border-radius: var(--radius); font-family: var(--font);
      font-size: 15px; cursor: pointer; font-weight: 600;
      transition: background 0.15s, transform 0.12s;
    }
    .empty-cta-primary:hover { background: #e8bc4a; transform: translateY(-1px); }
    .empty-cta-secondary {
      padding: 14px 28px; background: transparent; color: var(--text-dim);
      border: 1px solid var(--border); border-radius: var(--radius);
      font-family: var(--font); font-size: 14px; cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .empty-cta-secondary:hover { border-color: var(--accent-dim); color: var(--accent); }
    .empty-proof {
      margin-top: 48px; display: flex; gap: 32px; justify-content: center;
      flex-wrap: wrap;
    }
    .empty-proof-item { text-align: center; }
    .empty-proof-num {
      font-size: 22px; color: var(--accent); font-family: var(--font); margin-bottom: 4px;
    }
    .empty-proof-label { font-size: 11px; color: var(--text-faint); font-family: var(--font-sans); text-transform: uppercase; letter-spacing: 0.1em; }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.7);
      display: flex; align-items: center; justify-content: center; z-index: 100;
    }
    .modal {
      background: var(--bg-surface); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 32px; width: 480px; max-width: 90vw;
    }
    .modal-title { font-size: 18px; margin-bottom: 20px; color: var(--text); }
    .modal-input {
      width: 100%; background: var(--bg-elevated); border: 1px solid var(--border);
      color: var(--text); padding: 10px 14px; border-radius: var(--radius);
      font-family: var(--font); font-size: 15px; outline: none; margin-bottom: 12px;
    }
    .modal-input:focus { border-color: var(--accent-dim); }
    .modal-input::placeholder { color: var(--text-faint); }
    .modal-actions { display: flex; gap: 12px; justify-content: flex-end; margin-top: 20px; }

    /* ── Profile Header ── */
    .profile-header {
      padding: 16px 32px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      background: var(--bg-surface);
    }
    .profile-header-name { font-size: 16px; color: var(--text); }
    .profile-header-meta { font-size: 12px; color: var(--text-dim); font-family: var(--font-sans); margin-left: 12px; }
    .profile-header-actions { display: flex; gap: 8px; }
    .header-action {
      background: none; border: 1px solid var(--border); color: var(--text-dim);
      padding: 4px 12px; border-radius: var(--radius); cursor: pointer;
      font-family: var(--font-sans); font-size: 12px; transition: all 0.15s;
    }
    .header-action:hover { border-color: var(--accent-dim); color: var(--text); }
    .header-action.danger:hover { border-color: var(--red); color: var(--red); }

    /* ── Export View ── */
    .export-view {
      flex: 1; padding: 32px; overflow-y: auto;
    }
    .export-content {
      max-width: 720px; margin: 0 auto; background: var(--bg-elevated);
      border: 1px solid var(--border); border-radius: var(--radius-lg);
      padding: 32px; font-size: 14px; line-height: 1.7;
      font-family: var(--font-mono); white-space: pre-wrap; color: var(--text-dim);
    }

    /* ── Loading ── */
    .loading-dot { display: inline-block; animation: pulse 1.4s infinite; }
    .loading-dot:nth-child(2) { animation-delay: 0.2s; }
    .loading-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse { 0%, 80%, 100% { opacity: 0.3; } 40% { opacity: 1; } }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--border-light); }

    /* ── Find Voice ── */
    .find-voice { flex: 1; padding: 32px; overflow-y: auto; }
    .find-voice-inner { max-width: 720px; margin: 0 auto; }
    .sample-entry { margin-bottom: 16px; }
    .sample-label { font-size: 12px; color: var(--text-dim); font-family: var(--font-sans); margin-bottom: 4px; }
    .remove-sample {
      background: none; border: none; color: var(--text-faint); cursor: pointer;
      font-size: 12px; margin-left: 8px; font-family: var(--font-sans);
    }
    .remove-sample:hover { color: var(--red); }

    /* ── Auth ── */
    .auth-page {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: var(--bg);
    }
    .auth-card {
      width: 400px; max-width: 90vw; padding: 40px;
      background: var(--bg-surface); border: 1px solid var(--border);
      border-radius: var(--radius-lg);
    }
    .auth-logo {
      font-size: 24px; letter-spacing: 0.15em; text-transform: uppercase;
      color: var(--accent); text-align: center; margin-bottom: 8px;
    }
    .auth-sub {
      text-align: center; color: var(--text-dim); font-size: 14px;
      margin-bottom: 32px; font-family: var(--font-sans);
    }
    .auth-input {
      width: 100%; background: var(--bg-elevated); border: 1px solid var(--border);
      color: var(--text); padding: 12px 16px; border-radius: var(--radius);
      font-family: var(--font-sans); font-size: 14px; outline: none;
      margin-bottom: 12px; transition: border-color 0.15s;
    }
    .auth-input:focus { border-color: var(--accent-dim); }
    .auth-input::placeholder { color: var(--text-faint); }
    .auth-submit {
      width: 100%; padding: 12px; background: var(--accent); border: none;
      color: var(--bg); border-radius: var(--radius); cursor: pointer;
      font-family: var(--font-sans); font-size: 14px; font-weight: 600;
      margin-top: 8px; transition: opacity 0.15s;
    }
    .auth-submit:hover { opacity: 0.85; }
    .auth-submit:disabled { opacity: 0.4; cursor: not-allowed; }
    .auth-switch {
      text-align: center; margin-top: 20px; font-size: 13px;
      color: var(--text-dim); font-family: var(--font-sans);
    }
    .auth-switch a {
      color: var(--accent); cursor: pointer; text-decoration: none;
    }
    .auth-switch a:hover { text-decoration: underline; }
    .auth-error {
      background: rgba(179, 80, 80, 0.15); border: 1px solid var(--red);
      color: var(--red); padding: 8px 12px; border-radius: var(--radius);
      font-size: 13px; margin-bottom: 12px; font-family: var(--font-sans);
    }
    .user-badge {
      font-size: 12px; color: var(--text-dim); font-family: var(--font-sans);
      display: flex; align-items: center; gap: 12px;
    }
    .logout-btn {
      background: none; border: none; color: var(--text-faint); cursor: pointer;
      font-family: var(--font-sans); font-size: 12px; padding: 0;
    }
    .logout-btn:hover { color: var(--text); }

    /* ── Toast ── */
    .toast-stack {
      position: fixed; bottom: 24px; right: 24px; z-index: 1000;
      display: flex; flex-direction: column; gap: 8px; pointer-events: none;
    }
    .toast {
      padding: 12px 18px; border-radius: var(--radius);
      font-family: var(--font-sans); font-size: 13px;
      background: var(--bg-elevated); border: 1px solid var(--border);
      color: var(--text); pointer-events: auto;
      animation: toastIn 0.2s ease; max-width: 360px; line-height: 1.4;
    }
    .toast.success { border-color: var(--green); }
    .toast.error { border-color: var(--red); color: var(--red); }
    .toast.info { border-color: var(--accent-dim); }
    @keyframes toastIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    /* ── Landing-page entry animation ── */
    @keyframes slideInFromBelow {
      from { transform: translateY(100vh); }
      to   { transform: translateY(0); }
    }
    body.slide-in {
      animation: slideInFromBelow 0.55s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    /* ── Confirm modal ── */
    .confirm-title { font-size: 16px; color: var(--text); margin-bottom: 10px; }
    .confirm-body { font-size: 14px; color: var(--text-dim); font-family: var(--font-sans); line-height: 1.5; margin-bottom: 24px; }

    /* ── Command guide ── */
    .cmd-guide {
      margin-bottom: 10px; padding: 12px 16px; background: var(--bg-elevated);
      border: 1px solid var(--border); border-radius: var(--radius);
      font-family: var(--font-sans); font-size: 12px; color: var(--text-dim);
      line-height: 1.6;
    }
    .cmd-guide strong { color: var(--text); }
    .cmd-guide-toggle {
      background: none; border: none; color: var(--text-faint); font-family: var(--font-sans);
      font-size: 11px; cursor: pointer; padding: 0; margin-bottom: 8px;
      text-decoration: underline;
    }
    .cmd-guide-toggle:hover { color: var(--text-dim); }

    /* ── Onboarding steps ── */
    /* ── Home / workflow entry view ── */
    .home-view {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 40px 32px; position: relative; z-index: 1;
    }
    .home-bubble {
      display: flex; align-items: flex-start; gap: 14px; max-width: 560px;
      width: 100%; margin-bottom: 36px;
    }
    .home-bubble-avatar {
      width: 34px; height: 34px; border-radius: 50%;
      background: var(--accent-glow); border: 1px solid var(--accent-dim);
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; flex-shrink: 0; margin-top: 2px;
    }
    .home-bubble-body {}
    .home-bubble-label {
      font-size: 10px; font-family: var(--font-sans); text-transform: uppercase;
      letter-spacing: 0.12em; color: var(--accent); margin-bottom: 8px;
    }
    .home-bubble-text {
      font-family: var(--font); font-size: 1.15rem; color: var(--text);
      line-height: 1.65; max-width: 480px;
    }
    .home-bubble-text em { color: var(--accent); font-style: normal; }
    .home-actions {
      display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
      max-width: 560px; width: 100%;
    }
    .home-action-card {
      background: var(--bg-surface); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 20px 20px 18px;
      cursor: pointer; text-align: left; transition: border-color 0.15s, background 0.15s;
      display: flex; flex-direction: column; gap: 6px;
    }
    .home-action-card:hover {
      border-color: var(--accent-dim); background: var(--accent-glow);
    }
    .home-action-icon { font-size: 20px; margin-bottom: 2px; }
    .home-action-title {
      font-family: var(--font); font-size: 15px; color: var(--text);
    }
    .home-action-desc {
      font-family: var(--font-sans); font-size: 12px; color: var(--text-dim);
      line-height: 1.5;
    }
    .home-action-card.primary { border-color: var(--accent-dim); }
    .home-action-card.primary .home-action-title { color: var(--accent); }
    @media (max-width: 640px) {
      .home-actions { grid-template-columns: 1fr; }
      .home-view { padding: 24px 16px; justify-content: flex-start; padding-top: 48px; }
    }

    /* ── Mobile sidebar toggle (hidden on desktop) ── */
    .mobile-voices-btn { display: none; }

    /* ── Mobile layout ── */
    @media (max-width: 640px) {
      /* Topbar: tighter padding, allow right side to scroll */
      .topbar { padding: 10px 14px; gap: 8px; }
      .topbar-logo { font-size: 16px; }

      /* Hide "Guest" label — the Save button makes it obvious */
      .topbar-guest-label { display: none; }

      /* Mode nav tabs: scroll horizontally instead of wrapping */
      .topbar-nav {
        overflow-x: auto; scrollbar-width: none;
        -webkit-overflow-scrolling: touch; max-width: 52vw;
      }
      .topbar-nav::-webkit-scrollbar { display: none; }

      /* Show the mobile voices toggle */
      .mobile-voices-btn {
        display: flex; align-items: center; gap: 6px;
        background: none; border: 1px solid var(--border);
        color: var(--text-dim); padding: 5px 10px;
        border-radius: var(--radius); cursor: pointer;
        font-family: var(--font-sans); font-size: 12px;
        transition: all 0.15s; flex-shrink: 0;
      }
      .mobile-voices-btn.open {
        border-color: var(--accent-dim); color: var(--accent);
      }

      /* Sidebar: fixed overlay that slides in from the left */
      .sidebar {
        position: fixed;
        top: 0; left: 0; bottom: 0;

      .profile-header { padding: 10px 14px; flex-wrap: wrap; gap: 6px; }

  </style>

<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const API = window.location.origin;

// ── Toast system ──
let _toastListeners = [];
function pushToast(msg, type = "info", duration = 3500) {
  const id = Date.now() + Math.random();
  _toastListeners.forEach(fn => fn({ id, msg, type }));
  setTimeout(() => _toastListeners.forEach(fn => fn({ id, remove: true })), duration);
}
function toast(msg) { pushToast(msg, "info"); }
function toastSuccess(msg) { pushToast(msg, "success"); }
function toastError(msg) { pushToast(msg, "error", 5000); }

function ToastStack() {
  const [toasts, setToasts] = useState([]);
  useEffect(() => {
    const fn = (t) => {
      if (t.remove) setToasts(prev => prev.filter(x => x.id !== t.id));
      else setToasts(prev => [...prev.slice(-4), t]);
    };
    _toastListeners.push(fn);
    return () => { _toastListeners = _toastListeners.filter(x => x !== fn); };
  }, []);
  if (!toasts.length) return null;
  return (
    <div className="toast-stack">
      {toasts.map(t => (
        <div key={t.id} className={`toast ${t.type}`}>{t.msg}</div>
      ))}
    </div>
  );
}

async function copyText(text) {
  try {
    await navigator.clipboard.writeText(text);
    toastSuccess("Copied to clipboard");
  } catch {
    toastError("Could not copy — try selecting and copying manually");
  }
}

// ── Auth Modal ──
function AuthModal({ onClose, onAuth, guestId }) {
  const [isLogin, setIsLogin] = useState(true);
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [name, setName] = useState("");
  const [error, setError] = useState("");
  const [loading, setLoading] = useState(false);
  const emailRef = useRef(null);

  useEffect(() => { emailRef.current?.focus(); }, [isLogin]);

  const handleSubmit = async (e) => {
    e.preventDefault();
    if (!email.trim() || !password) return;
    setError(""); setLoading(true);
    try {
      const endpoint = isLogin ? "/auth/login" : "/auth/register";
      const body = isLogin
        ? { email: email.trim(), password }
        : { email: email.trim(), password, name: name.trim() };
      const headers = { "Content-Type": "application/json" };
      if (guestId) headers["X-Guest-Id"] = guestId;
      const res = await fetch(`${API}${endpoint}`, {
        method: "POST", headers, body: JSON.stringify(body),
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({ detail: "Something went wrong" }));
        throw new Error(err.detail);
      }
      const data = await res.json();
      setToken(data.token); setUser(data.user);
      onAuth(data.user);
    } catch (err) { setError(err.message); }
    setLoading(false);
  };

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()} style={{ width: 400 }}>
        <div className="modal-title">{isLogin ? "Sign in" : "Create account"}</div>
        {guestId && !isLogin && (
          <p style={{ fontSize: 13, color: "var(--green)", fontFamily: "var(--font-sans)", marginBottom: 16 }}>
            Your current work will be saved to your new account.
          </p>
        )}
        <form onSubmit={handleSubmit}>
          {error && (
            <div style={{ background: "rgba(179,80,80,0.15)", border: "1px solid var(--red)",
              color: "var(--red)", padding: "8px 12px", borderRadius: "var(--radius)",
              fontSize: 13, marginBottom: 12, fontFamily: "var(--font-sans)" }}>
              {error}
            </div>
          )}
          {!isLogin && (
            <input className="modal-input" type="text" placeholder="Your name"
              value={name} onChange={e => setName(e.target.value)} />
          )}
          <input ref={emailRef} className="modal-input" type="email" placeholder="Email" required
            value={email} onChange={e => setEmail(e.target.value)} />
          <input className="modal-input" type="password" placeholder="Password" minLength={6} required
            value={password} onChange={e => setPassword(e.target.value)} />
          <div className="modal-actions">
            <button type="button" className="action-btn secondary" onClick={onClose}>Cancel</button>
            <button type="submit" className="action-btn" disabled={loading}>
              {loading ? "..." : isLogin ? "Sign In" : "Create Account"}
            </button>
          </div>
        </form>
        <div style={{ textAlign: "center", marginTop: 16, fontSize: 13, color: "var(--text-dim)", fontFamily: "var(--font-sans)" }}>
          {isLogin ? (
            <>No account? <a style={{ color: "var(--accent)", cursor: "pointer" }}
              onClick={() => { setIsLogin(false); setError(""); }}>Create one</a></>
          ) : (
            <>Have an account? <a style={{ color: "var(--accent)", cursor: "pointer" }}
              onClick={() => { setIsLogin(true); setError(""); }}>Sign in</a></>
          )}
        </div>
      </div>
    </div>
  );
}

// ── Confirm Modal ──
function ConfirmModal({ title, body, confirmLabel = "Delete", onConfirm, onCancel }) {
  return (
    <div className="modal-overlay" onClick={onCancel}>
      <div className="modal" onClick={e => e.stopPropagation()} style={{ width: 400 }}>
        <div className="confirm-title">{title}</div>
        <div className="confirm-body">{body}</div>
        <div className="modal-actions">
          <button className="action-btn secondary" onClick={onCancel}>Cancel</button>
          <button
            className="action-btn"
            style={{ background: "var(--red)", borderColor: "var(--red)" }}
            onClick={onConfirm}
          >
            {confirmLabel}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── Token management ──
function getToken() { return localStorage.getItem("voice_token"); }
function setToken(t) { localStorage.setItem("voice_token", t); }
function clearToken() { localStorage.removeItem("voice_token"); }
function getUser() { try { return JSON.parse(localStorage.getItem("voice_user")); } catch { return null; } }
function setUser(u) { localStorage.setItem("voice_user", JSON.stringify(u)); }
function clearUser() { localStorage.removeItem("voice_user"); }

// ── API helpers ──
async function api(path, opts = {}) {
  const token = getToken();
  const headers = { "Content-Type": "application/json", ...opts.headers };
  if (token) headers["Authorization"] = `Bearer ${token}`;
  const res = await fetch(`${API}${path}`, { headers, ...opts });
  if (res.status === 401) {
    clearToken(); clearUser();
    window.location.reload();
    throw new Error("Session expired");
  }
  if (!res.ok) {
    const err = await res.json().catch(() => ({ detail: res.statusText }));
    throw new Error(err.detail || "API error");
  }
  return res.json();
}

// ── Loading dots ──
function LoadingDots() {
  return (
    <span>
      <span className="loading-dot">.</span>
      <span className="loading-dot">.</span>
      <span className="loading-dot">.</span>
    </span>
  );
}

// ── Create Profile Modal ──
function CreateProfileModal({ onClose, onCreate, prefillDesc = "" }) {
  const [name, setName] = useState("");
  const [desc, setDesc] = useState(prefillDesc);
  const [loading, setLoading] = useState(false);
  const ref = useRef(null);

  useEffect(() => { ref.current?.focus(); }, []);

  const handleCreate = async () => {
    if (!name.trim()) return;
    setLoading(true);
    try {
      const profile = await api("/profiles", {
        method: "POST",
        body: JSON.stringify({ name: name.trim(), base_description: desc.trim() }),
      });
      onCreate(profile);
    } catch (e) {
      toastError(e.message);
    }
    setLoading(false);
  };

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()}>
        <div className="modal-title">New Voice Profile</div>
        <input
          ref={ref} className="modal-input" placeholder="Name this voice"
          value={name} onChange={e => setName(e.target.value)}
          onKeyDown={e => e.key === "Enter" && !e.shiftKey && handleCreate()}
        />
        <textarea
          className="modal-input" rows={4} style={{ resize: "vertical", fontFamily: "var(--font)" }}
          placeholder="Describe this voice (optional — you can build it through teaching instead)"
          value={desc} onChange={e => setDesc(e.target.value)}
        />
        <div className="modal-actions">
          <button className="action-btn secondary" onClick={onClose}>Cancel</button>
          <button className="action-btn" onClick={handleCreate} disabled={loading || !name.trim()}>
            {loading ? "Creating..." : "Create"}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── Find Voice Modal ──
function FindVoiceModal({ onClose, onResult }) {
  const [samples, setSamples] = useState(["", ""]);
  const [loading, setLoading] = useState(false);

  const updateSample = (i, val) => {
    const next = [...samples];
    next[i] = val;
    setSamples(next);
  };
  const addSample = () => setSamples([...samples, ""]);
  const removeSample = (i) => setSamples(samples.filter((_, j) => j !== i));

  const handleAnalyze = async () => {
    const filled = samples.filter(s => s.trim().length > 20);
    if (filled.length < 1) { toastError("Provide at least one substantial writing sample."); return; }
    setLoading(true);
    try {
      const result = await api("/analyze-samples", {
        method: "POST",
        body: JSON.stringify({ samples: filled }),
      });
      onResult(result.voice_description);
    } catch (e) { toastError(e.message); }
    setLoading(false);
  };

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()} style={{ width: 600 }}>
        <div className="modal-title">Find Your Voice</div>
        <p style={{ color: "var(--text-dim)", fontSize: 14, marginBottom: 20, fontFamily: "var(--font-sans)" }}>
          Paste writing you admire — your own or others'. We'll identify the patterns and build a starter voice profile.
        </p>
        {samples.map((s, i) => (
          <div key={i} className="sample-entry">
            <div className="sample-label">
              Sample {i + 1}
              {samples.length > 1 && <button className="remove-sample" onClick={() => removeSample(i)}>remove</button>}
            </div>
            <textarea
              className="modal-input" rows={4} style={{ resize: "vertical", fontFamily: "var(--font)" }}
              placeholder="Paste a writing sample..."
              value={s} onChange={e => updateSample(i, e.target.value)}
            />
          </div>
        ))}
        {samples.length < 5 && (
          <button className="action-btn secondary" style={{ marginBottom: 16, fontSize: 12 }} onClick={addSample}>
            + Add sample
          </button>
        )}
        <div className="modal-actions">
          <button className="action-btn secondary" onClick={onClose}>Cancel</button>
          <button className="action-btn" onClick={handleAnalyze} disabled={loading}>
            {loading ? <span>Analyzing<LoadingDots /></span> : "Analyze Samples"}
          </button>
        </div>
      </div>
    </div>
  );
}


const COMMAND_GUIDE = [
  { key: "dialogue", label: "dialogue", desc: "Talk openly — ask questions, explore, or just converse with the voice." },
  { key: "principle", label: "principle", desc: "State a rule that governs this voice. Saved and always applied." },
  { key: "never", label: "never", desc: "Name something this voice must never do. A hard prohibition." },
  { key: "example", label: "example", desc: "Paste a sentence or paragraph that shows the voice at its best." },
  { key: "voice", label: "voice", desc: "Describe a tone, texture, or quality — harder to pin down than a rule." },
  { key: "correct", label: "correct", desc: "Point out a mistake in something the voice just wrote." },
  { key: "demo", label: "demo", desc: "Ask the voice to write something so you can see it in action." },
  { key: "examine", label: "examine", desc: "Paste text and ask the voice to analyze it against your style." },
];

// ── Teach View (Chat) ──
const ONBOARDING_GREETING = `Before I can write like you, I need to understand how you think.

Tell me about a piece of writing you're proud of — yours, not someone else's. Or if nothing comes to mind, just describe how you want to sound when you're writing at your best. What does your writing do that most writing doesn't?`;

function TeachView({ profileId, profileName, refinementCount, onRefinementSaved }) {
  const isNew = refinementCount === 0;

  const [messages, setMessages] = useState(() =>
    isNew ? [{ role: "agent", content: ONBOARDING_GREETING, isGreeting: true }] : []
  );
  const [input, setInput] = useState("");
  const [command, setCommand] = useState("dialogue");
  const [loading, setLoading] = useState(false);
  const [showGuide, setShowGuide] = useState(false);
  const messagesEnd = useRef(null);
  const textareaRef = useRef(null);

  // Count only real user turns (not the greeting)
  const userTurns = messages.filter(m => m.role === "user").length;
  // Show command buttons once they've had a real exchange and the voice isn't brand new
  const showCommands = !isNew || userTurns >= 3;

  useEffect(() => { messagesEnd.current?.scrollIntoView({ behavior: "smooth" }); }, [messages]);
  useEffect(() => {
    const newIsNew = refinementCount === 0;
    setMessages(newIsNew ? [{ role: "agent", content: ONBOARDING_GREETING, isGreeting: true }] : []);
  }, [profileId]);

  const send = async () => {
    if (!input.trim() || loading) return;
    const text = input.trim();
    setInput("");

    // During onboarding keep command as dialogue
    const activeCommand = showCommands ? command : "dialogue";
    setMessages(prev => [...prev, { role: "user", content: text, command: activeCommand }]);
    setLoading(true);

    try {
      const history = messages
        .filter(m => !m.isGreeting)
        .slice(-8)
        .map(m => ({ role: m.role === "user" ? "user" : "agent", content: m.content }));

      // Include the greeting in context so the AI knows what was asked
      if (isNew && userTurns === 0) {
        history.unshift({ role: "agent", content: ONBOARDING_GREETING });
      }

      const result = await api(`/profiles/${profileId}/teach`, {
        method: "POST",
        body: JSON.stringify({ message: text, command: activeCommand, conversation_history: history }),
      });
      const saved = result.refinement_saved ? result.refinement_type : null;
      setMessages(prev => [...prev, {
        role: "agent", content: result.response,
        refinement: saved, count: result.refinement_count,
      }]);
      if (saved) {
        toastSuccess(`${saved} saved — ${result.refinement_count} total refinements`);
        onRefinementSaved && onRefinementSaved(result.refinement_count);
      }
    } catch (e) {
      setMessages(prev => [...prev, { role: "agent", content: `Error: ${e.message}` }]);
      toastError(e.message);
    }
    setLoading(false);
    setTimeout(() => textareaRef.current?.focus(), 50);
  };

  const handleKeyDown = (e) => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
  };

  const handleInput = (e) => {
    setInput(e.target.value);
    e.target.style.height = "auto";
    e.target.style.height = Math.min(e.target.scrollHeight, 200) + "px";
  };

  return (
    <div className="chat-container">
      <div className="chat-messages">
        {messages.map((m, i) => (
          <div key={i} className={`msg ${m.role}`}>
            <div className="msg-label">
              {m.role === "user"
                ? (showCommands && m.command && m.command !== "dialogue" ? `/${m.command}` : "you")
                : (m.isGreeting ? profileName : "voice")}
            </div>
            <div className="msg-content" style={m.isGreeting ? { whiteSpace: "pre-line" } : {}}>
              {m.content}
            </div>
            {m.refinement && <span className="msg-badge">{m.refinement} saved · {m.count} total</span>}
          </div>
        ))}
        {loading && (
          <div className="msg agent">
            <div className="msg-label">voice</div>
            <div className="msg-content" style={{ color: "var(--text-faint)" }}><LoadingDots /></div>
          </div>
        )}
        <div ref={messagesEnd} />
      </div>

      <div className="chat-input-area">
        {showCommands && (
          <div>
            <button className="cmd-guide-toggle" onClick={() => setShowGuide(g => !g)}>
              {showGuide ? "hide command guide" : "what do these commands mean?"}
            </button>
            {showGuide && (
              <div className="cmd-guide">
                {COMMAND_GUIDE.map(c => (
                  <div key={c.key} style={{ marginBottom: 4 }}>
                    <strong>/{c.label}</strong> — {c.desc}
                  </div>
                ))}
              </div>
            )}
          </div>
        )}
        {showCommands && (
          <div className="chat-commands">
            {COMMAND_GUIDE.map(c => (
              <button
                key={c.key}
                className={`cmd-btn ${command === c.key ? "active" : ""}`}
                onClick={() => setCommand(c.key)}
                title={c.desc}
              >
                /{c.label}
              </button>
            ))}
          </div>
        )}
        <div className="chat-input-row">
          <textarea
            ref={textareaRef}
            className="chat-textarea" rows={1}
            placeholder={
              !showCommands
                ? "Describe your writing, paste a sentence you love, or tell me what you never want to sound like…"
                : command === "dialogue" ? "Talk to this voice..." : `/${command}: describe what you're teaching...`
            }
            value={input} onChange={handleInput} onKeyDown={handleKeyDown}
          />
          <button className="send-btn" onClick={send} disabled={loading || !input.trim()}>
            Send
          </button>
        </div>
      </div>
    </div>
  );
}


// ── Write View ──
function WriteView({ profileId, profileName }) {
  const [instruction, setInstruction] = useState("");
  const [context, setContext] = useState("");
  const [output, setOutput] = useState("");
  const [loading, setLoading] = useState(false);
  const [showContext, setShowContext] = useState(false);
  const [correction, setCorrection] = useState("");
  const [correcting, setCorrecting] = useState(false);
  const [refinementCount, setRefinementCount] = useState(null);
  const correctionRef = React.useRef(null);

  useEffect(() => { setOutput(""); setInstruction(""); setContext(""); setCorrection(""); setRefinementCount(null); }, [profileId]);

  useEffect(() => {
    if (output && correctionRef.current) {
      correctionRef.current.scrollIntoView({ behavior: "smooth", block: "nearest" });
    }
  }, [output]);

  const generate = async () => {
    if (!instruction.trim() || loading) return;
    setLoading(true);
    setOutput("");
    setCorrection("");
    try {
      const result = await api(`/profiles/${profileId}/write`, {
        method: "POST",
        body: JSON.stringify({ instruction: instruction.trim(), context: context.trim() }),
      });
      setOutput(result.text);
    } catch (e) { setOutput(`Error: ${e.message}`); toastError(e.message); }
    setLoading(false);
  };

  const teachAndRetry = async () => {
    if (!correction.trim() || correcting) return;
    setCorrecting(true);
    const teachMsg = `The voice was asked to write: "${instruction.trim()}"\n\nIt produced this:\n\n${output}\n\nThat is wrong. ${correction.trim()}`;
    try {
      const taught = await api(`/profiles/${profileId}/teach`, {
        method: "POST",
        body: JSON.stringify({ message: teachMsg, command: "correct", conversation_history: [] }),
      });
      setRefinementCount(taught.refinement_count);
      toastSuccess(`Correction saved · ${taught.refinement_count} refinement${taught.refinement_count === 1 ? "" : "s"} total`);
      setOutput("");
      const result = await api(`/profiles/${profileId}/write`, {
        method: "POST",
        body: JSON.stringify({ instruction: instruction.trim(), context: context.trim() }),
      });
      setOutput(result.text);
      setCorrection("");
    } catch (e) { toastError(e.message); }
    setCorrecting(false);
  };

  return (
    <div className="write-container">
      <div className="write-section">
        <div className="write-label">What should this voice write?</div>
        <textarea
          className="write-textarea" rows={3}
          placeholder="e.g., 'An opening paragraph about why most modern writing is lifeless.'"
          value={instruction} onChange={e => setInstruction(e.target.value)}
        />

        {!showContext ? (
          <button
            className="action-btn secondary" style={{ marginTop: 12, fontSize: 12 }}
            onClick={() => setShowContext(true)}
          >
            + Add context or notes
          </button>
        ) : (
          <>
            <div className="write-label" style={{ marginTop: 20 }}>Context / Notes</div>
            <textarea
              className="write-textarea" rows={4}
              placeholder="Optional: an outline, notes, previous draft, or audience description"
              value={context} onChange={e => setContext(e.target.value)}
            />
          </>
        )}

        <button className="action-btn" style={{ marginTop: 16 }} onClick={generate} disabled={loading || !instruction.trim()}>
          {loading ? <span>Writing<LoadingDots /></span> : `Write as ${profileName}`}
        </button>

        {output && (
          <>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginTop: 32 }}>
              <div className="write-label" style={{ marginTop: 0 }}>Output</div>
              <div style={{ display: "flex", gap: 8 }}>
                <button className="action-btn secondary" style={{ fontSize: 12, padding: "4px 12px" }}
                  onClick={() => copyText(output)}>Copy</button>
                <button className="action-btn secondary" style={{ fontSize: 12, padding: "4px 12px" }}
                  onClick={generate} disabled={loading}>Regenerate</button>
              </div>
            </div>
            <div className="write-output">{output}</div>

            <div ref={correctionRef} style={{
              marginTop: 20, padding: "16px", borderRadius: "var(--radius)",
              border: "1px solid var(--border-light)", background: "var(--bg-elevated)"
            }}>
              <div style={{ fontSize: 12, color: "var(--text-dim)", fontFamily: "var(--font-sans)", marginBottom: 8 }}>
                Correct the voice
                {refinementCount !== null && (
                  <span style={{ color: "var(--accent)", marginLeft: 8 }}>· {refinementCount} refinement{refinementCount === 1 ? "" : "s"}</span>
                )}
              </div>
              <textarea
                className="write-textarea" rows={3}
                placeholder="e.g., 'Too ornate. My sentences are shorter and more direct. The first sentence should not start with an abstract noun.'"
                value={correction}
                onChange={e => setCorrection(e.target.value)}
                style={{ marginBottom: 10 }}
              />
              <button
                className="action-btn" style={{ width: "100%" }}
                onClick={teachAndRetry}
                disabled={correcting || !correction.trim()}
              >
                {correcting ? <span>Teaching & rewriting<LoadingDots /></span> : "Teach & retry →"}
              </button>
            </div>
          </>
        )}
      </div>
    </div>
  );
}


// ── Analyze View ──
function AnalyzeView({ profileId, profileName }) {
  const [text, setText] = useState("");
  const [analysis, setAnalysis] = useState("");
  const [loading, setLoading] = useState(false);

// ── Upload View (Bring Your Voice) ──
function UploadView({ profileId }) {
  const [files, setFiles] = useState([]);
  const [uploading, setUploading] = useState(false);
  const [ingesting, setIngesting] = useState(false);
  const [result, setResult] = useState(null);
  const [dragOver, setDragOver] = useState(false);
  const fileInput = useRef(null);

  const loadFiles = async () => {
    try {
      const r = await api(`/profiles/${profileId}/uploads`);
      setFiles(r.files);
    } catch (e) { console.error(e); }
  };

  useEffect(() => { loadFiles(); setResult(null); }, [profileId]);

  const uploadFile = async (file) => {
    if (!file) return;
    const allowed = [".txt", ".md", ".html", ".text"];
    const ext = "." + file.name.split(".").pop().toLowerCase();
    if (!allowed.includes(ext)) { toastError("Only .txt, .md, or .html files allowed"); return; }
    setUploading(true);
    try {
      const formData = new FormData();
      formData.append("file", file);
      const token = getToken();
      const res = await fetch(`${API}/profiles/${profileId}/upload`, {
        method: "POST",
        headers: token ? { "Authorization": `Bearer ${token}` } : {},
        body: formData,
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({ detail: "Upload failed" }));
        throw new Error(err.detail);
      }
      await loadFiles();
      toastSuccess("File uploaded");
    } catch (err) { toastError(err.message); }
    setUploading(false);
    if (fileInput.current) fileInput.current.value = "";
  };

  const handleInputChange = (e) => uploadFile(e.target.files?.[0]);

  const handleDrop = (e) => {
    e.preventDefault();
    setDragOver(false);
    const file = e.dataTransfer.files?.[0];
    if (file) uploadFile(file);
  };

  const handleIngest = async () => {
    if (files.length === 0) { toastError("Upload some writing first."); return; }
    setIngesting(true);
    setResult(null);
    try {
      const r = await api(`/profiles/${profileId}/ingest`, { method: "POST" });
      setResult(r);
      toastSuccess(`Extracted ${r.new_refinements} refinements from your writing`);
    } catch (err) { toastError(err.message); }
    setIngesting(false);
  };

  return (
    <div className="write-container">
      <div className="write-section">
        <div className="write-label">Bring Your Voice</div>
        <p style={{ color: "var(--text-dim)", fontSize: 14, marginBottom: 20, fontFamily: "var(--font-sans)" }}>
          Upload your writing — essays, blog posts, emails, anything that sounds like you.
          Then hit "Analyze" and the system will extract examples, principles, and patterns automatically.
        </p>

        <input
          ref={fileInput} type="file" accept=".txt,.md,.html,.text"
          onChange={handleInputChange} style={{ display: "none" }}
        />
        <div
          onClick={() => !uploading && fileInput.current?.click()}
          onDrop={handleDrop}
          onDragOver={(e) => { e.preventDefault(); setDragOver(true); }}
          onDragLeave={() => setDragOver(false)}
          style={{
            border: `2px dashed ${dragOver ? "var(--accent)" : "var(--border)"}`,
            borderRadius: "var(--radius)",
            padding: "36px 24px",
            textAlign: "center",
            cursor: uploading ? "default" : "pointer",
            background: dragOver ? "rgba(200,164,110,0.06)" : "transparent",
            transition: "border-color 0.15s, background 0.15s",
            marginBottom: 20,
          }}
        >
          {uploading ? (
            <span style={{ fontFamily: "var(--font-sans)", fontSize: 14, color: "var(--text-dim)" }}>
              Uploading…
            </span>
          ) : (
            <>
              <div style={{ fontSize: 28, marginBottom: 8, opacity: 0.5 }}>↑</div>
              <div style={{ fontFamily: "var(--font-sans)", fontSize: 14, color: "var(--text-dim)" }}>
                Drop a file here, or <span style={{ color: "var(--accent)", textDecoration: "underline" }}>browse</span>
              </div>
              <div style={{ fontFamily: "var(--font-sans)", fontSize: 12, color: "var(--text-faint)", marginTop: 6 }}>
                .txt · .md · .html — up to 500 KB
              </div>
            </>
          )}
        </div>

        {files.length > 0 && (
          <div style={{ marginBottom: 20 }}>
            <div className="write-label">Uploaded Files ({files.length})</div>
            {files.map((f, i) => (
              <div key={i} style={{
                padding: "8px 12px", background: "var(--bg-elevated)", border: "1px solid var(--border)",
                borderRadius: "var(--radius)", marginBottom: 4, display: "flex", justifyContent: "space-between",
                fontFamily: "var(--font-sans)", fontSize: 13,
              }}>
                <span style={{ color: "var(--text)" }}>{f.filename}</span>
                <span style={{ color: "var(--text-faint)" }}>{(f.size / 1024).toFixed(1)} KB</span>
              </div>
            ))}
          </div>
        )}

        {files.length > 0 && (
          <button className="action-btn" onClick={handleIngest} disabled={ingesting}>
            {ingesting ? <span>Analyzing your writing<LoadingDots /></span> : "Analyze & Extract Voice"}
          </button>
        )}

        {result && (
          <div style={{ marginTop: 24 }}>
            <div className="write-label">Extracted {result.new_refinements} refinements</div>
            <div className="write-output">
              {result.refinements.map((r, i) => (
                `[${r.type}] ${r.content}`
              )).join("\n\n")}
            </div>
            <div style={{ marginTop: 8, fontSize: 12, color: "var(--text-dim)", fontFamily: "var(--font-sans)" }}>
              Total refinements on this profile: {result.total_refinements}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ── Council View ──────────────────────────────────────────────────────────────
const ALL_THINKERS = ["Socrates", "Aristotle", "Machiavelli", "John Locke", "Jesus", "William James"];
const TRADITION_LABEL = {
  "Socrates": "Socratic",
  "Aristotle": "Aristotelian",
  "Machiavelli": "Machiavellian",
  "John Locke": "Lockean",
  "Jesus": "Christian",
  "William James": "Pragmatist",
};

function NeuralCanvas({ thinkers, size = 340, active = false }) {
  const canvasRef = React.useRef(null);
  const animRef = React.useRef(null);
  const stateRef = React.useRef(null);

  React.useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    const W = canvas.width = size;
    const H = canvas.height = size;
    const cx = W / 2, cy = H / 2;
    const n = thinkers.length;
    const R = size * 0.34;

    // Build nodes — arrange in a circle, with slight random jitter
    const nodes = thinkers.map((name, i) => {
      const angle = (i / n) * Math.PI * 2 - Math.PI / 2;
      const jitter = 0.92 + Math.random() * 0.16;
      return {
        x: cx + Math.cos(angle) * R * jitter,
        y: cy + Math.sin(angle) * R * jitter,
        name,
        radius: 5 + Math.random() * 2,
        pulsePhase: Math.random() * Math.PI * 2,
        pulseSpeed: 0.018 + Math.random() * 0.012,
        glowIntensity: 0,
      };
    });

    // All edges between nodes
    const edges = [];
    for (let i = 0; i < nodes.length; i++) {
      for (let j = i + 1; j < nodes.length; j++) {
        const dx = nodes[j].x - nodes[i].x;
        const dy = nodes[j].y - nodes[i].y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        // Skip edges that cross the center too far (keeps it from looking like a web)
        if (dist < R * 2.1) {
          edges.push({ a: i, b: j, dist });
        }
      }
    }

    // Active signals traveling along edges
    const signals = [];
    const spawnSignal = () => {
      if (!active && signals.length > 2) return;
      if (active && signals.length > n * 2) return;
      const edge = edges[Math.floor(Math.random() * edges.length)];
      const forward = Math.random() > 0.5;
      signals.push({
        edge,
        t: 0,
        speed: 0.004 + Math.random() * 0.006,
        forward,
        opacity: 0,
        color: Math.random() > 0.3 ? "#c8a46e" : "#8ab4f8",
      });
    };

    // Seed some initial signals
    for (let i = 0; i < (active ? n : 2); i++) spawnSignal();

    let frame = 0;
    stateRef.current = { nodes, edges, signals, spawnSignal };

    const draw = () => {
      ctx.clearRect(0, 0, W, H);
      frame++;

      // Spawn new signals periodically
      if (frame % (active ? 18 : 60) === 0) spawnSignal();

      // Draw edges
      edges.forEach(({ a, b }) => {
        const na = nodes[a], nb = nodes[b];
        ctx.beginPath();
        ctx.moveTo(na.x, na.y);
        ctx.lineTo(nb.x, nb.y);
        ctx.strokeStyle = "rgba(60,55,50,0.55)";
        ctx.lineWidth = 0.8;
        ctx.stroke();
      });

      // Draw signals
      for (let i = signals.length - 1; i >= 0; i--) {
        const sig = signals[i];
        sig.t += sig.speed * (active ? 1.4 : 0.7);
        if (sig.t < 0.15) sig.opacity = sig.t / 0.15;
        else if (sig.t > 0.85) sig.opacity = (1 - sig.t) / 0.15;
        else sig.opacity = 1;

        if (sig.t >= 1) {
          // Light up the destination node briefly
          const destIdx = sig.forward ? sig.edge.b : sig.edge.a;
          nodes[destIdx].glowIntensity = 1;
          signals.splice(i, 1);
          continue;
        }

        const na = nodes[sig.edge.a], nb = nodes[sig.edge.b];
        const [src, dst] = sig.forward ? [na, nb] : [nb, na];
        const px = src.x + (dst.x - src.x) * sig.t;
        const py = src.y + (dst.y - src.y) * sig.t;

        // Glow trail
        const grd = ctx.createRadialGradient(px, py, 0, px, py, 8);
        const isGold = sig.color === "#c8a46e";
        grd.addColorStop(0, isGold ? `rgba(200,164,110,${sig.opacity * 0.9})` : `rgba(138,180,248,${sig.opacity * 0.7})`);
        grd.addColorStop(1, "transparent");
        ctx.beginPath();
        ctx.arc(px, py, 8, 0, Math.PI * 2);
        ctx.fillStyle = grd;
        ctx.fill();

        // Core dot
        ctx.beginPath();
        ctx.arc(px, py, 2.5, 0, Math.PI * 2);
        ctx.fillStyle = isGold ? `rgba(200,164,110,${sig.opacity})` : `rgba(138,180,248,${sig.opacity})`;
        ctx.fill();
      }

      // Draw nodes
      nodes.forEach(node => {
        node.pulsePhase += node.pulseSpeed;
        const pulse = Math.sin(node.pulsePhase) * 0.5 + 0.5;
        node.glowIntensity = Math.max(0, node.glowIntensity - 0.02);
        const glow = node.glowIntensity + (active ? pulse * 0.4 : pulse * 0.15);

        // Outer glow ring
        const outerR = node.radius + 4 + glow * 6;
        const grd = ctx.createRadialGradient(node.x, node.y, node.radius * 0.5, node.x, node.y, outerR);
        grd.addColorStop(0, `rgba(200,164,110,${0.3 + glow * 0.5})`);
        grd.addColorStop(1, "transparent");
        ctx.beginPath();
        ctx.arc(node.x, node.y, outerR, 0, Math.PI * 2);
        ctx.fillStyle = grd;
        ctx.fill();

        // Core node
        ctx.beginPath();
        ctx.arc(node.x, node.y, node.radius, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(200,164,110,${0.7 + glow * 0.3})`;
        ctx.fill();

        // Label
        ctx.font = `11px -apple-system, sans-serif`;
        ctx.fillStyle = `rgba(200,164,110,${0.5 + glow * 0.5})`;
        ctx.textAlign = "center";
        const labelY = node.y > cy + 20 ? node.y + node.radius + 16 : node.y - node.radius - 8;
        ctx.fillText(node.name, node.x, labelY);
      });

      animRef.current = requestAnimationFrame(draw);
    };

    draw();
    return () => { if (animRef.current) cancelAnimationFrame(animRef.current); };
  }, [thinkers.join(","), active, size]);

  return (
    <canvas ref={canvasRef} width={size} height={size}
      style={{ display: "block", margin: "0 auto", opacity: 0.92 }} />
  );
}

function CouncilView({ isGuest, onNeedAuth }) {
  const [mode, setMode] = useState("advice");
  const [question, setQuestion] = useState("");
  const [prose, setProse] = useState("");
  const [writingInputMode, setWritingInputMode] = useState("question"); // "question" | "prose"
  const [thinkers, setThinkers] = useState(new Set(ALL_THINKERS));
  const [deliberating, setDeliberating] = useState(false);
  const [result, setResult] = useState(null);
  const [error, setError] = useState("");

  const toggleThinker = (name) => {
    setThinkers(prev => {
      const next = new Set(prev);
      if (next.has(name)) {
        if (next.size <= 2) return prev; // minimum 2
        next.delete(name);
      } else {
        next.add(name);
      }
      return next;
    });
  };

  const handleSubmit = async () => {
    if (isGuest) { onNeedAuth(); return; }
    const q = question.trim();
    const p = prose.trim();
    if (mode === "writing" && writingInputMode === "prose" && !p) {
      setError("Paste the text you'd like the council to read."); return;
    }
    if (mode !== "writing" && !q) { setError("Ask the council something."); return; }
    if (mode === "writing" && writingInputMode === "question" && !q) {
      setError("Ask a question about your writing."); return;
    }
    setError("");
    setDeliberating(true);
    setResult(null);
    try {
      const body = { question: q || "Please read and respond to this passage.", mode, thinkers: [...thinkers] };
      if (mode === "writing" && p) body.prose = p;
      const r = await api("/council", { method: "POST", body: JSON.stringify(body) });
      setResult(r);

function WelcomeScreen({ onCreate, onFind }) {
  const [display, setDisplay] = React.useState("");
  const [exIdx, setExIdx] = React.useState(0);
  const [phase, setPhase] = React.useState("typing"); // typing | pausing | erasing

  React.useEffect(() => {
    const target = VOICE_EXAMPLES[exIdx];
    let timeout;
    if (phase === "typing") {
      if (display.length < target.length) {
        timeout = setTimeout(() => setDisplay(target.slice(0, display.length + 1)), 42);
      } else {
        timeout = setTimeout(() => setPhase("pausing"), 1800);
      }
    } else if (phase === "pausing") {
      timeout = setTimeout(() => setPhase("erasing"), 400);
    } else {
      if (display.length > 0) {
        timeout = setTimeout(() => setDisplay(display.slice(0, -1)), 18);
      } else {
        setExIdx((i) => (i + 1) % VOICE_EXAMPLES.length);
        setPhase("typing");
      }
    }
    return () => clearTimeout(timeout);
  }, [display, exIdx, phase]);

  return (
    <div className="empty-state">
      <ParticleField />
      <div className="empty-state-inner">
        <div className="empty-hero">
          Your writing has a voice.<br />
          Now it can <em>teach</em>.

// ── Particle Field — ambient background for the Voice content area ──
function ParticleField() {
  const canvasRef = React.useRef(null);
  const animRef = React.useRef(null);
  const mouseRef = React.useRef({ x: -9999, y: -9999 });

  React.useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext("2d");

    let W, H;
    const resize = () => {
      W = canvas.width = canvas.offsetWidth;
      H = canvas.height = canvas.offsetHeight;
    };
    resize();
    const resizeObs = new ResizeObserver(resize);
    resizeObs.observe(canvas);

    const COUNT = 88;
    const CONNECT_DIST = 110;
    const MOUSE_DIST = 90;

    const particles = Array.from({ length: COUNT }, () => ({
      x: Math.random() * (W || 800),
      y: Math.random() * (H || 600),
      vx: (Math.random() - 0.5) * 0.22,
      vy: (Math.random() - 0.5) * 0.22,
      r: 1.2 + Math.random() * 1.6,
      opacity: 0.28 + Math.random() * 0.48,
      // Some particles drift faster for depth
      speed: 0.6 + Math.random() * 0.8,
    }));

    const onMouseMove = (e) => {
      const rect = canvas.getBoundingClientRect();
      mouseRef.current = { x: e.clientX - rect.left, y: e.clientY - rect.top };
    };
    const onMouseLeave = () => { mouseRef.current = { x: -9999, y: -9999 }; };
    // Listen on the parent container so mouse still works with pointer-events:none on canvas
    const parent = canvas.parentElement;
    parent.addEventListener("mousemove", onMouseMove);
    parent.addEventListener("mouseleave", onMouseLeave);

    const draw = () => {
      if (!W || !H) { animRef.current = requestAnimationFrame(draw); return; }
      ctx.clearRect(0, 0, W, H);
      const mx = mouseRef.current.x, my = mouseRef.current.y;

      // Update positions
      particles.forEach(p => {
        // Gentle mouse repulsion
        const dx = p.x - mx, dy = p.y - my;
        const d = Math.sqrt(dx * dx + dy * dy);
        if (d < MOUSE_DIST && d > 0) {
          const force = (1 - d / MOUSE_DIST) * 0.4;
          p.vx += (dx / d) * force;
          p.vy += (dy / d) * force;
        }

        // Velocity damping
        p.vx *= 0.985;
        p.vy *= 0.985;

        // Drift
        p.x += p.vx * p.speed;
        p.y += p.vy * p.speed;

        // Wrap edges
        if (p.x < -10) p.x = W + 10;
        if (p.x > W + 10) p.x = -10;
        if (p.y < -10) p.y = H + 10;
        if (p.y > H + 10) p.y = -10;
      });

      // Draw connections
      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
          const a = particles[i], b = particles[j];
          const dx = b.x - a.x, dy = b.y - a.y;
          const d = Math.sqrt(dx * dx + dy * dy);
          if (d < CONNECT_DIST) {
            const alpha = (1 - d / CONNECT_DIST) * 0.22;
            ctx.beginPath();
            ctx.moveTo(a.x, a.y);
            ctx.lineTo(b.x, b.y);
            ctx.strokeStyle = `rgba(217,168,60,${alpha})`;
            ctx.lineWidth = 0.8;
            ctx.stroke();
          }
        }
      }

      // Draw particles
      particles.forEach(p => {
        // Mouse proximity brightens particle
        const dx = p.x - mx, dy = p.y - my;
        const d = Math.sqrt(dx * dx + dy * dy);
        const boost = d < MOUSE_DIST ? (1 - d / MOUSE_DIST) * 0.55 : 0;
        const alpha = Math.min(1, p.opacity + boost);

        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r + boost * 1.8, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(217,168,60,${alpha})`;
        ctx.fill();
      });

      animRef.current = requestAnimationFrame(draw);
    };

    draw();
    return () => {
      cancelAnimationFrame(animRef.current);
      resizeObs.disconnect();
      parent.removeEventListener("mousemove", onMouseMove);
      parent.removeEventListener("mouseleave", onMouseLeave);
    };
  }, []);

  return (
    <canvas
      ref={canvasRef}
      style={{
        position: "absolute", inset: 0, width: "100%", height: "100%",
        pointerEvents: "none", display: "block", zIndex: 0,
      }}
    />
  );
}

// ── Main App ──
function App() {
  const [user, setUserState] = useState(getUser);
  const [profiles, setProfiles] = useState([]);
  const [activeProfile, setActiveProfile] = useState(null);
  const [mode, setMode] = useState("home");
  const [showCouncil, setShowCouncil] = useState(false);
  const [mobileSidebarOpen, setMobileSidebarOpen] = useState(false);
  const [showCreate, setShowCreate] = useState(false);
  const [showFind, setShowFind] = useState(false);
  const [showAuth, setShowAuth] = useState(false);
  const [pendingDesc, setPendingDesc] = useState("");
  const [confirmDelete, setConfirmDelete] = useState(false);
  const [loaded, setLoaded] = useState(false);

  const isGuest = user?.user_id?.startsWith("guest-");

  // Open auth modal immediately if landing page sent ?signin=1
  useEffect(() => {
    if (new URLSearchParams(window.location.search).get("signin") === "1") {
      setShowAuth(true);
      window.history.replaceState({}, "", "/app");
    }
  }, []);

  // Auto-create guest session if no token on first visit
  useEffect(() => {
    if (!getToken()) {
      fetch(`${API}/auth/guest`, { method: "POST", headers: { "Content-Type": "application/json" } })
        .then(r => r.json())
        .then(data => { setToken(data.token); setUser(data.user); setUserState(data.user); })
        .catch(console.error);
    }
  }, []);

  const loadProfiles = useCallback(async () => {
    try {
      const list = await api("/profiles");
      setProfiles(list);
      setActiveProfile(prev => prev || list[0] || null);
    } catch (e) { console.error("Failed to load profiles:", e); }
    setLoaded(true);
  }, []);

  useEffect(() => { if (user) loadProfiles(); }, [user, loadProfiles]);

  const handleAuth = async (u) => {
    setUserState(u);
    setShowAuth(false);
    await loadProfiles();
  };

  const handleLogout = () => {
    clearToken(); clearUser();
    // Create a new guest session immediately after logout
    fetch(`${API}/auth/guest`, { method: "POST", headers: { "Content-Type": "application/json" } })
      .then(r => r.json())
      .then(data => { setToken(data.token); setUser(data.user); setUserState(data.user); setProfiles([]); setActiveProfile(null); setLoaded(false); })
      .catch(() => { setUserState(null); setProfiles([]); setActiveProfile(null); });
  };

  const handleCreate = (profile) => {
    setProfiles(prev => [profile, ...prev]);
    setActiveProfile(profile);
    setShowCreate(false);
    setMode("home");
  };

  const handleRefinementSaved = (count) => {
    setActiveProfile(prev => prev ? { ...prev, refinement_count: count } : prev);
    setProfiles(prev => prev.map(p =>
      p.profile_id === activeProfile?.profile_id ? { ...p, refinement_count: count } : p
    ));
  };

  const handleFindResult = (description) => {
    setShowFind(false);
    setPendingDesc(description);
    setShowCreate(true);
  };

  const handleDelete = () => { if (activeProfile) setConfirmDelete(true); };

  const confirmDeleteProfile = async () => {
    setConfirmDelete(false);
    if (!activeProfile) return;
    const name = activeProfile.name;
    try {
      await api(`/profiles/${activeProfile.profile_id}`, { method: "DELETE" });
      const remaining = profiles.filter(p => p.profile_id !== activeProfile.profile_id);
      setProfiles(remaining);
      setActiveProfile(remaining[0] || null);
      toastSuccess(`"${name}" deleted`);
    } catch (e) { toastError(e.message); }
  };

  // Show spinner only on very first load before guest session is established
  if (!user) {
    return (
      <div className="app">
        <div className="empty-state">
          <div style={{ color: "var(--text-dim)" }}>Loading<LoadingDots /></div>
        </div>
      </div>
    );
  }

  return (
    <div className="app">
      {/* Top bar */}
      <div className="topbar">
        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
          <div className="topbar-logo">Voice</div>
          {/* Mobile: toggle sidebar */}
          <button
            className={`mobile-voices-btn ${mobileSidebarOpen ? "open" : ""}`}
            onClick={() => setMobileSidebarOpen(o => !o)}
          >
            ≡ Voices
          </button>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: "clamp(8px, 2vw, 24px)" }}>
          {activeProfile && !showCouncil && (
            <div className="topbar-nav">
              <button className={`topbar-btn ${mode === "home" ? "active" : ""}`} onClick={() => setMode("home")} title="Home">⌂</button>
              <button className={`topbar-btn ${mode === "teach" ? "active" : ""}`} onClick={() => setMode("teach")}>Teach</button>
              <button className={`topbar-btn ${mode === "write" ? "active" : ""}`} onClick={() => setMode("write")}>Write</button>
              <button className={`topbar-btn ${mode === "analyze" ? "active" : ""}`} onClick={() => setMode("analyze")}>Analyze</button>
              <button className={`topbar-btn ${mode === "upload" ? "active" : ""}`} onClick={() => setMode("upload")}>Upload</button>
              <button className={`topbar-btn ${mode === "export" ? "active" : ""}`} onClick={() => setMode("export")}>Export</button>
            </div>
          )}
          <button
            className={`topbar-btn ${showCouncil ? "active" : ""}`}
            onClick={() => { setShowCouncil(c => !c); setMobileSidebarOpen(false); }}
            style={{ fontStyle: "italic" }}
          >
            Council
          </button>
          {isGuest ? (
            <div className="user-badge">
              <span className="topbar-guest-label" style={{ color: "var(--text-faint)" }}>Guest</span>
              <button className="topbar-btn active" style={{ borderColor: "var(--accent)", color: "var(--accent)" }}
                onClick={() => setShowAuth(true)}>
                Save your work →
              </button>
            </div>
          ) : (
            <div className="user-badge">
              <span>{user.name || user.email}</span>
              <button className="logout-btn" onClick={handleLogout}>Sign out</button>
            </div>
          )}
        </div>
      </div>

      {/* Mobile sidebar backdrop */}
      <div
        className={`sidebar-backdrop ${mobileSidebarOpen ? "visible" : ""}`}
        onClick={() => setMobileSidebarOpen(false)}
      />

      <div className="main">
        {/* Sidebar */}
        <div className={`sidebar ${mobileSidebarOpen ? "mobile-open" : ""}`}>
          <div className="sidebar-header">
            <div className="sidebar-title">Voices</div>
          </div>
          <div className="sidebar-list">
            {profiles.map(p => (
              <div
                key={p.profile_id}
                className={`profile-card ${activeProfile?.profile_id === p.profile_id ? "active" : ""}`}
                onClick={() => { setActiveProfile(p); setMode("home"); setMobileSidebarOpen(false); }}
              >
                <div className="profile-card-name">{p.name}</div>
                <div className="profile-card-meta">{p.refinement_count} refinements</div>
              </div>
            ))}
          </div>
          <button className="new-profile-btn" onClick={() => { setShowCreate(true); setMobileSidebarOpen(false); }}>
            + New Voice
          </button>
          <button className="new-profile-btn" style={{ marginTop: 0 }} onClick={() => { setShowFind(true); setMobileSidebarOpen(false); }}>
            Find Your Voice
          </button>
          <PlanBadge />
        </div>

        {/* Content */}
        <div className="content">
          {/* Ambient particle field — sits behind everything except the welcome screen (which has its own) */}
          {!showCouncil && activeProfile && <ParticleField />}
          {showCouncil ? (
            <CouncilView isGuest={isGuest} onNeedAuth={() => setShowAuth(true)} />
          ) : activeProfile ? (
            <>
              <div className="profile-header" style={{ position: "relative", zIndex: 1 }}>
                <div style={{ display: "flex", alignItems: "baseline" }}>
                  <div className="profile-header-name">{activeProfile.name}</div>
                  <div className="profile-header-meta">{activeProfile.refinement_count} refinements</div>
                </div>
                <div className="profile-header-actions">
                  <button className="header-action danger" onClick={handleDelete}>Delete</button>
                </div>
              </div>

              {/* Keep all views mounted so state (write output, analyze results) survives tab switches */}
              {/* position:relative + zIndex:1 ensures views float above the particle canvas */}
              {mode === "home" && (
                <HomeView profile={activeProfile} onMode={setMode} />
              )}
              <div style={{ display: mode === "teach" ? "contents" : "none", position: "relative", zIndex: 1 }}>
                <TeachView profileId={activeProfile.profile_id} profileName={activeProfile.name} refinementCount={activeProfile.refinement_count} onRefinementSaved={handleRefinementSaved} />
              </div>
              <div style={{ display: mode === "write" ? "contents" : "none", position: "relative", zIndex: 1 }}>
                <WriteView profileId={activeProfile.profile_id} profileName={activeProfile.name} />
              </div>
              <div style={{ display: mode === "analyze" ? "contents" : "none", position: "relative", zIndex: 1 }}>
                <AnalyzeView profileId={activeProfile.profile_id} profileName={activeProfile.name} />
              </div>
              <div style={{ display: mode === "upload" ? "contents" : "none", position: "relative", zIndex: 1 }}>
                <UploadView profileId={activeProfile.profile_id} />
              </div>
              <div style={{ display: mode === "export" ? "contents" : "none", position: "relative", zIndex: 1 }}>
                <ExportView profileId={activeProfile.profile_id} />
              </div>
            </>
          ) : (
            <WelcomeScreen onCreate={() => setShowCreate(true)} onFind={() => setShowFind(true)} />
          )}
        </div>
      </div>

      {/* Modals */}
      {showCreate && (
        <CreateProfileModal
          onClose={() => { setShowCreate(false); setPendingDesc(""); }}
          onCreate={handleCreate}
          prefillDesc={pendingDesc}
        />
      )}
      {showFind && <FindVoiceModal onClose={() => setShowFind(false)} onResult={handleFindResult} />}
      {showAuth && (
        <AuthModal
          onClose={() => setShowAuth(false)}
          onAuth={handleAuth}
          guestId={isGuest ? user.user_id : null}
        />
      )}
      {confirmDelete && activeProfile && (
        <ConfirmModal
          title={`Delete "${activeProfile.name}"?`}
          body="This will permanently delete the voice profile and all its refinements. This cannot be undone."
          confirmLabel="Delete Profile"
          onConfirm={confirmDeleteProfile}
          onCancel={() => setConfirmDelete(false)}
        />
      )}
      <ToastStack />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
